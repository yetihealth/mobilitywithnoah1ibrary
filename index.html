<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小纖女體態檢索庫</title>
  <style>
    :root {
      --bg: #F1ECE3;
      --panel: #F7F3EA;
      --panel2: #EDE9DF;
      --text: #1E1E1C;
      --muted: #8E887E;
      --line: #D8D1C5;
      --accent: #3F5A32;
      --accent2: #5F7A4E;
      --danger: #B42318;
      --ok: #5F7A4E;
      --shadow: 0 18px 45px rgba(30,30,28,.08);
      --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(63,90,50,.12), transparent 34%), var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      line-height: 1.55;
    }
    .app { max-width: 1180px; margin: 0 auto; padding: 28px 18px 48px; }
    .hero {
      display: grid; grid-template-columns: 1fr; gap: 20px; align-items: end;
      padding: 26px; border: 1px solid var(--line); border-radius: 28px;
      background: linear-gradient(135deg, #F7F3EA, #F1ECE3);
      box-shadow: var(--shadow);
    }
    .eyebrow { color: var(--accent); font-weight: 700; letter-spacing: .08em; font-size: 13px; }
    h1 { margin: 8px 0 8px; color: var(--accent); font-size: clamp(30px, 4.6vw, 54px); line-height: 1.05; letter-spacing: -0.04em; }
    .lead { margin: 0; color: var(--muted); max-width: 720px; font-size: 16px; }
    .countBox { color: var(--muted); text-align: right; font-size: 14px; white-space: nowrap; }
    .countBox b { color: var(--text); font-size: 28px; display:block; }
    .librarySwitch { margin-top: 16px; display:flex; gap: 10px; flex-wrap: wrap; }
    .libraryTab {
      border: 1px solid var(--line); background: #FFFFFF; color: var(--text);
      border-radius: 999px; padding: 10px 16px; cursor: pointer; transition: .15s; font-size: 14px; font-weight: 700;
    }
    .libraryTab:hover { border-color: #5F7A4E; background: #E7E6D9; }
    .libraryTab.active { background: var(--accent); color: #F7F3EA; border-color: var(--accent); }

    .layout { display: grid; grid-template-columns: 330px 1fr; gap: 18px; margin-top: 18px; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow); }
    .panel h2 { font-size: 16px; margin: 0 0 12px; }
    .hint { color: var(--muted); font-size: 13px; margin: -6px 0 14px; }
    .humanWrap { position: relative; display: grid; place-items: center; padding: 10px 0 0; min-height: 350px; overflow: visible; }
    .human { width: 190px; height: 320px; z-index: 1; }
    .human .stroke { fill: none; stroke: rgba(63,90,50,.42); stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
    .hotspot { cursor: pointer; fill: rgba(63,90,50,.08); stroke: rgba(95,122,78,.28); transition: .18s; }
    .hotspot:hover, .hotspot.active { fill: rgba(63,90,50,.16); stroke: rgba(63,90,50,.72); }
    .bodyBtns { position:absolute; inset: 0; z-index: 2; pointer-events:none; }
    .bodyBtn, .chip, .smallBtn {
      border: 1px solid var(--line); background: #FFFFFF; color: var(--text);
      border-radius: 999px; padding: 10px 13px; cursor: pointer; transition: .15s; font-size: 14px;
    }
    .bodyBtn {
      position: absolute; display:flex; justify-content:space-between; align-items:center; gap: 8px;
      width: auto; min-width: 82px; padding: 8px 11px; border-radius: 999px; pointer-events:auto;
      background: rgba(247,243,234,.92); backdrop-filter: blur(6px); box-shadow: 0 10px 24px rgba(30,30,28,.06);
    }
    .bodyBtn[data-body="肩頸"] { top: 22px; left: 50%; transform: translateX(-50%); }
    .bodyBtn[data-body="腰背"] { top: 124px; left: 6px; }
    .bodyBtn[data-body="骨盆臀型"] { top: 150px; right: 2px; }
    .bodyBtn[data-body="腿型"] { top: 238px; right: 18px; }
    .bodyBtn[data-body="足底"] { bottom: 0; left: 50%; transform: translateX(-50%); }
    .bodyBtn span:last-child { color: var(--muted); font-size: 12px; }
    .bodyBtn:hover, .chip:hover, .smallBtn:hover { border-color: #5F7A4E; background: #E7E6D9; }
    .bodyBtn.active, .chip.active, .smallBtn.active { background: var(--accent); color: #F7F3EA; border-color: var(--accent); font-weight: 800; }
    .bodyBtn.active span:last-child { color: rgba(247,243,234,.72); }
    .chip.disabled { opacity: .45; }
    #resetBtn { padding: 0 15px; font-size: 13px; min-width: 56px; height: 42px; border-radius: 999px; white-space: nowrap; }
    .filters { display: grid; gap: 16px; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .searchRow { display:grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; align-items:center; margin-top: 14px; }
    input[type="search"] {
      width: 100%; height: 42px; padding: 0 14px; border-radius: 16px; border: 1px solid var(--line);
      background: #FFFFFF; color: var(--text); outline: none;
    }
    input[type="search"]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(63,90,50,.10); }
    .toolbar { display:flex; justify-content:space-between; gap: 12px; align-items:center; margin-bottom: 14px; }
    .resultCount { color: var(--muted); font-size: 14px; }
    .cards { display: grid; gap: 12px; }
    .card {
      position: relative; background: linear-gradient(180deg, #FFFFFF, #F7F3EA);
      border: 1px solid var(--line); border-radius: 20px; padding: 16px; cursor: pointer; transition: .16s; overflow:hidden;
    }
    .card:hover { transform: translateY(-2px); border-color: #5F7A4E; box-shadow: 0 16px 30px rgba(30,30,28,.10); }
    .cardTop { display:flex; justify-content:space-between; gap: 12px; align-items:flex-start; }
    .cardTitle { display:flex; gap: 10px; align-items:flex-start; font-weight: 850; font-size: 18px; line-height: 1.35; }
    .num { color: var(--accent); min-width: 28px; }
    .tag { background: #E7E6D9; border: 1px solid #D8D1C5; color: var(--accent2); padding: 5px 9px; border-radius: 999px; font-size: 12px; white-space: nowrap; }
    .reason { margin: 10px 0 0 38px; color: var(--muted); }
    .meta { margin: 11px 0 0 38px; display:flex; gap: 8px; flex-wrap:wrap; color: var(--muted); font-size: 12px; }
    .pill { border:1px solid var(--line); border-radius:999px; padding:4px 8px; background:#F1ECE3; }
    .hasUrl { color: var(--ok); border-color: rgba(131,227,181,.35); }

    .cardAction {
      margin: 13px 0 0 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      padding: 9px 13px;
      border-radius: 999px;
      background: var(--accent);
      color: #F7F3EA;
      font-size: 13px;
      font-weight: 850;
      border: 1px solid var(--accent);
    }
    .cardAction:hover { background: var(--accent2); border-color: var(--accent2); }
    .cardAction.disabled { background: #E7E6D9; color: var(--muted); border-color: var(--line); pointer-events: none; }
    .card.activeCard {
      border-color: var(--accent);
      box-shadow: 0 16px 30px rgba(30,30,28,.12);
    }
    .inlineDetail {
      margin: 14px 0 0 38px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: #FFFFFF;
      box-shadow: 0 18px 40px rgba(30,30,28,.12);
      overflow: hidden;
      cursor: default;
    }
    .inlineDetailTop {
      padding: 14px 14px 10px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #FFFFFF, #F7F3EA);
    }
    .inlineClose {
      flex: 0 0 auto;
      border:0;
      background:#E7E6D9;
      color:var(--text);
      width:34px;
      height:34px;
      border-radius:999px;
      cursor:pointer;
      font-size:21px;
      line-height:1;
    }
    .inlineDetailBody { padding: 16px; }
    .inlineDetail .modalGrid { margin-bottom: 0; }
    .inlineDetail .sectionTitle { margin-top: 12px; }
    .inlineDetail .modalActions { margin-top: 16px; }
    .inlineHint { color: var(--muted); font-size: 13px; margin: 8px 0 0; }
    .empty { color: var(--muted); text-align:center; padding: 40px 20px; border: 1px dashed var(--line); border-radius: 20px; }
    .modalBackdrop { position: fixed; inset: 0; background: rgba(30,30,28,.42); display:none; z-index: 50; padding: 18px; overflow: hidden; }
    .modalBackdrop.show { display: flex; align-items: center; justify-content: center; }
    .modal { width: min(760px, 100%); max-height: calc(100dvh - 36px); background: #FFFFFF; border: 1px solid var(--line); border-radius: 26px; box-shadow: var(--shadow); overflow:hidden; display: flex; flex-direction: column; }
    .modalHead { padding: 18px 18px 12px; display:flex; justify-content:space-between; gap: 14px; align-items:flex-start; border-bottom: 1px solid var(--line); }
    .modalTitle { margin:0; font-size: 22px; line-height:1.3; }
    .close { border:0; background:#E7E6D9; color:var(--text); width:36px; height:36px; border-radius:999px; cursor:pointer; font-size:22px; }
    .modalBody { padding: 18px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .modalGrid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .infoBox { border:1px solid var(--line); border-radius:16px; padding:10px; background:#F1ECE3; }
    .infoBox small { display:block; color:var(--muted); margin-bottom:3px; }
    .sectionTitle { color: var(--accent); font-weight: 800; margin: 14px 0 6px; }
    .modalText { color: var(--text); margin:0; white-space: pre-wrap; }
    .movements { color: var(--muted); margin-top: 6px; font-size: 14px; white-space: pre-wrap; }
    .modalActions { display:flex; gap: 10px; margin-top: 18px; flex-wrap:wrap; }
    .primaryLink { display:inline-flex; text-decoration:none; align-items:center; justify-content:center; padding: 12px 16px; border-radius: 999px; background: var(--accent); color:#F7F3EA; font-weight:850; }
    .disabledLink { display:inline-flex; padding: 12px 16px; border-radius:999px; border:1px solid var(--line); color:var(--muted); }

    .aiAssistant {
      display: none;
      margin-bottom: 18px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: linear-gradient(180deg, #FFFFFF, #F7F3EA);
      box-shadow: 0 14px 34px rgba(30,30,28,.08);
    }
    .aiAssistant.show { display: block; }
    .aiKicker { color: var(--accent); font-size: 13px; font-weight: 850; letter-spacing: .04em; margin-bottom: 4px; }
    .aiAssistant h2 { margin: 0 0 6px; font-size: 22px; color: var(--text); }
    .aiAssistant p { margin: 0; color: var(--muted); font-size: 14px; }
    .aiInputRow { display: grid; grid-template-columns: minmax(0, 1fr) auto; gap: 10px; margin-top: 14px; }
    .aiInputRow input {
      width: 100%; height: 46px; padding: 0 14px; border-radius: 16px; border: 1px solid var(--line);
      background: #FFFFFF; color: var(--text); outline: none; font-size: 15px;
    }
    .aiInputRow input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(63,90,50,.10); }
    .aiInputRow button {
      height: 46px; border: 1px solid var(--accent); background: var(--accent); color: #F7F3EA;
      border-radius: 999px; padding: 0 18px; font-weight: 850; cursor: pointer; white-space: nowrap;
    }
    .aiInputRow button:disabled { opacity: .62; cursor: progress; }
    .aiReply {
      display: none; margin-top: 14px; padding: 13px 14px; border: 1px solid var(--line);
      border-radius: 18px; background: #F1ECE3; color: var(--text); font-size: 14px; white-space: pre-wrap;
    }
    .aiReply.show { display: block; }
    .aiExamples { display:flex; gap: 8px; flex-wrap:wrap; margin-top: 12px; }
    .aiExample {
      border: 1px solid var(--line); background: rgba(255,255,255,.72); color: var(--muted);
      border-radius: 999px; padding: 7px 10px; cursor: pointer; font-size: 12px;
    }
    .aiExample:hover { border-color: var(--accent2); color: var(--accent); background: #E7E6D9; }
    body.aiMode .layout { grid-template-columns: 1fr; }
    body.aiMode .layout > aside { display: none; }
    body.aiMode .filters, body.aiMode .searchRow { display: none; }

    @media (max-width: 860px) {
      .hero { grid-template-columns:1fr; } .countBox { text-align:left; }
      .layout { grid-template-columns:1fr; }
      .humanWrap { min-height: 330px; }
      .human { height:260px; width: 165px; }
      .bodyBtn { font-size: 13px; padding: 7px 10px; min-width: 76px; }
      .bodyBtn[data-body="肩頸"] { top: 16px; }
      .bodyBtn[data-body="腰背"] { top: 106px; left: 4px; }
      .bodyBtn[data-body="骨盆臀型"] { top: 132px; right: 4px; }
      .bodyBtn[data-body="腿型"] { top: 218px; right: 14px; }
      .bodyBtn[data-body="足底"] { bottom: 0; }
      .modalBackdrop.show { display: flex; align-items: center; justify-content: center; }
      .modalGrid { grid-template-columns:1fr; }
      .inlineDetailTop { grid-template-columns: minmax(0, 1fr) auto; }
      .reason,.meta,.inlineDetail { margin-left:0; }
      .inlineDetail { border-radius: 22px; }
      .cardTitle { font-size:16px; }
      .aiInputRow { grid-template-columns:1fr; }
      .aiInputRow button { width:100%; }
    }
  </style>
</head>

_original": "這是用來幫你", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "側躺內外旋", "difficulty": "進階", "order": "1", "card_reason": "這類「臀型不好看」常不是單一部位的問題，先從髖臀張力和發力順序開始整理。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊。", "movement_name": "側躺內外旋", "movement_code": "D225", "sets_reps": "10秒；5秒", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GbThTpLT1/", "content_status": "https://www.facebook.com/share/r/1GbThTpLT1/", "raw_hook": "這是用來幫你", "raw_day": "405", "raw_page": "8", "raw_text": "D225 側躺內外旋\n這是用來幫你\n改善下臀線條的\n(淡入 黃字)\n黃金動作\n下方腿彎曲支撐\n上方腳抬高\n手叉腰固定骨盆\n確保骨盆不晃動\n往外旋轉到極限\n你會感覺\n(字幕:循環- 故障閃閃)\n大腿根部酸到炸開\n這個地方有感\n(黃字)\n下臀才會改變\n做幾下\n你會發現\n走路輕鬆\n胯開始收\n腿型也變順了\n-Skool\n臀中肌特別凸\n走路掉胯\n上抬10秒\n外旋5秒\n內旋5秒\n下放10秒\n30秒一下,每邊做5~6下\n可以大幅提高你的單邊穩定性\n快速抬起很簡單\n慢速抬極其困難\n當你發現問題\n就是體態調整的第一步"}, {"id": "ex_day_404_d221", "content_type": "單一動作", "source_type": "D", "source_id": "404", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "這是你用來拉大腿前側的伸展", "purpose": "先鬆開", "secondary_purpose": "", "title": "沙發伸展", "difficulty": "中階", "order": "1", "card_reason": "先用「沙發伸展」把骨盆和大腿的活動叫回來，後面的訓練才不容易跑偏。", "detail": "當開髖做很多還是覺得髖轉不順，可以先做「沙發伸展」；重點不是忍到很酸，而是讓骨盆和大腿的活動慢慢接回來。", "movement_name": "沙發伸展", "movement_code": "D221", "sets_reps": "依影片跟練", "equipment": "牆面、椅子、軟墊、沙發", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18UCCSg972/", "content_status": "https://www.facebook.com/share/r/18UCCSg972/", "raw_hook": "這是你用來拉大腿前側的伸展", "raw_day": "404", "raw_page": "14-15", "raw_text": "一個超酸,但能的動作\n這是你用來拉大腿前側的伸展\n先準備一塊軟墊\n靠牆放好\n一隻膝蓋往後\n貼在牆上\n身體慢慢撐起來\n不穩可以扶椅子\n接著一個關鍵\n骨盆後傾\n你會發現\n伸展感直接往上走\n如果太痛\n把軟墊往前移10公分\n這個動作\n不是越近越好\n拉對位置才有用\n做完告訴我\n是大腿還是腰有感"}, {"id": "ex_day_403_d256", "content_type": "單一動作", "source_type": "D", "source_id": "403", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "每天30秒開髖", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "跳動青蛙", "difficulty"  "這是你每天早上用來保養脊椎的動作", "raw_day": "392", "raw_page": "31", "raw_text": "一個超酸,但能改善脊椎側彎的動作\n()\n這是你每天早上用來保養脊椎的動作\n90% 的脊椎側彎都不需要開刀\n但多數人卡在中間\n不知道該不該處理\n也不知道怎麼處理\n只能先放著\n其實你平常就能做一件事\n讓肋骨對位\n搭配呼吸調整\n每天花3分鐘\n你不會胸悶\n也替未來的自己\n省下一大筆代價"}, {"id": "ex_day_391_d190", "content_type": "單一動作", "source_type": "D", "source_id": "391", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "這是你用來改善骨盆後傾和臀型的動作", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "單腳保蹲", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "單腳保蹲", "movement_code": "D190", "sets_reps": "每邊2分鐘；每邊2分鐘", "equipment": "牆面", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1KVu21g6eM/", "content_status": "https://www.facebook.com/share/r/1KVu21g6eM/", "raw_hook": "這是你用來改善骨盆後傾和臀型的動作", "raw_day": "391", "raw_page": "32", "raw_text": "一個超緊,但能改善骨盆後傾的動作\n()\n這是你用來改善骨盆後傾和臀型的動作\n臀型,主要被兩塊肌肉控制\n臀大肌跟臀中肌\n當臀大肌下緣太緊\n骨盆後傾\n從側面看,\n屁股塌掉、沒弧度\n下方的微笑線也消失\n這個動作\n每邊2分鐘\n做完照鏡子\n你會發現\n形狀立刻變立體"}, {"id": "ex_day_390_d182", "content_type": "單一動作", "source_type": "D", "source_id": "390", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "這是你每天早上用來重置骨盆的動作", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "女神蹲後仰", "difficulty": "中階", "order": "1", "card_reason": "「女神蹲後仰」適合放在前面，先讓臀線比較容易往上整理，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看臀線比較容易往上整理，效果會比單純硬拉更清楚。", "movement_name": "女神蹲後仰", "movement_code": "D182", "sets_reps": "3分鐘", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1FgmdUozD1/", "content_status": "https://www.facebook.com/share/r/1FgmdUozD1/", "raw_hook": "這是你每天早上用來重置骨盆的動作", "raw_day": "390", "raw_page": "37", "raw_text": "一個超酸,但能幫你改善假胯寬的動作\n()\n假胯寬 + 小腹突\n這是你每天早上用來重置骨盆的動作\n久坐族最普遍的問題\n是骨盆前側的肌肉太緊\n又很少活動\n站著的時候小腹凸出去\n也出現假胯寬\n對抗久坐最需要的反向動作\n你的大腿內側到盆底肌\n都會自然擴張與放鬆\n明天早上做\n給自己3分鐘\n用這個動作迎接陽光"}, {"id": "ex_day_389_d102", "content_type": "單一動作", "source_type": "D", "source_id": "389", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "這是你脫鞋後用來救回腳趾的動作", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "娘娘蹲", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓足底支撐和下肢力線重新有反應，動作才會比較順。", "detail": "不要急著追求痠痛感，先讓足底支撐和下肢力線變得比較會配合，身體才不會越練越緊。", "movement_name": "娘娘蹲", "movement_code": "D102", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CTVqha9ES/", "content_status": "https://www.facebook.com/share/r/1CTVqha9ES/", "raw_hook": "這是你脫鞋後用來救回腳趾的動作", "raw_day": "389", "raw_page": "33-34", "raw_text": "一個超難,但能改善小腿腫脹的動作\n()\n穿一天高跟鞋\n這是你脫鞋後用來救回腳趾的動作\n腳掌\n是下肢力線的起點\n而關鍵\n在 大拇指下方那塊骨頭\n常穿高跟鞋\n或有扁平足\n力線容易慢慢歪掉\n用簡單的話來說\n想要消除蘿蔔腿跟腳踝水腫\n你要把腳併攏\n慢慢把力線找回來\n力線回正\n就算換成平底鞋\n腿還是很修長\n也比較不容易扭傷"}, {"id": "ex_day_388_d142", "content_type": "單一動作", "source_type": "D", "source_id": "388", "body_part": "腿型", "pain_point": "腿型不順", "pain_point_original": "這是你每天睡前都該做的伸展", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "青蛙前彎", "difficulty": "中階", "order": "1", "card_reason": "「青蛙前彎」不是要你做到很酸，而是先整理髖膝踝的排列，讓腿線會比較順，可以放在訓練前先試。", "detail": "適合腿看起來不直、走路時下肢很容易歪掉的人，先做「青蛙前彎」先把過度緊繃降下來，再回頭測原本不順的地方。", "movement_name": "青蛙前彎", "movement_code": "D142", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1EkMY9U2wT/", "content_status": "https://www.facebook.com/share/r/1EkMY9U2wT/", "raw_hook": "這是你每天睡前都該做的伸展", "raw_day": "388", "raw_page": "35", "raw_text": "一個超緊,但能改善下肢循環不良的動作\n()\n下肢循環不良\n這是你每天睡前都該做的伸展\n很多人睡前抬腿拉筋\n只拉到腿後側\n但骨盆底部、大腿內側\n常常被忽略\n這個動作不是硬拉\n而是 動態擠壓\n幫助腹股溝淋巴回流\n腿比較不脹\n腰的壓力也會小很多\n洗完澡後做最剛好\n體溫高、肌肉鬆\n讓副交感神經慢慢接手\n今晚,會更好睡"}, {"id": "ex_day_387_d143", "content_type": "單一動作", "source_type": "D", "source_id": "387", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "這是你用來快速啟動臀肌的動作", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "單腿蹲起身", "difficulty": "進階", "order": "1", "card_reason": "遇到久坐後腰下方很緊、站起來總覺得腰在頂著時，可以先用「單腿蹲起身」把腰背和骨盆的分工接回來。", "detail": "久坐後腰下方很緊、站起來總覺得腰在頂著的時候，先別急著加難度，做完再看腰不用一直自己扛有沒有改善像「單腿蹲起身」這類動作，可以放在睡前先做。", "movement_name": "單腿蹲起身", "movement_code": "D143", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1EHJ8F864c/", "content_status": "https://www.facebook.com/share/r/1EHJ8F864c/", "raw_hook": "這是你用來快速啟動臀肌的動作", "raw_day": "387", "raw_page": "36", "raw_text": "一個超難,但能幫你喚醒臀部的動作\n()\n練臀屁股不酸\n這是你用來快速啟動臀肌的動作\n深蹲最怕屁股沒感覺\n都是大腿酸\n最快、最有效的方式\n是一邊開髖\n同時喚醒臀肌\n當髖關節開始靈活\n蹲下就不會用腰椎代償\n困擾很久的腰痠也緩解了\n把身體擺成一個X型\n你看 是不是靈動了"}, {"id": "ex_day_386", "content_type": "單一動作", "source_type": "單一動作", "source_id": "386", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "這是你晚上一定要做的伸展", "purpose": "先鬆開", "secondary_purpose": "改善線條", "title": "小腿伸展", "difficulty": "中階", "order": "1", "card_reason": "這個動作主打小腿腳踝緊，重點是先把過度緊繃降下來，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力。", "movement_name": "小腿伸展", "movement_code": "", "sets_reps": "50下", "equipment": "瑜伽磚", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1G738WGvPg/", "content_status": "https://www.facebook.com/share/r/1G738WGvPg/", "raw_hook": "這是你晚上一定要做的伸展", "raw_day": "386", "raw_page": "39", "raw_text": "一個超緊,但能給你新的小腿的動作\n()\n今天走很多路\n這是你晚上一定要做的伸展\n跟著J人出國\n從早逛到晚\n或是週末去爬山\n小腿除了很酸很硬\n還會壓迫到淋巴\n讓小腿變得更腫\n腳尖內八\n拉到小腿外側\n腳尖外八\n拉到小腿內側\n重複50下\n幫你把小腿瘦回去"}, {"id": "ex_day_385", "content_type": "單一動作", "source_type": "單一動作", "source_id": "385", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "這是你現在就該開始的練習", "purpose": "找回發力", "secondary_purpose": "", "title": "哥薩克深蹲", "difficulty": "進階", "order": "1", "card_reason": "想讓力量不要再跑錯地方，先看骨盆兩側和側腰支撐有沒有配合；「哥薩克深蹲」就是做這件事。", "detail": "適合腰總是偏一邊不舒服，左右感覺差很多時使用；不用做到很深，先讓骨盆兩側和側腰支撐有反應就好。", "movement_name": "哥薩克深蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18kJRt7NLA/", "content_status": "https://www.facebook.com/share/r/18kJRt7NLA/", "raw_hook": "這是你現在就該開始的練習", "raw_day": "385", "raw_page": "40", "raw_text": "一個超難,但是真正能救你的動作\n()\n想要預防跌倒\n這是你現在就該開始的練習\n我們平常走路、跑步、爬樓梯\n幾乎都是前後方向\n但生活中的意外\n常常發生在側面\n滑倒、閃人、來不及反應\n用簡單的話來說\n現代人很會前後、\n但不會左右移動\n蹲的越低\n動作越難\n但身體的反應,也越快"}, {"id": "ex_day_384_d125", "content_type": "單一動作", "source_type": "D", "source_id": "384", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "這是你用來改善體態的動作", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "招財貓", "difficulty": "中階", "order": "1", "card_reason": "「招財貓」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓胸口和肩胛位置找到方向，通常比一次做到很深更有用。", "movement_name": "招財貓", "movement_code": "D125", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CkrHt87U5/", "content_status": "https://www.facebook.com/share/r/1CkrHt87U5/", "raw_hook": "這是你用來改善體態的動作", "raw_day": "384", "raw_page": "38", "raw_text": "一個超級酸,但能讓你背變薄的動作\n()\n底下留言『圓肩』,我傳給你【肩胛動態伸展包】 ,幫你把肩膀拉回去\n背看起來很厚\n這是你用來改善體態的動作\n肩胛有分內收和外展 兩種方向\n當它太往外跑\n你的肩膀往前\n背就會變成一整片厚厚的\n想要讓背變薄\n不是刻意挺胸 + 夾背\n是讓肩胛重新找回支撐\n等你做完\n鏡子裡的背\n會先告訴你答案"}, {"id": "ex_day_383_d148", "content_type": "單一動作", "source_type": "D", "source_id": "383", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "這是你每天起床都要做的動作", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "坐鴿式起身", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「坐鴿式起身」這類動作可以放在收操時先試。", "detail": "它比較像整理開關，先讓腰不用一直自己扛，再進入伸展或訓練會比較穩。", "movement_name": "坐鴿式起身", "movement_code": "D148", "sets_reps": "50下", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Cw9koQu3s/", "content_status": "https://www.facebook.com/share/r/1Cw9koQu3s/", "raw_hook": "這是你每天起床都要做的動作", "raw_day": "383", "raw_page": "41", "raw_text": "一個超難,但能改善腰酸背痛的動作\n()\n想要腰不痛\n這是你每天起床都要做的動作\n腰痛不是老化\n而是臀部肌肉撐不住\n少了大肌肉的支援\n上班坐一下\n彎腰搬個東⻄\n腰當然馬上就酸\n最好 最簡單的方式\n是幫臀肌做離心訓練\n左右各50下\n屁股撐得住\n腰就輕鬆很多"}, {"id": "ex_day_382", "content_type": "單一動作", "source_type": "單一動作", "source_id": "382", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "你每天洗頭", "purpose": "先鬆開", "secondary_purpose": "", "title": "頭部按摩", "difficulty": "中階", "order": "1", "card_reason": "如果脖子緊、肩頸沉，先做「頭部按摩」，會比直接加強更容易找到感覺。", "detail": "適合脖子緊、肩頸沉，放鬆一下又很快緊回來的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "頭部按摩", "movement_code": "", "sets_reps": "50 下", "equipment": "徒手", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18jP8o2heX/", "content_status": "https://www.facebook.com/share/r/18jP8o2heX/", "raw_hook": "你每天洗頭", "raw_day": "382", "raw_page": "42-43", "raw_text": "一個超級酸,但能改善頭皮緊繃的動作\n()\n肩膀硬得像石頭\n你每天洗頭\n都該順手做這個動作\n人體有一條筋膜線\n叫做淺背線\n它從枕骨下方,\n往上連到整片頭皮\n甚至影響眼睛\n當它太疲勞\n你會開始覺得頭痛\n肩頸卡、眼睛很酸\n這套動作\n是整條筋膜線的放鬆\n每個動作50 下\n洗頭時順便做\n你會發現\n洗完的不只是頭\n還有整個人"}, {"id": "ex_day_381", "content_type": "單一動作", "source_type": "單一動作", "source_id": "381", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "這是你上班也可以做的伸展", "purpose": "先鬆開", "secondary_purpose": "", "title": "眼睛按摩", "difficulty": "中階", "order": "1", "card_reason": "這類「肩頸緊繃」常不是單一部位的問題，先從頸側和肩胛周圍張力開始整理。", "detail": "不要急著追求痠痛感，先讓頸側和肩胛周圍張力變得比較會配合，身體才不會越練越緊。", "movement_name": "眼睛按摩", "movement_code": "", "sets_reps": "100下", "equipment": "徒手", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/3926278547502900/", "content_status": "https://www.facebook.com/reel/3926278547502900/", "raw_hook": "這是你上班也可以做的伸展", "raw_day": "381", "raw_page": "44-45", "raw_text": "一個超級痛,但能改善死魚眼的動作\n()\n眼睛酸痛、疲勞\n這是你上班也可以做的伸展\n寫程式、做報告\n長時間盯著螢幕\n高壓工作下\n我們會不自覺皺眉跟抬頭\n久了\n眼周的血液循環變差\n讓你眼睛無神\n而且看起來老10歲\n沿著筋膜線\n恢復眼周的血液循環\n把眼壓降下來\n重複100下\n你的眼睛變亮!\n人也清醒很多!"}, {"id": "ex_day_380_d269", "content_type": "單一動作", "source_type": "D", "source_id": "380", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "這是你用來邊看電視邊做的伸展", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "趴駱駝式", "difficulty": "中階", "order": "1", "card_reason": "先用「趴駱駝式」把腰背和骨盆的分工叫回來，後面的訓練才不容易跑偏。", "detail": "當久坐後腰下方很緊、站起來總覺得腰在頂著，可以先做「趴駱駝式」；重點不是忍到很酸，而是讓腰背和骨盆的分工慢慢接回來。", "movement_name": "趴駱駝式", "movement_code": "D269", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BV6rnZigf/", "content_status": "https://www.facebook.com/share/r/1BV6rnZigf/", "raw_hook": "這是你用來邊看電視邊做的伸展", "raw_day": "380", "raw_page": "46", "raw_text": "一個超酸,但能改善骨盆後傾的動作\n()\n這是你用來邊看電視邊做的伸展\n人體前後\n各有一條筋膜線,\n叫淺前線,和淺背線。\n當它們失衡,\n關節就會被力量大的一邊拉走,\n骨盆後傾、腰痠、駝背,\n都跟它有關!\n但如果我說,\n只要看電視的時候做這個,\n就能調整回來,\n你願意試看看嗎?"}, {"id": "ex_day_379_d124", "content_type": "單一動作", "source_type": "D", "source_id": "379", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "駝背不好看,", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "墊高V字滑行", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓關節動得更順；先求控制清楚，不用急著做很深。", "detail": "適合肩膀往前捲、背看起來厚，胸口也打不開時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "墊高V字滑行", "movement_code": "D124", "sets_reps": "2分鐘", "equipment": "瑜伽磚", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18vTaEBpnv/", "content_status": "https://www.facebook.com/share/r/18vTaEBpnv/", "raw_hook": "駝背不好看,", "raw_day": "379", "raw_page": "47", "raw_text": "一個超酸,但能幫你改善駝背的動作\n()\n駝背不好看,\n大家都知道。\n也很多人聽過:\n是前側太緊、後側太鬆,\n所以要多拉胸大肌。\n但並不是拉開胸肌就好,\n如果沒有肩胛一起動,\n再怎麼拉,體態都一樣!\n想要真正脫離駝背,\n手沿著地板滑的時候,\n盡量保持背貼地,\n不要拱起來。\n連續2分鐘,\n你會發現人馬上變直了!"}, {"id": "ex_day_378", "content_type": "單一動作", "source_type": "單一動作", "source_id": "378", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "這是你每天早晨用來改善高低肩的動作", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "交替招財貓", "difficulty": "進階", "order": "1", "card_reason": "「交替招財貓」適合放在前面，先讓肩膀比較不會往上跑，再接後面的動作。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「交替招財貓」這類動作，可以放在想測感覺時先做。", "movement_name": "交替招財貓", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "椅子、球", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BJGp4oZpq/", "content_status": "https://www.facebook.com/share/r/1BJGp4oZpq/", "raw_hook": "這是你每天早晨用來改善高低肩的動作", "raw_day": "378", "raw_page": "48-49", "raw_text": "一個超難,但能改善高低肩的動作\n()\n這是你每天早晨用來改善高低肩的動作\n怎麼知道自己不對稱?\n從生活中觀察。\n像我坐著時會習慣,\n左手撐在椅子扶手。\n就算坐正,\n左側肩胛\n還是默默比右邊低!\n一開始只是\n脖子特別容易緊,\n膏肓的地方悶悶的、不舒服。\n久了才發現,\n重心一直偏一邊,\n腰跟屁股也開始會痛,\n重訓時左邊特別難穩定!\n這個動作看起來簡單,\n但有高低肩的人,\n「好好控制肩胛」\n是很困難的!\n把頭墊高,\n先感覺肩胛怎麼動,\n而不只是勉強完成動作。"}, {"id": "ex_day_377_d167", "content_type": "單一動作", "source_type": "D", "source_id": "377", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "這是你在家也能好好練臀的動作", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "夾磚女神蹲", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓臀肌和髖的連結重新有反應，動作才會比較順。", "detail": "如果你常覺得練臀時腿先酸、屁股卻沒什麼感覺，先用「夾磚女神蹲」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "夾磚女神蹲", "movement_code": "D167", "sets_reps": "依影片跟練", "equipment": "瑜伽磚、軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18oJssMjYZ/", "content_status": "https://www.facebook.com/share/r/18oJssMjYZ/", "raw_hook": "這是你在家也能好好練臀的動作", "raw_day": "377", "raw_page": "50-51", "raw_text": "一個超級酸,但能幫你把臀練好的動作\n()\n如果你沒時間運動\n這是你在家也能好好練臀的動作\n我看到太多女生,\n不是不懂動作,\n而是出力不完整!\n所以練重訓,\n不是大腿越來越粗,\n就是腰容易酸。\n怎麼讓臀完整出力?\n用簡單的話來說,\n不是加重量\n是突破它原有的活動範圍。\n像這個動作,\n趴在地上,把臀大肌完整收縮,\n如果一開始抬不起來,\n或是很快就抽筋,\n這都很正常。\n堅持一周,\n你會發現\n練起來整個不一樣!"}, {"id": "ex_day_376_d196", "content_type": "單一動作", "source_type": "D", "source_id": "376", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "這是你用來調整足弓的動作", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "踮腳暫停", "difficulty": "進階", "order": "1", "card_reason": "「踮腳暫停」不是要你做到很酸，而是先整理足底支撐和下肢力線，讓站立會更穩。", "detail": "適合站久腳底塌、足弓撐不住的人，先做「踮腳暫停」找回該出力的位置，再回頭測原本不順的地方。", "movement_name": "踮腳暫停", "movement_code": "D196", "sets_reps": "依影片跟練", "equipment": "球", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18kPjpmXb9/", "content_status": "https://www.facebook.com/share/r/18kPjpmXb9/", "raw_hook": "這是你用來調整足弓的動作", "raw_day": "376", "raw_page": "52", "raw_text": "一個超難,但能幫你把腿拉直的動作\n(小腿粗是腳害的!)\n想要腿變直\n這是你用來調整足弓的動作\n腳掌分為內足弓和外足弓,\n內側負責緩衝,\n外側負責承重。\n而內側的大腳球,\n是整個下半身力線的起點,\n它一不穩,最常出現的問題就是\n小腿外擴、變粗、足弓塌陷。\n用簡單的話來說,\n這個地方踩穩了,\n往上到膝蓋、骨盆都對齊,\n腿就不容易歪!"}, {"id": "ex_day_375_d250", "content_type": "單一動作", "source_type": "D", "source_id": "375", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是你每天做一遍就好的動作", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "最好的伸展", "difficulty": "進階", "order": "1", "card_reason": "遇到背一邊緊、一邊凸時，可以先用「最好的伸展」把脊椎和胸廓的旋轉接回來。", "detail": "它比較像整理開關，先讓身體左右更容易平衡，再進入伸展或訓練會比較穩像「最好的伸展」這類動作，可以放在睡前先做。", "movement_name": "最好的伸展", "movement_code": "D250", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/14amMc6vCtQ/", "content_status": "https://www.facebook.com/share/r/14amMc6vCtQ/", "raw_hook": "這是你每天做一遍就好的動作", "raw_day": "375", "raw_page": "53", "raw_text": "一個超級緊,但能讓你年輕5歲的動作\n()\n如果你很忙沒時間\n這是你每天做一遍就好的動作\n現代人哪裡退化最快?\n其實是「旋轉」\n因為平常用不到,\n所以也很難發現!\n而和旋轉有關的螺旋線,\n會影響到淺背線、側線的整體張力。\n用簡單的話來說,\n旋轉差的人,\n身體其他功能也會被拖下水!\n骨盆穩住,手往上到極限,\n不要晃、不亂甩,\n一個動作,\n就幫你把全身都打開。"}, {"id": "ex_day_374_d191", "content_type": "單一動作", "source_type": "D", "source_id": "374", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是你每天都要做的動作", "purpose": "先鬆開", "secondary_purpose": "找回發力", "title": "夾磚魚擺尾", "difficulty": "進階", "order": "1", "card_reason": "這個動作主打脊椎不順，重點是先把過度緊繃降下來，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看身體左右更容易平衡，效果會比單純硬拉更清楚。", "movement_name": "夾磚魚擺尾", "movement_code": "D191", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18PYSH9Zrn/", "content_status": "https://www.facebook.com/share/r/18PYSH9Zrn/", "raw_hook": "這是你每天都要做的動作", "raw_day": "374", "raw_page": "57", "raw_text": "一個超難,但能改善下背緊繃的動作\n()\n老是下背痛\n這是你每天都要做的動作\n大家常說下背不舒服,\n其實是脊椎周圍的小肌肉撐不住,\n像腰方肌、腹斜肌,\n這些平常不太會動到的深層肌群。\n所以你一往側倒,\n發現根本碰不到地板,\n這不是老化,\n是「身體被過度保護」的表現!\n比起一直按摩,\n強化核心和控制力,\n才能真正脫離下背痛的輪迴。"}, {"id": "ex_day_373", "content_type": "單一動作", "source_type": "單一動作", "source_id": "373", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "這是你用來調正的動作", "purpose": "先鬆開", "secondary_purpose": "", "title": "單腿前彎", "difficulty": "中階", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看骨盆兩側和側腰支撐有沒有配合；「單腿前彎」就是做這件事。", "detail": "適合腰總是偏一邊不舒服，左右感覺差很多時使用；不用做到很深，先讓骨盆兩側和側腰支撐有反應就好像「單腿前彎」這類動作，可以放在走路後先做。", "movement_name": "單腿前彎", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚、牆面", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Zmsymcfdn/", "content_status": "https://www.facebook.com/share/r/1Zmsymcfdn/", "raw_hook": "這是你用來調正的動作", "raw_day": "373", "raw_page": "55-56", "raw_text": "一個超酸,但能改善骨盆不正的動作\n()\n骨盆歪了\n這是你用來調正的動作\n人體很聰明,\n它會「順著最常用的方式」去調整。\n背包一直揹左邊,\n翹腳都翹右腳,\n當你長期重複同一側,\n那側會變得超級強、超級緊,\n而另一側慢慢變弱。\n最後兩邊不同步,\n身體就歪了。\n做單邊動作時,\n你一定感覺得出來,\n有一邊特別難做。\n加強它,\n你的身體回正了。"}, {"id": "ex_day_372_d164", "content_type": "單一動作", "source_type": "D", "source_id": "372", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "臀型不好的人,", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "單腿轉髖", "difficulty": "進階", "order": "1", "card_reason": "「單腿轉髖」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當臀凹、假胯或屁股線條看起來被拉住，可以先做「單腿轉髖」；重點不是忍到很酸，而是讓髖臀張力和發力順序慢慢接回來。", "movement_name": "單腿轉髖", "movement_code": "D164", "sets_reps": "依影片跟練", "equipment": "滾筒、牆面", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18WrjKuZu3/", "content_status": "https://www.facebook.com/share/r/18WrjKuZu3/", "raw_hook": "臀型不好的人,", "raw_day": "372", "raw_page": "58", "raw_text": "一個超級難,但能練好上臀的動作\n()\n臀型不好的人,\n幾乎都有一個問題,\n就是不會用上臀!\n不管練深蹲、分腿蹲、RDL,\n只要上臀不發力,\n腿一定越練越粗。\n到最後,\n屁股是練大了,\n比例卻沒更好看。\n這個動作會直接打到\n上臀臀中肌,\n重量不是重點,\n細節到位才是關鍵!"}, {"id": "ex_day_371_d128", "content_type": "單一動作", "source_type": "D", "source_id": "371", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "這是最常見的原因,", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "Fig4伸展", "difficulty": "中階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整臀肌和髖的連結。", "detail": "練臀時腿先酸、屁股卻沒什麼感覺的時候，先別急著加難度，做完再看屁股比較容易上線有沒有改善。", "movement_name": "Fig4伸展", "movement_code": "D128", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Bku9LHk9a/", "content_status": "https://www.facebook.com/share/r/1Bku9LHk9a/", "raw_hook": "這是最常見的原因,", "raw_day": "371", "raw_page": "59-60", "raw_text": "一個超酸,但能改善假胯寬的動作\n()\n很多人有假胯寬,\n這是最常見的原因,\n脂肪堆積,\n加上臀肌太緊,\n向內一夾,\n外側兩坨肉就被擠出來。\n就算你的體脂不到20%\n假胯寬一樣會出現!\n這完全是後天造成的,\n兩側下垂的形狀,\n會讓正面更寬,還會把腿拉短!\n先把臀大肌拉開,\n形狀就會改善。\n再把臀練翹,\n一天一天,\n你就能擺脫它!"}, {"id": "ex_day_370", "content_type": "單一動作", "source_type": "單一動作", "source_id": "370", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "這是最快能讓肩胛復位的動作", "purpose": "改善線條", "secondary_purpose": "改善線條", "title": "碰手肘", "difficulty": "進階", "order": "1", "card_reason": "如果肩膀放不下來、肩胛也不太聽話，先做「碰手肘」，會比直接加強更容易找到感覺。", "detail": "適合肩膀放不下來、肩胛也不太聽話的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "碰手肘", "movement_code": "", "sets_reps": "100下", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GMMp9UR8x/", "content_status": "https://www.facebook.com/share/r/1GMMp9UR8x/", "raw_hook": "這是最快能讓肩胛復位的動作", "raw_day": "370", "raw_page": "61-62", "raw_text": "一個超級難,但能改善翼狀肩胛的動作\n()\n這是最快能讓肩胛復位的動作\n大家都知道,\n肩胛有分上迴旋和下迴旋,\n幾乎上半身的體態問題,\n都跟它有關!\n兩邊都下迴旋,\n肩膀看起來往下掉,\n這叫溜肩。\n一邊下迴旋太多、一邊太少,\n就變成高低肩。\n兩邊不對稱,\n肩胛骨貼不住胸廓,\n就變成翼狀肩胛!\n每天做100下,\n手肘碰在一起,\n讓你的肩胛歸位,\n變成直角肩!"}, {"id": "ex_day_369", "content_type": "單一動作", "source_type": "單一動作", "source_id": "369", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "這是你用來放鬆的動作", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "脛前肌伸展", "difficulty": "中階", "order": "1", "card_reason": "這類「小腿腳踝緊」常不是單一部位的問題，先從腳踝到小腿的張力開始整理。", "detail": "如果你常覺得小腿很硬、腳踝不靈活，先用「脛前肌伸展」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "脛前肌伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Dtn4EngBJ/", "content_status": "https://www.facebook.com/share/r/1Dtn4EngBJ/", "raw_hook": "這是你用來放鬆的動作", "raw_day": "369", "raw_page": "63", "raw_text": "一個很酸,但能改善腳踝很緊的動作\n()\n小腿前側好緊?\n這是你用來放鬆的動作\n很多女生習慣靠牆抬腿,\n讓血液回流,順便放鬆小腿。\n但你可能不知道,\n小腿拉太多,\n反而會讓腳踝活動度下降!\n這和脛前肌跟距骨有關。\n用簡單的話來說,\n你蹲下去的時候,\n腳踝卡卡的,\n腳跟還會翹起來。\n筋膜的張力平衡很重要,\n下次拉小腿的時候,\n前側也要一起伸展!"}, {"id": "ex_day_368", "content_type": "單一動作", "source_type": "單一動作", "source_id": "368", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "這是你下班回家要做的伸展", "purpose": "先鬆開", "secondary_purpose": "", "title": "眼鏡蛇式", "difficulty": "中階", "order": "1", "card_reason": "先用「眼鏡蛇式」把骨盆兩側的控制叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓骨盆兩側的控制找到方向，通常比一次做到很深更有用。", "movement_name": "眼鏡蛇式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "椅子", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18L82v5MAz/", "content_status": "https://www.facebook.com/share/r/18L82v5MAz/", "raw_hook": "這是你下班回家要做的伸展", "raw_day": "368", "raw_page": "65", "raw_text": "一個很伸展,但能拉開淺前線的動作\n()\n這是你下班回家要做的伸展\n我們身體前方有一條筋膜線,\n叫做淺前線,\n從骨盆往上,經過腹直肌,\n一路連到脖子。\n久坐久了,\n身體就像被固定在椅子上,\n淺前線也縮成一團,\n胸悶、脖子緊,骨盆歪掉!\n首先,把髖往前頂,\n上半身像弓箭往後繃緊,\n配合呼吸,\n往天花板拉長下巴。\n做完你會神清氣爽,\n一天的疲憊全部清掉!"}, {"id": "ex_day_367", "content_type": "單一動作", "source_type": "單一動作", "source_id": "367", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是你用來改善高低肩的伸展", "purpose": "先鬆開", "secondary_purpose": "改善線條", "title": "側彎伸展", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓身體先不要一直繃著；先求控制清楚，不用急著做很深。", "detail": "適合背一邊緊、一邊凸，轉身也不太順時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "側彎伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DiwoAsSF7/", "content_status": "https://www.facebook.com/share/r/1DiwoAsSF7/", "raw_hook": "這是你用來改善高低肩的伸展", "raw_day": "367", "raw_page": "67-68", "raw_text": "一個超級緊,但能改善高低肩的動作\n()\n高低肩的剋星\n這是你用來改善高低肩的伸展\n高低肩不是只有肩膀歪,\n真正的問題在背:\n闊背肌不會出力、肩胛骨不會動,\n上中下不協調,\n一脫衣就全看出來。\n久了就變成:\n✔ 肩膀一高一低\n✔ 肩胛骨不對稱\n✔ 甚至脊椎側彎\n先往側倒伸展下背,\n再彎手肘,\n拉開上背肩胛,\n一個動作,\n就幫你把上中下背都拉開!"}, {"id": "ex_day_366_d166", "content_type": "單一動作", "source_type": "D", "source_id": "366", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "這是你用來改善腰痛的動作", "purpose": "找回發力", "secondary_purpose": "找回發力", "title": "側支撐起身", "difficulty": "中階", "order": "1", "card_reason": "「側支撐起身」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看腰不用一直自己扛，效果會比單純硬拉更清楚。", "movement_name": "側支撐起身", "movement_code": "D166", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CZbo4Ekam/", "content_status": "https://www.facebook.com/share/r/1CZbo4Ekam/", "raw_hook": "這是你用來改善腰痛的動作", "raw_day": "366", "raw_page": "69-70", "raw_text": "一個很伸展,但能改善久坐腰痛的動作\n()\n坐一下腰好酸怎半?\n這是你用來改善腰痛的動作\n人體的肌肉分為淺層和深層,\n淺層負責動作,\n深層負責穩定。\n而腰周圍的腹斜肌、腰方肌,\n同時具備這兩種角色。\n用更好懂的話來說,\n當你的坐姿不好,\n它們就會偏向淺層用力,\n進入代償模式。\n少了深層穩定,\n久了自然就腰酸背痛。\n用伸直的腿出力,\n把身體撐起來\n手不會酸,\n腰也拉得更開!"}, {"id": "ex_day_365", "content_type": "單一動作", "source_type": "單一動作", "source_id": "365", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "這是你每天睡前要做的動作", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "單腿眼鏡蛇", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓骨盆兩側的控制重新有反應，動作才會比較順。", "detail": "不要急著追求痠痛感，先讓骨盆兩側的控制變得比較會配合，身體才不會越練越緊。", "movement_name": "單腿眼鏡蛇", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Br1a98W5y/", "content_status": "https://www.facebook.com/share/r/1Br1a98W5y/", "raw_hook": "這是你每天睡前要做的動作", "raw_day": "365", "raw_page": "71-72", "raw_text": "一個超酸,但能改善骨盆歪斜的動作\n()\n骨盆不正怎麼喬?\n這是你每天睡前要做的動作\n人體的肌肉很複雜,\n尤其是骨盆這一帶。\n很多人不知道,\n臀部肌肉其實能外旋也能內旋,\n答案就在髖關節的屈伸角度。\n用簡單的話來說,\n影片裡這個開腿的眼鏡蛇式,\n深層臀肌要做外旋。\n而鴿式雖然也是打開腿,\n但會轉成內旋。\n多看我的影片、跟著做,\n你不用自己摸索,\n放鬆骨盆又快又有效!"}, {"id": "ex_day_364", "content_type": "單一動作", "source_type": "單一動作", "source_id": "364", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "這是你練習鴿式的小技巧", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "勾腳鴿式", "difficulty": "中階", "order": "1", "card_reason": "「勾腳鴿式」不是要你做到很酸，而是先整理臀肌和髖的連結，讓屁股比較容易上線。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺的人，先做「勾腳鴿式」先把過度緊繃降下來，再回頭測原本不順的地方。", "movement_name": "勾腳鴿式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GfvLvReWX/", "content_status": "https://www.facebook.com/share/r/1GfvLvReWX/", "raw_hook": "這是你練習鴿式的小技巧", "raw_day": "364", "raw_page": "73-74", "raw_text": "一個常搞混,但能幫你練好鴿式的動作\n()\n鴿式到底腳怎麼擺?\n這是你練習鴿式的小技巧\n以前我也鴿式不下去,\n老師叫我把小腿勾進來,\n但這樣真的對嗎?\n身體的肌肉,\n即使差一點點角度,\n主導的肌群完全不同。\n拿鴿式來說,\n小腿勾進來,\n你拉到的是大腿內側。\n小腿往前擺正,\n才是深層臀肌!\n所以能坐下去,\n不等於練對地方。\n試試看我說的對不對,\n但記得無論哪個版本,\n骨盆都要朝正前方,\n才會真的有效!"}, {"id": "ex_day_363_d117", "content_type": "單一動作", "source_type": "D", "source_id": "363", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "就像每天走路,", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "鴿式前弓步", "difficulty": "進階", "order": "1", "card_reason": "遇到開髖做很多還是覺得髖轉不順時，可以先用「鴿式前弓步」把骨盆和大腿的活動接回來。", "detail": "開髖做很多還是覺得髖轉不順的時候，先別急著加難度，做完再看髖比較能轉開有沒有改善像「鴿式前弓步」這類動作，可以放在睡前先做。", "movement_name": "鴿式前弓步", "movement_code": "D117", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/15kgDNxesmf/", "content_status": "https://www.facebook.com/share/r/15kgDNxesmf/", "raw_hook": "就像每天走路,", "raw_day": "363", "raw_page": "75-76", "raw_text": "一個超級難,但能幫你快速開髖的動作\n()\n你是在運動還是勞動?\n我很常被問到,\n請問這要做幾下?做多久?\n網路上開髖、練髖的動作很多,\n真正有效的關鍵只有兩個字\n強度。\n就像每天走路,\n也不會突然跑100公尺變超快,\n每天切菜,\n手臂也不會自己變細。\n活動度訓練也是一樣,\n找到你身體需要的方向,\n再把強度補上,\n效果才會真的出來。\n不過,強度要多強才夠?\n在我的體態改造計畫裡,\n能做到五顆星動作,\n那就叫真正的訓練!"}, {"id": "ex_day_362", "content_type": "單一動作", "source_type": "單一動作", "source_id": "362", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "這是你用來改善膏肓痛的動作", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "肩胛迴轉", "difficulty": "中階", "order": "1", "card_reason": "這個動作主打肩胛控制差，重點是找回該出力的位置，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先找回該出力的位置，讓後面的動作比較不會亂用力像「肩胛迴轉」這類動作，可以放在久坐後先做。", "movement_name": "肩胛迴轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "球", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Ddpm1vDE2/", "content_status": "https://www.facebook.com/share/r/1Ddpm1vDE2/", "raw_hook": "這是你用來改善膏肓痛的動作", "raw_day": "362", "raw_page": "77", "raw_text": "一個超緊,但能改善膏肓痛的動作\n()\n這是你用來改善膏肓痛的動作\n我們的肩胛有兩種模式,\n把手抬高,就會上迴旋,\n平常手放下來,這叫下迴旋。\n久坐、低頭、滑手機久了,\n肩胛容易卡在下迴旋,\n看起來就像溜肩,\n肩膀往兩邊垂下去。\n這時候不是按摩就好,\n要把肩胛帶回正常軌道。\n跟著這個動作做,\n肩胛一打開,\n痛感突然消失一大半!"}, {"id": "ex_day_361", "content_type": "單一動作", "source_type": "單一動作", "source_id": "361", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "這是你每天都該做的伸展", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "分腿伸展", "difficulty": "中階", "order": "1", "card_reason": "想讓關節動得更順，先看骨盆和大腿的活動有沒有配合；「分腿伸展」就是做這件事。", "detail": "適合開髖做很多還是覺得髖轉不順時使用；不用做到很深，先讓骨盆和大腿的活動有反應就好像「分腿伸展」這類動作，可以放在走路後先做。", "movement_name": "分腿伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊、球", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18P8igjKhe/", "content_status": "https://www.facebook.com/share/r/18P8igjKhe/", "raw_hook": "這是你每天都該做的伸展", "raw_day": "361", "raw_page": "78", "raw_text": "一個很有感,但能改善久坐僵硬的動作\n()\n這是你每天都該做的伸展\n我以前很努力重訓,\n但越練反而越僵硬,\n有點迷失自己!\n後來才發現,\n現在連世界級選手都在練柔韌性,\n像喬科維奇可以劈腿接球,\n文班亞馬220公分,卻很靈活,\n山本由伸能輕鬆倒立。\n他們不是為了好看,\n而是因為活動度 = 身體性能。\n尤其久坐久站、髖緊的人,\n釋放大腿前後的筋膜,\n你會感覺步伐更輕、動作更效率!"}, {"id": "ex_day_360", "content_type": "單一動作", "source_type": "單一動作", "source_id": "360", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "這是用來改善鴿式下不去的技巧", "purpose": "活動度", "secondary_purpose": "活動度", "title": "單腿內轉", "difficulty": "中階", "order": "1", "card_reason": "「單腿內轉」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓骨盆和大腿的活動找到方向，通常比一次做到很深更有用。", "movement_name": "單腿內轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CbLWEqPCe/", "content_status": "https://www.facebook.com/share/r/1CbLWEqPCe/", "raw_hook": "這是用來改善鴿式下不去的技巧", "raw_day": "360", "raw_page": "79-80", "raw_text": "一個超酸,但能改善鴿式卡卡的技巧\n(鴿式天鵝式卡住看這邊)\n鴿式坐下不去怎麼辦?\n這是用來改善鴿式下不去的技巧\n骨盆有外旋、內旋兩個方向,\n但臀部肌肉的功能,\n其實更加複雜。\n像是深層臀肌,\n它同時能外旋和內旋,\n是不是有點神奇?\n懂得這一點,\n你就能用更聰明的方法,\n去打開活動度。\n試著照這樣做,\n再回到鴿式,\n你會發現:原本屁股卡住的地方,\n突然就能貼下去了。"}, {"id": "ex_day_359", "content_type": "單一動作", "source_type": "單一動作", "source_id": "359", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是你每天起床後要做的動作", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "淺前淺背", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整脊椎和胸廓的旋轉，像「淺前淺背」這類動作可以放在收操時先試。", "detail": "它比較像整理開關，先讓身體左右更容易平衡，再進入伸展或訓練會比較穩像「淺前淺背」這類動作，可以放在收操時先做。", "movement_name": "淺前淺背", "movement_code": "", "sets_reps": "3 分鐘", "equipment": "毛巾", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18cNmBCKsy/", "content_status": "https://www.facebook.com/share/r/18cNmBCKsy/", "raw_hook": "這是你每天起床後要做的動作", "raw_day": "359", "raw_page": "81", "raw_text": "一個超級難,但能脊椎很有幫助的動作\n()\n這是你每天起床後要做的動作\n把脊椎想成一條毛巾,\n它可以折起來,\n也可以扭緊,\n更影響著上半身與下半身的連動。\n不論你有沒有脊椎問題,\n還是想改善頭痛、\n或是臀凹陷、體態不平衡,\n都該花幾秒看看,\n自己能不能做到這個動作。\n明天提早3 分鐘起來,\n配上一杯溫開水,\n讓自己的一天,從身體甦醒開始。"}, {"id": "ex_day_358_d137", "content_type": "單一動作", "source_type": "D", "source_id": "358", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "這是我每天都會做的動作", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "9090轉開", "difficulty": "進階", "order": "1", "card_reason": "如果臀凹、假胯或屁股線條看起來被拉住，先做「9090轉開」，會比直接加強更容易找到感覺。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "9090轉開", "movement_code": "D137", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1bWLPG6TVh/", "content_status": "https://www.facebook.com/share/r/1bWLPG6TVh/", "raw_hook": "這是我每天都會做的動作", "raw_day": "358", "raw_page": "82-83", "raw_text": "一個超難,但能快速打開骨盆的動作\n()\n屁股線條不好看?\n這是我每天都會做的動作\n想要開髖,直接做這個!\n又省時間、又省錢。\n先坐在地上,\n找到你的兩塊坐骨,\n固定一隻腳,慢慢轉另一隻。\n一開始會超酸,\n但撐過去就開了!\n女生如果常穿瑜珈褲或緊身短褲,\n久坐又不開髖,\n再好的褲子都撐不起來。\n打開髖之後,\n臀型自然更挺、更圓、更好看。"}, {"id": "ex_day_357", "content_type": "單一動作", "source_type": "單一動作", "source_id": "357", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "如果你做這個動作,", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "側90起身", "difficulty": "中階", "order": "1", "card_reason": "這類「髖卡打不開」常不是單一部位的問題，先從骨盆和大腿的活動開始整理。", "detail": "不要急著追求痠痛感，先讓骨盆和大腿的活動變得比較會配合，身體才不會越練越緊。", "movement_name": "側90起身", "movement_code": "", "sets_reps": "5 秒", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1NDmM32VrL/", "content_status": "https://www.facebook.com/share/r/1NDmM32VrL/", "raw_hook": "如果你做這個動作,", "raw_day": "357", "raw_page": "84-85", "raw_text": "一個超酸,但能改善髖部卡卡的動作\n()\n如果你做這個動作,\n總是覺得常抽筋、很吃力,\n那這個動作,請你一定要收藏。\n很多人以為動作做不到,\n只要拼命練、咬牙就會突破。\n但其實不是。\n因為每個動作,\n肌肉扮演的角色都不一樣。\n懂得人體的運作,\n你才會找到真正的突破口。\n試著撐住5 秒,\n你會發現原本卡關的地方,\n突然變得輕鬆流暢了。\n如果你不太熟悉的話\n記得追蹤我,"}, {"id": "ex_day_356", "content_type": "單一動作", "source_type": "單一動作", "source_id": "356", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是脊椎側彎、", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "趴姿接棒", "difficulty": "中階", "order": "1", "card_reason": "先用「趴姿接棒」把脊椎和胸廓的旋轉叫回來，後面的訓練才不容易跑偏。", "detail": "當背一邊緊、一邊凸，轉身也不太順，可以先做「趴姿接棒」；重點不是忍到很酸，而是讓脊椎和胸廓的旋轉慢慢接回來。", "movement_name": "趴姿接棒", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CATmdrjQH/", "content_status": "https://www.facebook.com/share/r/1CATmdrjQH/", "raw_hook": "這是脊椎側彎、", "raw_day": "356", "raw_page": "86-87", "raw_text": "一個累累,但脊椎側彎很需要的動作\n()\n脊椎側彎怎麼救?\n這是脊椎側彎、\n高低肩的人每天要做的動作。\n我們的背被脊椎分成兩側。\n理想狀態下,左右應該要平衡。\n但現代人背部肌肉太弱,\n弱到連日常生活都撐不住,\n更別說還要彼此協調。\n結果就是\n脊椎側彎、翼狀肩胛、膏肓痛,\n全都來報到。\n讓左右恢復彈性,\n你會發現\n那股悶痛瞬間消了一大半。"}, {"id": "ex_day_355", "content_type": "單一動作", "source_type": "單一動作", "source_id": "355", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是用來改善下背痛的動作", "purpose": "先鬆開", "secondary_purpose": "找回發力", "title": "蠍子式", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓身體先不要一直繃著；先求控制清楚，不用急著做很深，像「蠍子式」這類動作可以放在身體很緊時先試。", "detail": "適合背一邊緊、一邊凸，轉身也不太順時先做一輪，重點是感覺變清楚，不是把動作做大像「蠍子式」這類動作，可以放在身體很緊時先做。", "movement_name": "蠍子式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1J2H1ysv1x/", "content_status": "https://www.facebook.com/share/r/1J2H1ysv1x/", "raw_hook": "這是用來改善下背痛的動作", "raw_day": "355", "raw_page": "88", "raw_text": "一個超緊,但能改善慢性腰痛的動作\n()\n這是用來改善下背痛的動作\n我們身上有左右兩條螺旋線,\n從腹外斜連著對側的腹內斜。\n用更好懂的話來說,\n就像值星官背帶,\n交錯支撐身體。\n當這兩條背帶失衡,\n就可能出現腰痛、\n脊椎側彎、還會胸悶。\n所以,下次腰痛時,\n別只盯著下背。\n從整條筋膜線去調整,\n才是更聰明、也更有效的方式。"}, {"id": "ex_day_354", "content_type": "單一動作", "source_type": "單一動作", "source_id": "354", "body_part": "腿型", "pain_point": "大腿前側緊", "pain_point_original": "(大腿是被走粗的!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "單腿躺椅", "difficulty": "中階", "order": "1", "card_reason": "「單腿躺椅」適合放在前面，先讓前側線條比較不會一直緊繃，再接後面的動作。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力像「單腿躺椅」這類動作，可以放在想測感覺時先做。", "movement_name": "單腿躺椅", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Dvie27zUB/", "content_status": "https://www.facebook.com/share/r/1Dvie27zUB/", "raw_hook": "(大腿是被走粗的!)", "raw_day": "354", "raw_page": "90", "raw_text": "一個超有感,但能瘦大腿前側的動作\n(大腿是被走粗的!)\n大腿前側是被你走粗的\n只要重心一往前,\n大腿前側就會被迫出力,\n肌肉越用力,前面就越凸!\n但好消息是\n只要調整一點點,\n讓前側拉開,\n腿看起來會瞬間細一截!\n但別忘了,\n真正的關鍵還在站姿和走路。\n從根本改,效果才會持久!"}, {"id": "ex_day_353", "content_type": "單一動作", "source_type": "單一動作", "source_id": "353", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "骨盆一高一低?", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "側轉伸展", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓骨盆兩側和側腰支撐重新有反應，動作才會比較順。", "detail": "如果你常覺得腰總是偏一邊不舒服，先用「側轉伸展」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "側轉伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1PCzwroWe7/", "content_status": "https://www.facebook.com/share/r/1PCzwroWe7/", "raw_hook": "骨盆一高一低?", "raw_day": "353", "raw_page": "89", "raw_text": "一個很伸展,但能改善骨盆歪斜的動作\n()\n骨盆一高一低?\n很多人第一反應是:\n「那我就往反方向調!」\n錯。\n你的身體不是開關,\n是整個系統在維持平衡。\n你只調一邊,\n結果一站起來,馬上又歪回去。\n真正有效的方法是:\n做單邊動作,但是兩邊都做!\n像這個動作,腳尖要朝前,\n小拇指壓住地面,\n還能多30%效果喔!"}, {"id": "ex_day_352", "content_type": "單一動作", "source_type": "單一動作", "source_id": "352", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(想劈腿?先鬆屁股!)", "purpose": "活動度", "secondary_purpose": "活動度", "title": "9090側轉", "difficulty": "中階", "order": "1", "card_reason": "「9090側轉」不是要你做到很酸，而是先整理腰背和骨盆的分工，讓腰不用一直自己扛。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人，先做「9090側轉」把活動範圍慢慢打開，再回頭測原本不順的地方。", "movement_name": "9090側轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18eBFnc166/", "content_status": "https://www.facebook.com/share/r/18eBFnc166/", "raw_hook": "(想劈腿?先鬆屁股!)", "raw_day": "352", "raw_page": "91", "raw_text": "一個超級酸,但能讓你年輕5歲的動作\n(想劈腿?先鬆屁股!)\n你可以劈腿嗎?\n骨盆其實分為外旋轉和內旋轉,\n可是外旋太多,內旋太少,\n90%的人都有這種失衡。\n結果臀部深層的小肌肉太緊,\n髖關節就被鎖住,\n腰痠、屁股痛、腿也開始麻。\n只要把這些小肌肉轉開,\n你就能解鎖劈腿,\n身體也重回年輕時期!"}, {"id": "ex_day_351", "content_type": "單一動作", "source_type": "單一動作", "source_id": "351", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(細節到位,骨盆才會對位)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "後傾青蛙趴", "difficulty": "中階", "order": "1", "card_reason": "遇到開髖做很多還是覺得髖轉不順時，可以先用「後傾青蛙趴」把骨盆和大腿的活動接回來。", "detail": "它比較像整理開關，先讓髖比較能轉開，再進入伸展或訓練會比較穩。", "movement_name": "後傾青蛙趴", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18i3hNiop7/", "content_status": "https://www.facebook.com/share/r/18i3hNiop7/", "raw_hook": "(細節到位,骨盆才會對位)", "raw_day": "351", "raw_page": "94", "raw_text": "一個超酸,但能改善骨盆前傾的動作\n(細節到位,骨盆才會對位)\n◤骨盆前傾怎麼處理?◢\n很多人以為\n只要把骨盆「往後傾」一點,\n就能抵銷前傾的問題。\n但一動起來,\n骨盆又跑回去了。\n因為你用到的,只是淺層肌。\n要真的改變體態,\n關鍵在「深層肌」!\n盡可能拱起你的腰椎,\n拉開大內收肌,\n這才是有效的的動作!"}, {"id": "ex_day_350", "content_type": "單一動作", "source_type": "單一動作", "source_id": "350", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "◤臀凹陷怎麼改善?◢", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "天鵝式", "difficulty": "進階", "order": "1", "card_reason": "這個動作主打練臀沒感覺，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看屁股比較容易上線，效果會比單純硬拉更清楚。", "movement_name": "天鵝式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Cp3YcTtzz/", "content_status": "https://www.facebook.com/share/r/1Cp3YcTtzz/", "raw_hook": "◤臀凹陷怎麼改善?◢", "raw_day": "350", "raw_page": "92-93", "raw_text": "一個超級難,但能改善臀凹陷的動作\n()\n◤臀凹陷怎麼改善?◢\n我從線上到實體課,\n發現90% 女生都有臀凹陷,\n但她們都有一個共通點 - 太忙。\n要顧小孩、要上班、\n根本沒時間運動。\n但這樣下去,\n體態只會惡性循環,\n沒有回正的一天。\n所以我想教你一個,\n在家就能做的動作!\n雙手雙腳伸直,\n讓重量自然拉開深層臀肌。\n幾分鐘後,\n你的臀型就會改變!"}, {"id": "ex_day_349", "content_type": "單一動作", "source_type": "單一動作", "source_id": "349", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(鏟子超人們請服用)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "夾腿麻花", "difficulty": "中階", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看腰背和骨盆的分工有沒有配合；「夾腿麻花」就是做這件事。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時使用；不用做到很深，先讓腰背和骨盆的分工有反應就好。", "movement_name": "夾腿麻花", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1E7fqjB5uC/", "content_status": "https://www.facebook.com/share/r/1E7fqjB5uC/", "raw_hook": "(鏟子超人們請服用)", "raw_day": "349", "raw_page": "95", "raw_text": "一個很舒服,還能改善久站腰痛的動作\n(鏟子超人們請服用)\n◤鏟子超人們,請服用!◢\n如果你也是腰痛一族,\n或是最近救災、搬東⻄後開始腰痠,\n這個動作請服用。\n腰是最愛逞強的部位。\n手沒力,它幫忙。\n腳沒力,它撐著。\n核心沒力,它全部扛起來。\n所以,會痠一點都不奇怪,\n該讓它休息一下!\n肩膀貼地、雙腳纏在一起,\n慢慢倒向一邊,\n你會聽到腰鬆開的聲音!"}, {"id": "ex_day_348", "content_type": "單一動作", "source_type": "單一動作", "source_id": "348", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "◤骨盆歪的真相◢", "purpose": "先鬆開", "secondary_purpose": "", "title": "單內收彎腰", "difficulty": "中階", "order": "1", "card_reason": "「單內收彎腰」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當腰總是偏一邊不舒服，左右感覺差很多，可以先做「單內收彎腰」；重點不是忍到很酸，而是讓骨盆兩側和側腰支撐慢慢接回來。", "movement_name": "單內收彎腰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18X28x4U42/", "content_status": "https://www.facebook.com/share/r/18X28x4U42/", "raw_hook": "◤骨盆歪的真相◢", "raw_day": "348", "raw_page": "98-99", "raw_text": "一個很有感,還能改善骨盆不正的動作\n◤骨盆歪的真相◢\n如果你的骨盆不正,\n你會選哪個方法?\n1.整骨\n2.拉筋\n3.練弱側肌肉\n這些聽起來合理,\n但都只是治標!\n骨盆就像帳篷,\n四周插滿大大小小的釘子,\n只要有幾根沒插緊,\n帳篷就會傾斜。\n骨盆也是一樣,\n小肌肉不出力,骨盆就會跑位。\n真正的解法,\n是透過動作誘發小肌肉,\n張力平衡,骨盆自然回正!"}, {"id": "ex_day_347_d137", "content_type": "單一動作", "source_type": "D", "source_id": "347", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "◤超過30歲,沒人能一次成功◢", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "9090轉開", "difficulty": "中階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「9090轉開」這類動作可以放在收操時先試。", "detail": "久坐後腰下方很緊、站起來總覺得腰在頂著的時候，先別急著加難度，做完再看腰不用一直自己扛有沒有改善像「9090轉開」這類動作，可以放在收操時先做。", "movement_name": "9090轉開", "movement_code": "D137", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B7zeAQc47/", "content_status": "https://www.facebook.com/share/r/1B7zeAQc47/", "raw_hook": "◤超過30歲,沒人能一次成功◢", "raw_day": "347", "raw_page": "97", "raw_text": "一個超級酸,但能快速打開骨盆的動作\n◤超過30歲,沒人能一次成功◢\n骨盆的旋轉功能,是退化最快的,\n而當它變弱,\n腰跟大腿就開始代償,\n用更好懂的話來說,\n這個動作越轉不起來,\n你會越容易腰酸,大腿也易粗。\n所以你越不滿意體態,\n越該從這裡開始。\n現在就跟著我一起做!"}, {"id": "ex_day_346_d318", "content_type": "單一動作", "source_type": "D", "source_id": "346", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "◤脊椎卡住怎麼辦◢", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "大風車", "difficulty": "進階", "order": "1", "card_reason": "如果背一邊緊、一邊凸，先做「大風車」，會比直接加強更容易找到感覺。", "detail": "適合背一邊緊、一邊凸，轉身也不太順的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "大風車", "movement_code": "D318", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18b5EuX4Qg/", "content_status": "https://www.facebook.com/share/r/18b5EuX4Qg/", "raw_hook": "◤脊椎卡住怎麼辦◢", "raw_day": "346", "raw_page": "100", "raw_text": "一個超難,但能鬆開僵硬脊椎的動作\n◤脊椎卡住怎麼辦◢\n如果你常駝背,\n肩頸像石頭一樣硬,\n做這個動作,求求了!\n第一次做,\n你一定會覺得超卡,\n完全轉不起來,\n頭跟屁股還會亂跑。\n放心,這就是脊椎太僵。\n動作要點:\n頭狠狠往前頂,屁股往後推,\n拉長脊椎後,\n用側腰旋轉去帶動。\n當你能做到這一步,\n肩頸會瞬間鬆開,超舒服!"}, {"id": "ex_day_345_d185", "content_type": "單一動作", "source_type": "D", "source_id": "345", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "這是適合你上班做的伸展。", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "前鋸肌伸展", "difficulty": "中階", "order": "1", "card_reason": "這類「圓肩厚背」常不是單一部位的問題，先從胸口和肩胛位置開始整理。", "detail": "如果你常覺得肩膀往前捲、背看起來厚，先用「前鋸肌伸展」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "前鋸肌伸展", "movement_code": "D185", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1J8jtKt73Y/", "content_status": "https://www.facebook.com/share/r/1J8jtKt73Y/", "raw_hook": "這是適合你上班做的伸展。", "raw_day": "345", "raw_page": "102", "raw_text": "◤一個很爽,又能改善圓肩駝背的動作◢\n(上班族的救命稻草!)\n這是適合你上班做的伸展。\n只要是久坐類型的工作,\n圓肩、肩內扣、駝背,\n我沒看過例外。\n把手肘靠在桌子或牆壁,\n肩膀會瞬間放鬆,\n再搭配「吸1吐3」的正念呼吸,\n你的肩膀會很喜歡,\n緊繃的情緒也跟著消散!"}, {"id": "ex_day_344_d285; d318", "content_type": "單一動作", "source_type": "D", "source_id": "344", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "(簡單又有效,再多介紹些!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "墊高離心腿後", "difficulty": "中階", "order": "1", "card_reason": "先用「墊高離心腿後」把骨盆兩側的控制叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓骨盆兩側的控制找到方向，通常比一次做到很深更有用像「墊高離心腿後」這類動作，可以放在下次訓練前先做。", "movement_name": "墊高離心腿後", "movement_code": "D285; D318", "sets_reps": "30分鐘", "equipment": "瑜伽磚", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1D3B6xNxRP/", "content_status": "https://www.facebook.com/share/r/1D3B6xNxRP/", "raw_hook": "(簡單又有效,再多介紹些!)", "raw_day": "344", "raw_page": "96", "raw_text": "一個超酸,但能改善骨盆歪斜的動作\n(簡單又有效,再多介紹些!)\n◤骨盆到底多容易歪?◢\n如果你大腿內側麻麻的,\n別去亂整骨,改做這個動作!\n骨盆到底多容易歪?\n只要你側著歪坐30分鐘,\n它就會跑位。\n所以,問題不是骨頭,\n而是肌肉在適應錯誤姿勢!\n反過來說,靠動作調整,\n不僅是最直觀,\n也是效果最長久的方法!"}, {"id": "ex_day_342_d219", "content_type": "單一動作", "source_type": "D", "source_id": "342", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(鴿式做太多,害了你!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "髖CARs", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓力量不要再跑錯地方；先求控制清楚，不用急著做很深，像「髖CARs」這類動作可以放在身體很緊時先試。", "detail": "適合開髖做很多還是覺得髖轉不順時先做一輪，重點是感覺變清楚，不是把動作做大像「髖CARs」這類動作，可以放在身體很緊時先做。", "movement_name": "髖CARs", "movement_code": "D219", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BnSNbuYHD/", "content_status": "https://www.facebook.com/share/r/1BnSNbuYHD/", "raw_hook": "(鴿式做太多,害了你!)", "raw_day": "342", "raw_page": "105", "raw_text": "◤一個超級難,但能改善大腿卡的動作◢\n(鴿式做太多,害了你!)\n很多人做瑜伽,\n卻發現大腿越來越卡、還喀喀響。\n其實不是壞掉,\n而是骨盆只用外轉,缺了內轉。\n別以為鴿式做很多,\n就代表骨盆更健康!\n真正的健康,\n不是體式做得多漂亮,\n而是內外能平衡!"}, {"id": "ex_day_341_d179", "content_type": "單一動作", "source_type": "D", "source_id": "341", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "有一個動作能同時改善這三大困擾,", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "屈膝內收延伸", "difficulty": "中階", "order": "1", "card_reason": "「屈膝內收延伸」適合放在前面，先讓臀線比較容易往上整理，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看臀線比較容易往上整理，效果會比單純硬拉更清楚像「屈膝內收延伸」這類動作，可以放在想測感覺時先做。", "movement_name": "屈膝內收延伸", "movement_code": "D179", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1JZrfFeMAs/", "content_status": "https://www.facebook.com/share/r/1JZrfFeMAs/", "raw_hook": "有一個動作能同時改善這三大困擾,", "raw_day": "341", "raw_page": "106", "raw_text": "◤一個很有感,還能讓你臀型改善的動作◢\n(屁股方方的怎麼辦?)\n我被私訊頻率最高的問題:\n「我屁股好方,要怎麼辦?」\n女生很在意的:臀凹陷、假胯寬、方形臀,\n就算健身好幾年,還是很多人有。\n但如果我說,\n有一個動作能同時改善這三大困擾,\n你願意試試看嗎?"}, {"id": "ex_day_340", "content_type": "單一動作", "source_type": "單一動作", "source_id": "340", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "這是我每天早上喚醒身體的動作。", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "Fig4開髖", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓骨盆和大腿的活動重新有反應，動作才會比較順。", "detail": "不要急著追求痠痛感，先讓骨盆和大腿的活動變得比較會配合，身體才不會越練越緊像「Fig4開髖」這類動作，可以放在動作前面先做。", "movement_name": "Fig4開髖", "movement_code": "", "sets_reps": "3分鐘", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1JYDUutNq1/", "content_status": "https://www.facebook.com/share/r/1JYDUutNq1/", "raw_hook": "這是我每天早上喚醒身體的動作。", "raw_day": "340", "raw_page": "103", "raw_text": "◤一個很舒服,可以讓身體甦醒的動作◢\n(早晨的舒醒小招式)\n這是我每天早上喚醒身體的動作。\n大家都知道,\n睡覺時,肌肉不會自己放鬆,\n所以一醒來,我會先活動腰和骨盆,\n再開始一天的工作或游泳。\n明天試試提早3分鐘,\n跟著做,保證精神滿滿!"}, {"id": "ex_day_339_d121", "content_type": "單一動作", "source_type": "D", "source_id": "339", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(腿彎彎,其實能救!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "靠牆娘娘蹲", "difficulty": "中階", "order": "1", "card_reason": "「靠牆娘娘蹲」不是要你做到很酸，而是先整理髖、膝、腳踝的配合，讓膝蓋壓力會比較少。", "detail": "適合跑跳或蹲跪時膝蓋不安心的人，先做「靠牆娘娘蹲」找回該出力的位置，再回頭測原本不順的地方。", "movement_name": "靠牆娘娘蹲", "movement_code": "D121", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17g9SqsN5f/", "content_status": "https://www.facebook.com/share/r/17g9SqsN5f/", "raw_hook": "(腿彎彎,其實能救!)", "raw_day": "339", "raw_page": "107", "raw_text": "◤一個好酸好酸,但能讓你腿變直的動作◢\n(腿彎彎,其實能救!)\n如果你膝蓋內側鼓包,\n那不是脂肪,是骨頭往裡歪掉了!\n尤其常翹腳、內八走路,\n甚至懷孕鬆弛素影響,\n腿型都容易跑掉。\n想要腿變直,\n一定要先控制膝蓋方向,\n跟著腳尖走,\n這樣才能修正腿型,也保護膝蓋!"}, {"id": "ex_day_338", "content_type": "單一動作", "source_type": "單一動作", "source_id": "338", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(為什麼屁股練不翹?)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "四足前傾後傾", "difficulty": "中階", "order": "1", "card_reason": "遇到練臀時腿先酸、屁股卻沒什麼感覺時，可以先用「四足前傾後傾」把臀肌和髖的連結接回來。", "detail": "練臀時腿先酸、屁股卻沒什麼感覺的時候，先別急著加難度，做完再看屁股比較容易上線有沒有改善像「四足前傾後傾」這類動作，可以放在睡前先做。", "movement_name": "四足前傾後傾", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BHfEv3183/", "content_status": "https://www.facebook.com/share/r/1BHfEv3183/", "raw_hook": "(為什麼屁股練不翹?)", "raw_day": "338", "raw_page": "104", "raw_text": "◤一個難控制,但能把上臀練拋的動作◢\n(為什麼屁股練不翹?)\n如果想把你的上臀練翹,\n讓形狀更飽滿,\n做這個動作,求求了!\n很多人只跟著網路影片練,\n卻忘了每個人的身體不一樣,\n結果同樣的動作,做半天還是沒效果。\n想要把臀練好,\n第一步要先搞定「腰椎控制」,\n調整好再回去練臀,\n一秒炸翻你的屁屁!"}, {"id": "ex_day_337_d290", "content_type": "單一動作", "source_type": "D", "source_id": "337", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "這是你每天用完電腦要做的動作!", "purpose": "先鬆開", "secondary_purpose": "", "title": "滾筒開胸椎", "difficulty": "中階", "order": "1", "card_reason": "這個動作主打脊椎不順，重點是先把過度緊繃降下來，不是一直追求更大幅度，像「滾筒開胸椎」這類動作可以放在久坐後先試。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力像「滾筒開胸椎」這類動作，可以放在久坐後先做。", "movement_name": "滾筒開胸椎", "movement_code": "D290", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BcLkowdps/", "content_status": "https://www.facebook.com/share/r/1BcLkowdps/", "raw_hook": "這是你每天用完電腦要做的動作!", "raw_day": "337", "raw_page": "108", "raw_text": "◤一個很舒服,又能改善上背疼痛的動作◢\n(上背疼、肩頸痠、精神差,有的舉手\n)\n這是你每天用完電腦要做的動作!\n每天盯電腦,\n胸椎和肩胛都變得懶洋洋,\n反而讓脖子過度出力。\n這就是常見的「上交叉症候群」。\n只要花幾分鐘做這個動作,\n你會覺得身體變輕,\n眼睛也瞬間有神!"}, {"id": "ex_day_336_d194", "content_type": "單一動作", "source_type": "D", "source_id": "336", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(做完屁股又酸又爽!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "髖圓周", "difficulty": "進階", "order": "1", "card_reason": "想讓力量不要再跑錯地方，先看髖臀張力和發力順序有沒有配合；「髖圓周」就是做這件事。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時使用；不用做到很深，先讓髖臀張力和發力順序有反應就好。", "movement_name": "髖圓周", "movement_code": "D194", "sets_reps": "依影片跟練", "equipment": "滾筒、牆面、軟墊、球", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DUGE8Xkup/", "content_status": "https://www.facebook.com/share/r/1DUGE8Xkup/", "raw_hook": "(做完屁股又酸又爽!)", "raw_day": "336", "raw_page": "109", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(做完屁股又酸又爽!)\n我很少看過,超過25歲,\n還能一次做成功!\n現在下班後運動的人很多,\n但是身體不靈活,\n動作就做不出來,\n攀岩時身體貼不住牆,\n打球時腳跨不出去。\n回想一下,\n小時候你做這個明明很輕鬆,\n現在需要重新練回來!"}, {"id": "ex_day_335_d274", "content_type": "單一動作", "source_type": "D", "source_id": "335", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(很多人會跟梨型搞混!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "青蛙趴", "difficulty": "中階", "order": "1", "card_reason": "「青蛙趴」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓髖臀張力和發力順序找到方向，通常比一次做到很深更有用。", "movement_name": "青蛙趴", "movement_code": "D274", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1JKjn5jWfC/", "content_status": "https://www.facebook.com/share/r/1JKjn5jWfC/", "raw_hook": "(很多人會跟梨型搞混!)", "raw_day": "335", "raw_page": "110", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(很多人會跟梨型搞混!)\n如果你有假胯寬的問題,\n別去亂整骨,改做這個動作!\n問題不在骨盆寬,\n因為大腿骨沒辦法單獨向外,\n核心又撐不住,\n就會讓胯看起來更寬。\n記住這兩個要點:\n把盆底收緊,\n肚子不要往前掉,\n再往下坐,才是真正的矯正!"}, {"id": "ex_day_334_d201", "content_type": "單一動作", "source_type": "D", "source_id": "334", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "這是久坐族每天要做的伸展!", "purpose": "先鬆開", "secondary_purpose": "", "title": "滾筒躺椅", "difficulty": "中階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整骨盆和大腿的活動。", "detail": "它比較像整理開關，先讓髖比較能轉開，再進入伸展或訓練會比較穩像「滾筒躺椅」這類動作，可以放在收操時先做。", "movement_name": "滾筒躺椅", "movement_code": "D201", "sets_reps": "每邊1分鐘；每邊1分鐘", "equipment": "滾筒", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17No63F9RB/", "content_status": "https://www.facebook.com/share/r/17No63F9RB/", "raw_hook": "這是久坐族每天要做的伸展!", "raw_day": "334", "raw_page": "111", "raw_text": "◤一個超緊,但能放鬆大腿前側的動作◢\n(久坐的人這裡一定超緊!)\n這是久坐族每天要做的伸展!\n想一想,\n如果你每天坐10小時,\n身體會怎麼樣呢?\n大腿前側會一直縮短,\n難怪越來越緊繃。\n跟我這樣做,\n把身體墊高,\n骨盆往後轉到後傾,\n每邊1分鐘,你的腿就鬆了!"}, {"id": "ex_day_333", "content_type": "單一動作", "source_type": "單一動作", "source_id": "333", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(照鏡子,看自己有沒有~)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "過頭上迴旋", "difficulty": "中階", "order": "1", "card_reason": "如果肩膀放不下來、肩胛也不太聽話，先做「過頭上迴旋」，會比直接加強更容易找到感覺。", "detail": "適合肩膀放不下來、肩胛也不太聽話的人放在訓練前，先整理張力，再進入主要動作像「過頭上迴旋」這類動作，可以放在第一輪先做。", "movement_name": "過頭上迴旋", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/14cNfUYCvFm/", "content_status": "https://www.facebook.com/share/r/14cNfUYCvFm/", "raw_hook": "(照鏡子,看自己有沒有~)", "raw_day": "333", "raw_page": "112", "raw_text": "◤一個難碰到,但能改善高低肩的動作◢\n(照鏡子,看自己有沒有~)\n90%有高低肩的人,\n問題都在肩胛骨!\n肩胛有上迴旋、下迴旋兩種方向。\n如果你常常夾背、收肩胛,\n這會讓肩胛卡在下迴旋,\n左右失衡,就變高低肩了。\n這個動作你在任何地方都能做,\n找面牆壁,\n就能把肩膀回正!"}, {"id": "ex_day_332", "content_type": "單一動作", "source_type": "單一動作", "source_id": "332", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(比同齡人小一輪的方法)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "側弓步轉開", "difficulty": "中階", "order": "1", "card_reason": "這類「髖卡打不開」常不是單一部位的問題，先從骨盆和大腿的活動開始整理，像「側弓步轉開」這類動作可以放在居家練習先試。", "detail": "不要急著追求痠痛感，先讓骨盆和大腿的活動變得比較會配合，身體才不會越練越緊像「側弓步轉開」這類動作，可以放在居家練習先做。", "movement_name": "側弓步轉開", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1818427696215764/", "content_status": "https://www.facebook.com/reel/1818427696215764/", "raw_hook": "(比同齡人小一輪的方法)", "raw_day": "332", "raw_page": "114", "raw_text": "◤一個超爆酸,但能讓你年輕5歲的動作◢\n(比同齡人小一輪的方法)\n我沒看過,超過25歲,\n還能一次做好這個動作!\n骨盆有分內旋、外旋兩種方向,\n走路的時候,\n它要配合旋轉,\n才能保持平衡。\n多練這個動作,\n你會發現步伐更輕鬆,\n身體也跟著年輕起來!"}, {"id": "ex_day_331", "content_type": "單一動作", "source_type": "單一動作", "source_id": "331", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(不是你不努力,是方法錯了)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "單側駱駝", "difficulty": "中階", "order": "1", "card_reason": "先用「單側駱駝」把骨盆和大腿的活動叫回來，後面的訓練才不容易跑偏。", "detail": "當開髖做很多還是覺得髖轉不順，可以先做「單側駱駝」；重點不是忍到很酸，而是讓骨盆和大腿的活動慢慢接回來。", "movement_name": "單側駱駝", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1HrdgJ12Zz/", "content_status": "https://www.facebook.com/share/r/1HrdgJ12Zz/", "raw_hook": "(不是你不努力,是方法錯了)", "raw_day": "331", "raw_page": "115", "raw_text": "◤一個很醜,但能改善骨盆前傾的動作◢\n(不是你不努力,是方法錯了)\n骨盆前傾,\n你該認真花時間做的訓練。\n在骨盆前方的髂腰肌,\n常被說太緊,\n所以大家拚命拉、一直拉。\n但你有發現嗎?\n再怎麼拉,還是一樣前傾。\n試試這個方法,\n花更少時間,\n骨盆也能輕鬆回正!"}, {"id": "ex_day_330", "content_type": "單一動作", "source_type": "單一動作", "source_id": "330", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "每天花 1 分鐘把脖子鬆一鬆,", "purpose": "先鬆開", "secondary_purpose": "", "title": "斜角伸展", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓身體先不要一直繃著；先求控制清楚，不用急著做很深，像「斜角伸展」這類動作可以放在身體很緊時先試。", "detail": "適合脖子緊、肩頸沉，放鬆一下又很快緊回來時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "斜角伸展", "movement_code": "", "sets_reps": "1 分鐘", "equipment": "徒手", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B76i1pHvL/", "content_status": "https://www.facebook.com/share/r/1B76i1pHvL/", "raw_hook": "每天花 1 分鐘把脖子鬆一鬆,", "raw_day": "330", "raw_page": "113", "raw_text": "◤一個超有感,但能改善睡眠的動作◢\n(失眠患者該做的伸展)\n如果你常常睡不好,\n或是翻來翻去難入睡,\n試試這個動作!\n人有慣用手、慣用眼,\n讓頭長期偏一邊,\n頸部一緊繃,肩膀就硬、\n長期下來,睡眠只會更差。\n每天花 1 分鐘把脖子鬆一鬆,\n你會睡得比誰都沉!"}, {"id": "ex_day_329", "content_type": "單一動作", "source_type": "單一動作", "source_id": "329", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(翹臀關鍵,一趴下就有感!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "側躺鴿式", "difficulty": "進階", "order": "1", "card_reason": "「側躺鴿式」適合放在前面，先讓臀線比較容易往上整理，再接後面的動作。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「側躺鴿式」這類動作，可以放在想測感覺時先做。", "movement_name": "側躺鴿式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DXuAKULkd/", "content_status": "https://www.facebook.com/share/r/1DXuAKULkd/", "raw_hook": "(翹臀關鍵,一趴下就有感!)", "raw_day": "329", "raw_page": "116", "raw_text": "◤一個超級難,但能改善臀凹陷的動作◢\n(翹臀關鍵,一趴下就有感!)\n如果你的屁股不夠圓,\n兩側還有點內凹,\n做這個動作,求求了!\n臀大肌是最大塊的臀部肌肉,\n也是臀型飽滿的關鍵。\n它攣縮,你就凹陷;\n它醒來,你就翹起來\n所以,別再羨慕別人的臀型了,\n動作做起來,\n你的屁股也能越練越立體!"}, {"id": "ex_day_328_d166", "content_type": "單一動作", "source_type": "D", "source_id": "328", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(這是你每天要做的伸展!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "側支撐起身", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓腰背和骨盆的分工重新有反應，動作才會比較順。", "detail": "如果你常覺得久坐後腰下方很緊、站起來總覺得腰在頂著，先用「側支撐起身」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "側支撐起身", "movement_code": "D166", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BBdZ9qX5i/", "content_status": "https://www.facebook.com/share/r/1BBdZ9qX5i/", "raw_hook": "(這是你每天要做的伸展!)", "raw_day": "328", "raw_page": "117", "raw_text": "◤一個少人做,但能幫你矯正骨盆的動作◢\n(這是你每天要做的伸展!)\n如果你腰兩邊老是痠痛,\n別去亂整骨,\n改做這個動作!\n我們的身體有兩條大筋膜線,\n左側線,跟右側線,\n你常聽到的骨盆歪斜、腰痛,\n其實是兩條側線不對稱。\n把身體往側邊拉開,\n你的骨盆平衡,腰痛也突然消失了!"}, {"id": "ex_day_327", "content_type": "單一動作", "source_type": "單一動作", "source_id": "327", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(30以後更需要注意體態!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "寬距轉髖", "difficulty": "中階", "order": "1", "card_reason": "「寬距轉髖」不是要你做到很酸，而是先整理髖臀張力和發力順序，讓臀線比較容易往上整理。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人，先做「寬距轉髖」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "寬距轉髖", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GZtTyH4nY/", "content_status": "https://www.facebook.com/share/r/1GZtTyH4nY/", "raw_hook": "(30以後更需要注意體態!)", "raw_day": "327", "raw_page": "118", "raw_text": "◤一個超酸,但能潤滑你的骨盆的動作◢\n(30以後更需要注意體態!)\n如果你超過30歲,\n還能一次做好,\n請收下我的膝蓋!\n女生常見的臀凹陷、媽媽臀、X型腿\n其實都跟「髖關節太僵硬」有關。\n記住這一步:\n先學會打開骨盆,\n之後任何調整,效果都會翻倍。"}, {"id": "ex_day_326", "content_type": "單一動作", "source_type": "單一動作", "source_id": "326", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "我們每天滑手機、開車、做事,", "purpose": "活動度", "secondary_purpose": "活動度", "title": "單側手肘夾肩", "difficulty": "中階", "order": "1", "card_reason": "遇到肩膀放不下來、肩胛也不太聽話時，可以先用「單側手肘夾肩」把肩胛的滑動和支撐接回來。", "detail": "它比較像整理開關，先讓肩膀比較不會往上跑，再進入伸展或訓練會比較穩。", "movement_name": "單側手肘夾肩", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18n4D4dpKF/", "content_status": "https://www.facebook.com/share/r/18n4D4dpKF/", "raw_hook": "我們每天滑手機、開車、做事,", "raw_day": "326", "raw_page": "119", "raw_text": "◤一個超級酸,但能幫你放鬆肩胛的動作◢\n(找很久的源頭,終於找到了!)\n很多人說:\n「我的手肘卡不進膝蓋!」\n那就先換這個版本。\n我們每天滑手機、開車、做事,\n本來就會養成肩胛「左右不一樣」\n沒什麼好意外的。\n適度放鬆肩胛,\n就能減少高低肩,肩頸痛也跟著少!"}, {"id": "ex_day_325", "content_type": "單一動作", "source_type": "單一動作", "source_id": "325", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(站櫃台、久站族快試試!)", "purpose": "找回發力", "secondary_purpose": "找回發力", "title": "屈膝臀推", "difficulty": "中階", "order": "1", "card_reason": "這個動作主打下背壓力，重點是找回該出力的位置，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看腰不用一直自己扛，效果會比單純硬拉更清楚像「屈膝臀推」這類動作，可以放在久坐後先做。", "movement_name": "屈膝臀推", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GUCPuccbA/", "content_status": "https://www.facebook.com/share/r/1GUCPuccbA/", "raw_hook": "(站櫃台、久站族快試試!)", "raw_day": "325", "raw_page": "120", "raw_text": "◤一個超酸,但能改善久站腰痛的動作◢\n(站櫃台、久站族快試試!)\n如果你經常久站,腰痠非常嚴重,\n別去亂整骨,改做這個動作!\n身體前後有淺前線和淺背線,\n只要這兩條線失衡,骨盆就開始前傾、後傾,\n所以你一站久就酸。\n讓尾椎骨活起來,\n讓筋膜線恢復彈性,\n讓身體回到原廠狀態!"}, {"id": "ex_day_324_d182", "content_type": "單一動作", "source_type": "D", "source_id": "324", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "如果你每天坐上10~12小時,", "purpose": "先鬆開", "secondary_purpose": "", "title": "女神蹲後仰", "difficulty": "中階", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看腰背和骨盆的分工有沒有配合；「女神蹲後仰」就是做這件事。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時使用；不用做到很深，先讓腰背和骨盆的分工有反應就好像「女神蹲後仰」這類動作，可以放在走路後先做。", "movement_name": "女神蹲後仰", "movement_code": "D182", "sets_reps": "依影片跟練", "equipment": "椅子、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/14fXKRHB6JA/", "content_status": "https://www.facebook.com/share/r/14fXKRHB6JA/", "raw_hook": "如果你每天坐上10~12小時,", "raw_day": "324", "raw_page": "121", "raw_text": "◤一個很害羞,但非常適合久坐族的動作◢\n(敢做一次,你就回不去了!)\n如果你每天坐上10~12小時,\n身體哪裡都在痛,\n做這個動作,求求了!\n人體600條肌肉,\n是設計來動的,\n不是綁在椅子上。\n久坐的人,腰跟大腿幾乎都硬掉。\n解法很簡單,\n練到骨盆能貼近地面,\n你的腰痛、屁股痛,全都消失了!"}, {"id": "ex_day_323", "content_type": "單一動作", "source_type": "單一動作", "source_id": "323", "body_part": "腿型", "pain_point": "腿型不順", "pain_point_original": "(當個有禮貌的人喔!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "雙內收鴿式", "difficulty": "進階", "order": "1", "card_reason": "「雙內收鴿式」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當腿看起來不直、走路時下肢很容易歪掉，可以先做「雙內收鴿式」；重點不是忍到很酸，而是讓髖膝踝的排列慢慢接回來。", "movement_name": "雙內收鴿式", "movement_code": "", "sets_reps": "30秒", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1J6hiLk6Pm/", "content_status": "https://www.facebook.com/share/r/1J6hiLk6Pm/", "raw_hook": "(當個有禮貌的人喔!)", "raw_day": "323", "raw_page": "122", "raw_text": "◤一個超級難,但能讓你雙腿併攏的動作◢\n(當個有禮貌的人喔!)\n很多人在吵,\n捷運上雙腳打開是不是沒禮貌?\n其實大腿有分「外展」和「內收」。\n他們不知道的是,\n男生多半偏外展,\n所以放鬆時腳自然打開,\n看起來才會像「沒禮貌」。\n不想被偷拍公審,\n花30秒練一下,\n雙腿就能輕鬆靠攏!"}, {"id": "ex_day_322_d174", "content_type": "單一動作", "source_type": "D", "source_id": "322", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(脊椎喀喀響的人必學!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "上犬下犬", "difficulty": "中階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整脊椎和胸廓的旋轉，像「上犬下犬」這類動作可以放在收操時先試。", "detail": "背一邊緊、一邊凸，轉身也不太順的時候，先別急著加難度，做完再看身體左右更容易平衡有沒有改善。", "movement_name": "上犬下犬", "movement_code": "D174", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17iGu4v5VQ/", "content_status": "https://www.facebook.com/share/r/17iGu4v5VQ/", "raw_hook": "(脊椎喀喀響的人必學!)", "raw_day": "322", "raw_page": "124", "raw_text": "◤一個很伸展,但能鬆開僵硬脊椎的動作◢\n(脊椎喀喀響的人必學!)\n如果你脊椎一動就喀喀響,\n別去亂整骨,改做這個動作!\n你不知道的是——\n越害怕去動它,痠痛就越嚴重,\n進入無止境的惡性循環。\n脊椎需要的不是暴力調整,\n而是溫和的伸展,\n讓它一節一節重新活過來!"}, {"id": "ex_day_321_d155; d233", "content_type": "單一動作", "source_type": "D", "source_id": "321", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(內側凸凸的,快做這個!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "交替90", "difficulty": "進階", "order": "1", "card_reason": "如果開髖做很多還是覺得髖轉不順，先做「交替90」，會比直接加強更容易找到感覺。", "detail": "適合開髖做很多還是覺得髖轉不順的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "交替90", "movement_code": "D155; D233", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17ex75m3bm/", "content_status": "https://www.facebook.com/share/r/17ex75m3bm/", "raw_hook": "(內側凸凸的,快做這個!)", "raw_day": "321", "raw_page": "125", "raw_text": "◤一個超級難,但能讓你腿變直的動作◢\n(內側凸凸的,快做這個!)\n如果你大腿內側鼓一塊,\n看起來腿不直,\n做這個動作,你會感謝我!\n因為:\n上半身重量,落在骨盆上,\n骨盆的重量,落在雙腿上,\n骨盆不靈活,腿型就會被「擠歪」。\n蹲到最低,把髖完全打開,\n腿自然變直,膝蓋也更輕鬆!"}, {"id": "ex_day_320", "content_type": "單一動作", "source_type": "單一動作", "source_id": "320", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(打開你腰痛的開關!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "踮腳開胸", "difficulty": "中階", "order": "1", "card_reason": "這類「下背壓力」常不是單一部位的問題，先從腰背和骨盆的分工開始整理，像「踮腳開胸」這類動作可以放在居家練習先試。", "detail": "如果你常覺得久坐後腰下方很緊、站起來總覺得腰在頂著，先用「踮腳開胸」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "踮腳開胸", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CmDTZcLgT/", "content_status": "https://www.facebook.com/share/r/1CmDTZcLgT/", "raw_hook": "(打開你腰痛的開關!)", "raw_day": "320", "raw_page": "126", "raw_text": "◤一個很酸,但能改善深層
