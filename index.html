腰痛的動作◢\n(打開你腰痛的開關!)\n如果你的痛是在「腰和骨盆交界」的位置,\n做這個動作,求求了!\n平常深蹲最低點會出現「屁股眨眼」,\n一般我們都會避免,怕腰受傷。\n但這個動作剛好反過來用!\n利用這個極限姿勢,\n骨盆與薦椎一起動,腰一下子就鬆了!"}, {"id": "ex_day_319", "content_type": "單一動作", "source_type": "單一動作", "source_id": "319", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "(別再用治標不治本的方法了!)", "purpose": "活動度", "secondary_purpose": "", "title": "前跨步", "difficulty": "進階", "order": "1", "card_reason": "先用「前跨步」把骨盆兩側的控制叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓骨盆兩側的控制找到方向，通常比一次做到很深更有用像「前跨步」這類動作，可以放在下次訓練前先做。", "movement_name": "前跨步", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18JHBZA3Kt/", "content_status": "https://www.facebook.com/share/r/18JHBZA3Kt/", "raw_hook": "(別再用治標不治本的方法了!)", "raw_day": "319", "raw_page": "127", "raw_text": "◤一個超難,但能改善骨盆不正的動作◢\n(別再用治標不治本的方法了!)\n很多人問我:「骨盆歪了怎麼辦?」\n答案是——方向不重要,\n因為影響正不正的,從來不是骨頭,\n而是肌肉!\n尤其久坐過後,抬腳的落差最大,\n當你能讓雙腳跨到手掌旁,\n骨盆自然就會被「重置」。"}, {"id": "ex_day_318", "content_type": "單一動作", "source_type": "單一動作", "source_id": "318", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(瑜珈磚怎麼會歪來歪去的!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "側弓步內夾", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓力量不要再跑錯地方；先求控制清楚，不用急著做很深，像「側弓步內夾」這類動作可以放在身體很緊時先試。", "detail": "適合開髖做很多還是覺得髖轉不順時先做一輪，重點是感覺變清楚，不是把動作做大像「側弓步內夾」這類動作，可以放在身體很緊時先做。", "movement_name": "側弓步內夾", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ERAZCPtbB/", "content_status": "https://www.facebook.com/share/r/1ERAZCPtbB/", "raw_hook": "(瑜珈磚怎麼會歪來歪去的!)", "raw_day": "318", "raw_page": "128", "raw_text": "◤一個超級累,但能讓你年輕5歲的動作◢\n(瑜珈磚怎麼會歪來歪去的!)\n我沒看過,超過25歲,\n還能一次做好這個動作!\n深蹲、硬舉都在練「外旋」,\n但生活裡更需要「內旋」的力量。\n這也是為什麼很多人練壯了,卻不一定健康。\n年齡帶走的,不是體態,\n而是你遺忘的動作!"}, {"id": "ex_day_317_d311", "content_type": "單一動作", "source_type": "D", "source_id": "317", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(這個動作我求你做!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "單側劈腿", "difficulty": "進階", "order": "1", "card_reason": "「單側劈腿」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看腰不用一直自己扛，效果會比單純硬拉更清楚像「單側劈腿」這類動作，可以放在想測感覺時先做。", "movement_name": "單側劈腿", "movement_code": "D311", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17cPRSjica/", "content_status": "https://www.facebook.com/share/r/17cPRSjica/", "raw_hook": "(這個動作我求你做!)", "raw_day": "317", "raw_page": "129", "raw_text": "◤一個超級難,但能改善久坐腰痛的動作◢\n(這個動作我求你做!)\n如果你腰不舒服,久坐更痛,\n做這個動作,求求了!\n很多人以為是腰的問題,\n其實大腿內側、前側髖屈肌也卡住了。\n這個動作,你會一次動到三塊肌群,\n用「動態」方式解鎖,比靜態更快見效!"}, {"id": "ex_day_316", "content_type": "單一動作", "source_type": "單一動作", "source_id": "316", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(向屁股側邊那塊肉,說拜拜!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "大貓內旋", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖臀張力和發力順序重新有反應，動作才會比較順，像「大貓內旋」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊像「大貓內旋」這類動作，可以放在動作前面先做。", "movement_name": "大貓內旋", "movement_code": "", "sets_reps": "3 下", "equipment": "瑜伽磚、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CSQqM5PXZ/", "content_status": "https://www.facebook.com/share/r/1CSQqM5PXZ/", "raw_hook": "(向屁股側邊那塊肉,說拜拜!)", "raw_day": "316", "raw_page": "130", "raw_text": "◤一個快抽筋,但能收骨盆上口的動作◢\n(向屁股側邊那塊肉,說拜拜!)\n如果你屁股兩側往外凸,看起來超寬,\n做這個動作,你會感謝我!\n那不是肥肉,是深層臀中肌出問題,\n骨盆線條才會越來越寬!\n習慣雙腳打開的人,情況會更慘。\n解法很簡單,\n腳踝比膝蓋寬,\n不用 3 下,酸到你懷疑人生!"}, {"id": "ex_day_315", "content_type": "單一動作", "source_type": "單一動作", "source_id": "315", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(若酸到另一隻腳,表示你臀很無力)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "側抬腿", "difficulty": "中階", "order": "1", "card_reason": "「側抬腿」不是要你做到很酸，而是先整理臀肌和髖的連結，讓屁股比較容易上線。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺的人，先做「側抬腿」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "側抬腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18fUHeDWrQ/", "content_status": "https://www.facebook.com/share/r/18fUHeDWrQ/", "raw_hook": "(若酸到另一隻腳,表示你臀很無力)", "raw_day": "315", "raw_page": "131", "raw_text": "◤一個很酸很酸,但能讓你臀變翹的動作◢\n(若酸到另一隻腳,表示你臀很無力)\n有人私訊我:\n「想把屁股練大,推薦做什麼?」\n深蹲、分腿蹲、硬舉都不錯,\n但如果你想讓上臀更飽滿,\n就要靠這種臀肌孤立動作。\n膝蓋慢慢往外抬,\n專注收縮臀肌,\n一秒炸翻你的屁屁!"}, {"id": "ex_day_314", "content_type": "單一動作", "source_type": "單一動作", "source_id": "314", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(肩膀硬到爆?試試這招)", "purpose": "活動度", "secondary_purpose": "活動度", "title": "肩鬆動", "difficulty": "中階", "order": "1", "card_reason": "遇到肩膀放不下來、肩胛也不太聽話時，可以先用「肩鬆動」把肩胛的滑動和支撐接回來。", "detail": "肩膀放不下來、肩胛也不太聽話的時候，先別急著加難度，做完再看肩膀比較不會往上跑有沒有改善。", "movement_name": "肩鬆動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1376227020530695/", "content_status": "https://www.facebook.com/reel/1376227020530695/", "raw_hook": "(肩膀硬到爆?試試這招)", "raw_day": "314", "raw_page": "132", "raw_text": "◤一個超級酸,但能幫你拉開肩胛的動作◢\n(肩膀硬到爆?試試這招)\n如果你的肩膀硬得像石頭,\n別去亂整骨,改做這個動作!\n我發現很多長期肩頸痛的人,\n他們肩膀後側一路到肩胛骨,\n僵化情況非常普遍。\n這招先幫你打開肩胛,\n雖然會酸,但馬上就能緩解不少!"}, {"id": "ex_day_313", "content_type": "單一動作", "source_type": "單一動作", "source_id": "313", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(請收藏,專治臀凹陷!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "內旋跪坐", "difficulty": "進階", "order": "1", "card_reason": "這個動作主打臀型不好看，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「內旋跪坐」這類動作，可以放在久坐後先做。", "movement_name": "內旋跪坐", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/2140338149787287/", "content_status": "https://www.facebook.com/reel/2140338149787287/", "raw_hook": "(請收藏,專治臀凹陷!)", "raw_day": "313", "raw_page": "123", "raw_text": "◤一個超級難,但能填平臀部凹陷的動作◢\n(請收藏,專治臀凹陷!)\n我沒看過,超過25歲,\n還能一次做好這個動作!\n因為——\n大多數人的骨盆,\n外旋太多、內旋不足,\n讓最大塊的臀大肌緊到不行。\n這個動作不容易,但是非常有效,\n練好它,你的臀兩側會一點一點被「填滿」!"}, {"id": "ex_day_312", "content_type": "單一動作", "source_type": "單一動作", "source_id": "312", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "(做完腰變鬆鬆的,好舒服!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "滾筒SI活動", "difficulty": "進階", "order": "1", "card_reason": "想讓關節動得更順，先看骨盆兩側和側腰支撐有沒有配合；「滾筒SI活動」就是做這件事。", "detail": "適合腰總是偏一邊不舒服，左右感覺差很多時使用；不用做到很深，先讓骨盆兩側和側腰支撐有反應就好像「滾筒SI活動」這類動作，可以放在走路後先做。", "movement_name": "滾筒SI活動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1904664426982852/", "content_status": "https://www.facebook.com/reel/1904664426982852/", "raw_hook": "(做完腰變鬆鬆的,好舒服!)", "raw_day": "312", "raw_page": "134", "raw_text": "◤一個很難,但能舒緩下背緊繃的動作◢\n(做完腰變鬆鬆的,好舒服!)\n如果你覺得骨盆歪一邊,\n下背老是很緊,\n做這個動作,求求了!\n原來——\n我們骨盆左右兩邊各有一塊「髂骨」,\n長得像耳朵,能小小地動。\n這些「微小的活動」,\n其實是在幫你走路、跑步、彎腰時,\n維持身體的彈性與協調。\n固定一邊髂骨,活動另一側,\n你的腰痛消失,脊椎和腿的負擔也變輕了!"}, {"id": "ex_day_311_d285", "content_type": "單一動作", "source_type": "D", "source_id": "311", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(肚子收不回來的,請看這裡!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "單內收彎腰", "difficulty": "新手", "order": "1", "card_reason": "「單內收彎腰」可以當成重新校準的一步，幫身體找回比較順的方向，可以放在暖身時先試。", "detail": "先做小範圍就好，讓骨盆和大腿的活動找到方向，通常比一次做到很深更有用像「單內收彎腰」這類動作，可以放在暖身時先做。", "movement_name": "單內收彎腰", "movement_code": "D285", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18gtVL1FED/", "content_status": "https://www.facebook.com/share/r/18gtVL1FED/", "raw_hook": "(肚子收不回來的,請看這裡!)", "raw_day": "311", "raw_page": "135", "raw_text": "◤一個很酸,但能改善下腹凸的動作◢\n(肚子收不回來的,請看這裡!)\n常有人問我:「小腹凸、骨盆前傾怎麼辦?」\n其實順序反了!\n不是骨盆前傾 →小腹凸,\n而是深層核心沒力,才會撐不住前傾!\n尤其是:\n盆底肌+大腿內側沒力,\n不只肚子凸,還可能漏尿...\n學會收緊深層肌群,\n小腹自然往回縮!"}, {"id": "ex_day_310", "content_type": "單一動作", "source_type": "單一動作", "source_id": "310", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(暖身的救命神招", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "圓周起身", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整髖臀張力和發力順序。", "detail": "它比較像整理開關，先讓臀線比較容易往上整理，再進入伸展或訓練會比較穩像「圓周起身」這類動作，可以放在收操時先做。", "movement_name": "圓周起身", "movement_code": "", "sets_reps": "2分鐘", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1QwFXYX7Qf/", "content_status": "https://www.facebook.com/share/r/1QwFXYX7Qf/", "raw_hook": "(暖身的救命神招", "raw_day": "310", "raw_page": "136", "raw_text": "◤一個超級難,但能瞬間打開髖部的動作◢\n(暖身的救命神招\n)\n如果你馬上要比賽、開跑、開打,\n但只剩2分鐘能熱身,\n做這個動作,你會感謝我!\n別再原地轉手腕、抖腳踝了!\n運動不是只動一兩塊肌肉,\n這個動作,\n從地板坐起來的瞬間,\n腹部、臀部、大腿全出力,\n讓你身體瞬間「ON!」起來!"}, {"id": "ex_day_309", "content_type": "單一動作", "source_type": "單一動作", "source_id": "309", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(挑戰看看,你能做到嗎?)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "棒式前跨", "difficulty": "進階", "order": "1", "card_reason": "如果開髖做很多還是覺得髖轉不順，先做「棒式前跨」，會比直接加強更容易找到感覺。", "detail": "適合開髖做很多還是覺得髖轉不順的人放在訓練前，先整理張力，再進入主要動作像「棒式前跨」這類動作，可以放在第一輪先做。", "movement_name": "棒式前跨", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/24452735754358688/", "content_status": "https://www.facebook.com/reel/24452735754358688/", "raw_hook": "(挑戰看看,你能做到嗎?)", "raw_day": "309", "raw_page": "137", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(挑戰看看,你能做到嗎?)\n如果你超過25歲,\n還能一次做到這個動作,\n請收下我的膝蓋!\n髖有分屈曲和伸直兩種功能,\n很多人只練「伸直」:像是深蹲、硬舉。\n但「屈曲」的功能,卻常常被忘了。\n當你能順利把腳放到手掌外側,\n不只柔軟度大升級,\n走路、跑步、游泳都更順!"}, {"id": "ex_day_308", "content_type": "單一動作", "source_type": "單一動作", "source_id": "308", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "80%的人每天久坐,", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "弓步側彎", "difficulty": "新手", "order": "1", "card_reason": "這類「脊椎不順」常不是單一部位的問題，先從脊椎和胸廓的旋轉開始整理。", "detail": "不要急著追求痠痛感，先讓脊椎和胸廓的旋轉變得比較會配合，身體才不會越練越緊。", "movement_name": "弓步側彎", "movement_code": "", "sets_reps": "1分鐘", "equipment": "椅子、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/19yuqNmTHR/", "content_status": "https://www.facebook.com/share/r/19yuqNmTHR/", "raw_hook": "80%的人每天久坐,", "raw_day": "308", "raw_page": "133", "raw_text": "◤一個很羞恥,但能幫你減緩老化的動作◢\n(真的⋯你做一次就知道)\n如果你覺得身體硬梆梆,\n別去亂整骨,改做這個動作!\n80%的人每天久坐,\n身體縮在一起,變成椅子的形狀,\n你不是老,是「僵化」了。\n每天只要花1分鐘,\n做點「反方向」的動作,\n靠自己,就能重新啟動身體!"}, {"id": "ex_day_308_2", "content_type": "單一動作", "source_type": "單一動作", "source_id": "308", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(小腹小腹", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "翹腳扭轉", "difficulty": "新手", "order": "1", "card_reason": "先用「翹腳扭轉」把腰背和骨盆的分工叫回來，後面的訓練才不容易跑偏。", "detail": "當久坐後腰下方很緊、站起來總覺得腰在頂著，可以先做「翹腳扭轉」；重點不是忍到很酸，而是讓腰背和骨盆的分工慢慢接回來。", "movement_name": "翹腳扭轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/761997059574342/", "content_status": "https://www.facebook.com/reel/761997059574342/", "raw_hook": "(小腹小腹", "raw_day": "308", "raw_page": "140", "raw_text": "◤一個很酸,但能改善你的腰線的動作◢\n(小腹小腹\nbang不見!)\n如果你的小腹凸出,\n狂練卷腹卻沒用,\n做這個動作,求求了!\n腹內壓是「前後左右」的肌群一起撐出來的!\n忽略側腰,就等於腰型永遠無解。\n轉身時骨盆穩穩貼地,\n當你感受到,側腰深層肌肉的伸展,\n你的腰型也在悄悄改變!"}, {"id": "ex_day_307", "content_type": "單一動作", "source_type": "單一動作", "source_id": "307", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(大腿根部,酸到懷疑人生!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "9090伸直", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深，像「9090伸直」這類動作可以放在身體很緊時先試。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時先做一輪，重點是感覺變清楚，不是把動作做大像「9090伸直」這類動作，可以放在身體很緊時先做。", "movement_name": "9090伸直", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1L54HPuEsf/", "content_status": "https://www.facebook.com/share/r/1L54HPuEsf/", "raw_hook": "(大腿根部,酸到懷疑人生!)", "raw_day": "307", "raw_page": "141", "raw_text": "◤一個超級難,但能改變你的體態的動作◢\n(大腿根部,酸到懷疑人生!)\n如果你對自己體態不滿意,\n別去亂整骨,改做這個動作!\n骨盆的旋轉功能,是退化最快的,\n假胯寬、臀凹陷、X型腿,\n也都跟它有關。\n一開始可能轉不太動,\n沒關係,把身體側倒一點,\n就會好做很多!"}, {"id": "ex_day_306", "content_type": "單一動作", "source_type": "單一動作", "source_id": "306", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(坐著腰痛的人,真的要試試)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "四足側轉", "difficulty": "新手", "order": "1", "card_reason": "「四足側轉」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力像「四足側轉」這類動作，可以放在想測感覺時先做。", "movement_name": "四足側轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ExvpN1kaR/", "content_status": "https://www.facebook.com/share/r/1ExvpN1kaR/", "raw_hook": "(坐著腰痛的人,真的要試試)", "raw_day": "306", "raw_page": "138", "raw_text": "◤一個超級酸,但能拯救僵硬下背的動作◢\n(坐著腰痛的人,真的要試試)\n如果你坐一下就不舒服,\n開車、上班變成折磨,\n做這個動作,你會感謝我!\n這不是腰的錯,而是骨盆太僵!\n骨盆太僵硬,腰就得加班,\n源頭還得從骨盆下手。\n記得把你的骨盆前傾,\n動作做到底,\n一個簡單的動作,\n就能和腰痛說再見!"}, {"id": "ex_day_304_d193", "content_type": "單一動作", "source_type": "D", "source_id": "304", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(上臀沒練到,臀型永遠不會翹)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "剪刀腳", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓臀肌和髖的連結重新有反應，動作才會比較順，像「剪刀腳」這類動作可以放在動作前面先試。", "detail": "如果你常覺得練臀時腿先酸、屁股卻沒什麼感覺，先用「剪刀腳」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "剪刀腳", "movement_code": "D193", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17hhWXmzMs/", "content_status": "https://www.facebook.com/share/r/17hhWXmzMs/", "raw_hook": "(上臀沒練到,臀型永遠不會翹)", "raw_day": "304", "raw_page": "139", "raw_text": "◤一個很難,但真的能改變扁臀的動作◢\n(上臀沒練到,臀型永遠不會翹)\n如果你的臀型扁塌,形狀不飽滿,\n做這個動作,求求了!\n臀部分成上、中、下三段,\n其中最關鍵、最難練的——是上臀!\n腰凹下去,找到最有拉伸感的位置,\n等你回去練臀時,你會驚訝:\n酸的點終於到位了!"}, {"id": "ex_day_303", "content_type": "單一動作", "source_type": "單一動作", "source_id": "303", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(Tag你需要這個的朋友!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "弓箭前屈", "difficulty": "進階", "order": "1", "card_reason": "「弓箭前屈」不是要你做到很酸，而是先整理髖、膝、腳踝的配合，讓膝蓋壓力會比較少。", "detail": "適合跑跳或蹲跪時膝蓋不安心的人，先做「弓箭前屈」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "弓箭前屈", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DZRwXT7fx/", "content_status": "https://www.facebook.com/share/r/1DZRwXT7fx/", "raw_hook": "(Tag你需要這個的朋友!)", "raw_day": "303", "raw_page": "142", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(Tag你需要這個的朋友!)\n我沒看過,超過25歲,\n還能一次做成功!\n因為——\n年紀越大,活動力越差,\n連運動都覺得好難開始⋯\n但當你能流暢做到,\n你會驚訝——\n身體像是回到年輕時,靈活又輕鬆!"}, {"id": "ex_day_302_d171", "content_type": "單一動作", "source_type": "D", "source_id": "302", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(腰痠到不行的人必看!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "後跨弓箭步", "difficulty": "進階", "order": "1", "card_reason": "遇到久坐後腰下方很緊、站起來總覺得腰在頂著時，可以先用「後跨弓箭步」把腰背和骨盆的分工接回來。", "detail": "它比較像整理開關，先讓腰不用一直自己扛，再進入伸展或訓練會比較穩像「後跨弓箭步」這類動作，可以放在睡前先做。", "movement_name": "後跨弓箭步", "movement_code": "D171", "sets_reps": "依影片跟練", "equipment": "滾筒、牆面", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/2444355019297288/", "content_status": "https://www.facebook.com/reel/2444355019297288/", "raw_hook": "(腰痠到不行的人必看!)", "raw_day": "302", "raw_page": "143", "raw_text": "◤一個很難,但能改善久坐腰痛的動作◢\n(腰痠到不行的人必看!)\n如果你腰常常痛,\n去按摩也只是暫時鬆一下,\n做這個動作,你會感謝我!\n因為——\n腰痛,不只是「腰的問題」,\n前側的肌肉卡住,也會讓你腰很難受,\n但大多數人都忽略了!\n腳往後伸越遠越好\n重心往後放\n找回髖部伸展的能力\n久坐族的救星,\n練會這招,省下你不少按摩費!"}, {"id": "ex_day_301", "content_type": "單一動作", "source_type": "單一動作", "source_id": "301", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(拜託放慢做,不然真的會頭暈!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "站蹲扭圈", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打脊椎不順，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看身體左右更容易平衡，效果會比單純硬拉更清楚像「站蹲扭圈」這類動作，可以放在久坐後先做。", "movement_name": "站蹲扭圈", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1065124258658570/", "content_status": "https://www.facebook.com/reel/1065124258658570/", "raw_hook": "(拜託放慢做,不然真的會頭暈!)", "raw_day": "301", "raw_page": "144", "raw_text": "◤一個有點暈,但能鬆開整條脊椎的動作◢\n(拜託放慢做,不然真的會頭暈!)\n如果你有高低肩、骨盆不正,\n別去亂整骨,改做這個動作!\n它一次活動到:\n脊椎\n髖關節\n胸廓\n非常適合久坐久站、上半身超僵硬\n慢慢轉、盡可能延展肌肉,\n把動作範圍拉大,\n一做完,僵硬感消失~\n整個人輕一半!"}, {"id": "ex_day_300_d144", "content_type": "單一動作", "source_type": "D", "source_id": "300", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(準備面對“酸爽”的挑戰", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "動態盤腿", "difficulty": "進階", "order": "1", "card_reason": "想讓關節動得更順，先看骨盆和大腿的活動有沒有配合；「動態盤腿」就是做這件事。", "detail": "適合開髖做很多還是覺得髖轉不順時使用；不用做到很深，先讓骨盆和大腿的活動有反應就好像「動態盤腿」這類動作，可以放在走路後先做。", "movement_name": "動態盤腿", "movement_code": "D144", "sets_reps": "2分鐘", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1311104693778737/", "content_status": "https://www.facebook.com/reel/1311104693778737/", "raw_hook": "(準備面對“酸爽”的挑戰", "raw_day": "300", "raw_page": "145", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(準備面對“酸爽”的挑戰\n!)\n我沒看過,超過25歲,\n還能一次做好這個動作!\n骨盆分為外旋和內旋兩種方向,\n但大多數人外旋卡住,內旋也超僵!\n結果腰常常痛,體態也跟著出問題!\n每邊堅持2分鐘,你的骨盆打開,\n身體變輕,一下子年輕很多!"}, {"id": "ex_day_299_d134", "content_type": "單一動作", "source_type": "D", "source_id": "299", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "(做完腰放鬆、走路變順!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "麻花式", "difficulty": "新手", "order": "1", "card_reason": "「麻花式」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當腰總是偏一邊不舒服，左右感覺差很多，可以先做「麻花式」；重點不是忍到很酸，而是讓骨盆兩側和側腰支撐慢慢接回來。", "movement_name": "麻花式", "movement_code": "D134", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BChFthWLw/", "content_status": "https://www.facebook.com/share/r/1BChFthWLw/", "raw_hook": "(做完腰放鬆、走路變順!)", "raw_day": "299", "raw_page": "146", "raw_text": "◤一個很酸,但能救你骨盆歪斜的動作◢\n(做完腰放鬆、走路變順!)\n如果你站姿三七步,\n一邊屁股特別凸,\n做這個動作,求求了!\n因為骨盆會歪,大多是——\n腰兩側的肌肉「不平衡」!\n把腳往外轉,目標碰到地面,\n你會發現:\n坐著沒那麼卡、走路更順、\n連屁股形狀都開始變對稱了!"}, {"id": "ex_day_298_d133", "content_type": "單一動作", "source_type": "D", "source_id": "298", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "(你從未啟動過的正確力線!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "踮腳尖", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腳踝到小腿的張力。", "detail": "小腿很硬、腳踝不靈活，走路很容易累的時候，先別急著加難度，做完再看下肢線條會更順有沒有改善。", "movement_name": "踮腳尖", "movement_code": "D133", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/749091571157160/", "content_status": "https://www.facebook.com/reel/749091571157160/", "raw_hook": "(你從未啟動過的正確力線!)", "raw_day": "298", "raw_page": "147", "raw_text": "◤一個超級酸,但能讓你小腿變直的動作◢\n(你從未啟動過的正確力線!)\n有人私訊我:\n「老師,小腿肚是天生的嗎?」\n小腿形狀確實跟遺傳有關,\n但!你能改變的是——肌肉的使用方式!\n把腳跟、腳掌完全併攏站好,\n一開始會!超!酸!\n堅持兩週,走路、站姿都變得不一樣,\n甚至有人會問:「欸你腿是不是變直了?」"}, {"id": "ex_day_297_d127", "content_type": "單一動作", "source_type": "D", "source_id": "297", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(X型腿、O型腿都能試!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "屈膝臀推", "difficulty": "進階", "order": "1", "card_reason": "如果臀凹、假胯或屁股線條看起來被拉住，先做「屈膝臀推」，會比直接加強更容易找到感覺。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人放在訓練前，先整理張力，再進入主要動作像「屈膝臀推」這類動作，可以放在第一輪先做。", "movement_name": "屈膝臀推", "movement_code": "D127", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/19jC7gJCXz/", "content_status": "https://www.facebook.com/share/r/19jC7gJCXz/", "raw_hook": "(X型腿、O型腿都能試!)", "raw_day": "297", "raw_page": "148", "raw_text": "◤一個很難,但能讓你腿更直的動作◢\n(X型腿、O型腿都能試!)\n如果你腿不直,站姿不好看,\n別去亂整骨,改做這個動作!\n因為——\n不論是X型腿還是O型腿,\n問題常出在\n下肢力線不正!\n把雙腿併攏\n膝蓋主動往前推\n你會發現:\n腿型變直\n臀型也跟著改善!"}, {"id": "ex_day_295_d143", "content_type": "單一動作", "source_type": "D", "source_id": "295", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(能一次做成功的,留言給我!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "單腳蹲起身", "difficulty": "進階", "order": "1", "card_reason": "這類「下背壓力」常不是單一部位的問題，先從腰背和骨盆的分工開始整理，像「單腳蹲起身」這類動作可以放在居家練習先試。", "detail": "如果你常覺得久坐後腰下方很緊、站起來總覺得腰在頂著，先用「單腳蹲起身」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "單腳蹲起身", "movement_code": "D143", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/4991187494439107/", "content_status": "https://www.facebook.com/reel/4991187494439107/", "raw_hook": "(能一次做成功的,留言給我!)", "raw_day": "295", "raw_page": "150", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(能一次做成功的,留言給我!)\n如果你有一天發現,\n身體好像變得沒那麼靈活了?\n和以前的自己,差很多?\n那你更該試試這個動作!\n髖關節,是全身最靈活、也最容易失靈的部位\n什麼骨盆歪、臀型扁、腰痛...\n很多問題,其實都跟「髖」有關!\n現在起,開始練這個\n不靠手,直接坐起來!\n你會發現:\n痠痛慢慢消失\n整個人都年輕了!"}, {"id": "ex_day_293_d132", "content_type": "單一動作", "source_type": "D", "source_id": "293", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(很多人不願說的真相!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "三點式扭轉", "difficulty": "進階", "order": "1", "card_reason": "先用「三點式扭轉」把腰背和骨盆的分工叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓腰背和骨盆的分工找到方向，通常比一次做到很深更有用。", "movement_name": "三點式扭轉", "movement_code": "D132", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BRaDaRBtf/", "content_status": "https://www.facebook.com/share/r/1BRaDaRBtf/", "raw_hook": "(很多人不願說的真相!)", "raw_day": "293", "raw_page": "151", "raw_text": "◤一個超級難,但能改善久坐腰痛的動作◢\n(很多人不願說的真相!)\n腰痛的時候,\n你是不是也只想到去按摩?\n但這,可能就是你一直好不了的原因!\n真正的問題是——\n你長時間坐著不動,\n側腰肌肉卡住了!\n試試這個動作\n抬高屁股\n喚醒側腰深層肌肉\n你會發現——\n腰的酸痛,正在默默消失!"}, {"id": "ex_day_292", "content_type": "單一動作", "source_type": "單一動作", "source_id": "292", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "很多人以為練臀就能改善,", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "轉體支撐鴿式", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深，像「轉體支撐鴿式」這類動作可以放在身體很緊時先試。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "轉體支撐鴿式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1bZcH8Mo6y/", "content_status": "https://www.facebook.com/share/r/1bZcH8Mo6y/", "raw_hook": "很多人以為練臀就能改善,", "raw_day": "292", "raw_page": "152", "raw_text": "◤一個超級難,但能改善臀凹陷的動作◢\n(做完屁股又酸又爽!)\n如果你兩側屁股凹凹的,形狀不飽滿,\n做這個動作,求求了!\n很多人以為練臀就能改善,\n但現實是:越練越凹、越看越明顯...\n明明有努力,成果卻像白做工。\n關鍵在這裡\n撐起身體\n胸口往前轉\n這個角度一到位,\n凹陷自然填起來!"}, {"id": "ex_day_291", "content_type": "單一動作", "source_type": "單一動作", "source_id": "291", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完腰又酸又爽!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "蠍子式", "difficulty": "進階", "order": "1", "card_reason": "「蠍子式」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看腰不用一直自己扛，效果會比單純硬拉更清楚像「蠍子式」這類動作，可以放在想測感覺時先做。", "movement_name": "蠍子式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1247607189738294/", "content_status": "https://www.facebook.com/reel/1247607189738294/", "raw_hook": "(做完腰又酸又爽!)", "raw_day": "291", "raw_page": "153", "raw_text": "◤一個很難, 但能改善久坐腰痛的動作◢\n(做完腰又酸又爽!)\n如果你超過25歲,\n還能一次做好這個動作,\n請收下我的膝蓋!\n腰痛不是年紀的錯,\n是你久坐+骨盆歪掉的代價\n現在,練這招:\n腳往後擺,不用碰地!\n但你要能【穩穩控制地往外伸】\n做完保證你會說:\n「腰,突然好輕鬆!」"}, {"id": "ex_day_290", "content_type": "單一動作", "source_type": "單一動作", "source_id": "290", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(每天2分鐘,沒效的留言找我!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "滾筒開胸椎", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓脊椎和胸廓的旋轉重新有反應，動作才會比較順。", "detail": "不要急著追求痠痛感，先讓脊椎和胸廓的旋轉變得比較會配合，身體才不會越練越緊像「滾筒開胸椎」這類動作，可以放在動作前面先做。", "movement_name": "滾筒開胸椎", "movement_code": "", "sets_reps": "2分鐘", "equipment": "瑜伽磚、滾筒", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1anzAVcu3D/", "content_status": "https://www.facebook.com/share/r/1anzAVcu3D/", "raw_hook": "(每天2分鐘,沒效的留言找我!)", "raw_day": "290", "raw_page": "154", "raw_text": "◤一個很難,但能改善肩頸僵硬的動作◢\n(每天2分鐘,沒效的留言找我!)\n如果你上背痠緊、轉頭會卡卡的,\n做這個動作,你會感謝我!\n我發現大部分人肩頸不舒服,\n不是緊,而是——\n肩胛控制差、感受不到背部肌肉。\n找到你最卡的點,慢慢活動脊椎,\n你的肩胛打開,\n肩頸痛就會舒服很多!"}, {"id": "ex_day_289", "content_type": "單一動作", "source_type": "單一動作", "source_id": "289", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "每天2分鐘保養一下,", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "雙邊坐起身", "difficulty": "進階", "order": "1", "card_reason": "「雙邊坐起身」不是要你做到很酸，而是先整理腰背和骨盆的分工，讓腰不用一直自己扛。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人，先做「雙邊坐起身」找回該出力的位置，再回頭測原本不順的地方。", "movement_name": "雙邊坐起身", "movement_code": "", "sets_reps": "2分鐘", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1H473ZQxjW/", "content_status": "https://www.facebook.com/share/r/1H473ZQxjW/", "raw_hook": "每天2分鐘保養一下,", "raw_day": "289", "raw_page": "155", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(小孩能做,大人卻常常做不到!)\n我沒看過,超過25歲,\n還能一次做好這個動作!\n骨盆的旋轉功能,\n是退化最快的,\n彈響髖、坐骨神經痛、腰痛,\n也都跟它有關。\n每天2分鐘保養一下,\n你的骨盆年齡,\n至少比同齡人年輕5歲!"}, {"id": "ex_day_287", "content_type": "單一動作", "source_type": "單一動作", "source_id": "287", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(骨盆前傾、後傾,都該看這個!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "滾筒弓箭步", "difficulty": "進階", "order": "1", "card_reason": "遇到開髖做很多還是覺得髖轉不順時，可以先用「滾筒弓箭步」把骨盆和大腿的活動接回來。", "detail": "開髖做很多還是覺得髖轉不順的時候，先別急著加難度，做完再看髖比較能轉開有沒有改善像「滾筒弓箭步」這類動作，可以放在睡前先做。", "movement_name": "滾筒弓箭步", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1916429095816074/", "content_status": "https://www.facebook.com/reel/1916429095816074/", "raw_hook": "(骨盆前傾、後傾,都該看這個!)", "raw_day": "287", "raw_page": "156", "raw_text": "◤一個超級難,但是專治骨盆僵硬的動作◢\n(骨盆前傾、後傾,都該看這個!)\n很多人以為,身體哪裡緊,\n就用力拉一拉、按一按,\n其實沒幫助!\n尤其久坐族常見的——\n髖屈肌超級緊,\n一直拉、一直拉,問題還是在...\n滾筒往後滾,\n拉長前側的同時,\n練習穩定骨盆。\n關鍵不只是柔軟度,\n而是柔軟加上控制力!"}, {"id": "ex_day_286", "content_type": "單一動作", "source_type": "單一動作", "source_id": "286", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(久站、久坐都做這個!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "fig4拉腰", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打下背壓力，重點是把活動範圍慢慢打開，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先把活動範圍慢慢打開，讓後面的動作比較不會亂用力。", "movement_name": "fig4拉腰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Cxowh7f67/", "content_status": "https://www.facebook.com/share/r/1Cxowh7f67/", "raw_hook": "(久站、久坐都做這個!)", "raw_day": "286", "raw_page": "157", "raw_text": "◤一個很酸,但能改善尾椎痛的動作◢\n(久站、久坐都做這個!)\n如果你尾椎卡卡,腰痛偏一側,\n做這個動作,求求了!\n這其實是——\n深層肌「一邊太緊,一邊太弱」!\n姿勢一歪,整個人就歪到底,\n所以坐久就痛。\n骨盆穩定貼地,\n盡可能把上半身立起,\n你會發現,肌肉拉開,\n腰痛突然就消失了!"}, {"id": "ex_day_286_2", "content_type": "單一動作", "source_type": "單一動作", "source_id": "286", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(練臀前的關鍵暖身!不能跳過", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "穩定髖CARs", "difficulty": "進階", "order": "1", "card_reason": "想讓力量不要再跑錯地方，先看臀肌和髖的連結有沒有配合；「穩定髖CARs」就是做這件事。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺時使用；不用做到很深，先讓臀肌和髖的連結有反應就好。", "movement_name": "穩定髖CARs", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DPZYamzZN/", "content_status": "https://www.facebook.com/share/r/1DPZYamzZN/", "raw_hook": "(練臀前的關鍵暖身!不能跳過", "raw_day": "286", "raw_page": "158", "raw_text": "◤一個超級難,但能幫你練出翹臀的動作◢\n(練臀前的關鍵暖身!不能跳過\n)\n我觀察到:\n臀型有問題的人,幾乎都有一個通病\n髖活動能力太差\n結果呢?\n腰先累、腿先痠,臀部根本「不參與」\n想練到屁股,就要讓它能出力\n穩定住你的腰\n慢慢加大腳的繞圈範圍\n下次健身前試試看,\n炸翻你的屁屁!"}, {"id": "ex_day_285", "content_type": "單一動作", "source_type": "單一動作", "source_id": "285", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(柔軟≠穩定,缺的是控制力!)", "purpose": "先鬆開", "secondary_purpose": "找回發力", "title": "離心腿後側", "difficulty": "中階", "order": "1", "card_reason": "「離心腿後側」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓骨盆和大腿的活動找到方向，通常比一次做到很深更有用像「離心腿後側」這類動作，可以放在暖身時先做。", "movement_name": "離心腿後側", "movement_code": "", "sets_reps": "4秒", "equipment": "徒手", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DjJBAYFH8/", "content_status": "https://www.facebook.com/share/r/1DjJBAYFH8/", "raw_hook": "(柔軟≠穩定,缺的是控制力!)", "raw_day": "285", "raw_page": "159", "raw_text": "◤一個超級酸,但能改善骨盆後傾的動作◢\n(柔軟≠穩定,缺的是控制力!)\n你是不是也試過——\n骨盆後傾→ 要放鬆大腿後側\n練瑜伽前屈、拉筋,結果呢?\n彎得下去,體態卻沒變好\n其實很多人都誤會了:\n「緊」≠ 需要被拉長!\n真正問題是——缺乏控制力。\n數4秒慢慢往前,大腿後側會發抖,\n但酸得有道理!這才能練到\n骨盆控制和 後側穩定度\n姿勢矯正,\n不是只有拉筋,\n穩定才是關鍵!"}, {"id": "ex_day_284", "content_type": "單一動作", "source_type": "單一動作", "source_id": "284", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(別再按摩揉腰,問題不在那!)", "purpose": "活動度", "secondary_purpose": "活動度", "title": "側躺內旋", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「側躺內旋」這類動作可以放在收操時先試。", "detail": "它比較像整理開關，先讓腰不用一直自己扛，再進入伸展或訓練會比較穩像「側躺內旋」這類動作，可以放在收操時先做。", "movement_name": "側躺內旋", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/24096259336696082/", "content_status": "https://www.facebook.com/reel/24096259336696082/", "raw_hook": "(別再按摩揉腰,問題不在那!)", "raw_day": "284", "raw_page": "160", "raw_text": "◤一個很酸,但能改善久坐腰痛的動作◢\n(別再按摩揉腰,問題不在那!)\n如果你腰常常酸痛,蹲下去卡卡的,\n做這個動作,你會感謝我!\n骨盆分為內旋和外旋兩種方向,\n但日常動的超少,\n坐整天幾乎沒在動,\n久了腰只好出來代打,\n結果換它開始痛。\n這招就是:\n固定住腰,把腳踝上下動到極限,\n讓你的骨盆醒過來,\n腰才終於可以放假!"}, {"id": "ex_day_282", "content_type": "單一動作", "source_type": "單一動作", "source_id": "282", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(身體Reset,越動越年輕!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "趴姿髖CARs", "difficulty": "新手", "order": "1", "card_reason": "如果開髖做很多還是覺得髖轉不順，先做「趴姿髖CARs」，會比直接加強更容易找到感覺。", "detail": "適合開髖做很多還是覺得髖轉不順的人放在訓練前，先整理張力，再進入主要動作像「趴姿髖CARs」這類動作，可以放在第一輪先做。", "movement_name": "趴姿髖CARs", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1862a6PfzU/", "content_status": "https://www.facebook.com/share/r/1862a6PfzU/", "raw_hook": "(身體Reset,越動越年輕!)", "raw_day": "282", "raw_page": "161", "raw_text": "◤一個超級酸,但能讓你年輕5歲的動作◢\n(身體Reset,越動越年輕!)\n如果你覺得身體好緊,\n別再硬拉筋,改做這個動作!\n緊繃不一定是肌肉縮短,\n更多是身體在代償用力。\n像坐太久,髖關節不穩定,\n身體只好找別的肌肉來硬撐,\n這才讓你一直覺得「好緊」。\n多做活動度訓練,解除假性緊繃。\n這不是那種放鬆按摩會給的舒服感,\n是會酸、會抖,做完卻像開機重啟!"}, {"id": "ex_day_281", "content_type": "單一動作", "source_type": "單一動作", "source_id": "281", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(真的!試過都說有感", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "滾筒內收鴿式", "difficulty": "進階", "order": "1", "card_reason": "這類「臀型不好看」常不是單一部位的問題，先從髖臀張力和發力順序開始整理，像「滾筒內收鴿式」這類動作可以放在居家練習先試。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊像「滾筒內收鴿式」這類動作，可以放在居家練習先做。", "movement_name": "滾筒內收鴿式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1772917013583120/", "content_status": "https://www.facebook.com/reel/1772917013583120/", "raw_hook": "(真的!試過都說有感", "raw_day": "281", "raw_page": "162", "raw_text": "◤一個很難,但能改善臀凹陷的動作◢\n(真的!試過都說有感\n)\n如果你臀部兩側凹一塊,\n明明有練,還是填不起來,\n做這個動作,求求了!\n很多人只做「被動放鬆」:\n比如按摩、坐著滾,\n雖然舒服,但體態不會變好!\n我們要做的是——主動控制+深層刺激!\n重點來了:\n滾筒往後推,慢~慢~往下坐,\n你的凹陷處會很有感\n儲存起來,連續做7 天!\n你會發現——臀型開始改變了"}, {"id": "ex_day_281_2", "content_type": "單一動作", "source_type": "單一動作", "source_id": "281", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(動一動腳掌,腿就不麻了!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "靠牆梨狀肌", "difficulty": "新手", "order": "1", "card_reason": "先用「靠牆梨狀肌」把骨盆和大腿的活動叫回來，後面的訓練才不容易跑偏。", "detail": "當開髖做很多還是覺得髖轉不順，可以先做「靠牆梨狀肌」；重點不是忍到很酸，而是讓骨盆和大腿的活動慢慢接回來。", "movement_name": "靠牆梨狀肌", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1JEaBuhCMx/", "content_status": "https://www.facebook.com/share/r/1JEaBuhCMx/", "raw_hook": "(動一動腳掌,腿就不麻了!)", "raw_day": "281", "raw_page": "165", "raw_text": "◤一個超級酸,但能改善久坐腿麻的動作◢\n(動一動腳掌,腿就不麻了!)\n有人問我:「我腿常常酸麻,是怎麼回事?」\n很可能是——坐骨神經卡住了!\n它從腰出發,一路經過骨盆到腳底,\n久坐不動,就會開始發麻、發酸!\n重點來了:腳掌的角度很關鍵!\n把腳板平平地勾起來,再慢慢放下,\n做到位,你會感覺——\n臀部深層!在!發!燒!\n你的酸麻感,也消失很多!"}, {"id": "ex_day_280", "content_type": "單一動作", "source_type": "單一動作", "source_id": "280", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(屁股凹凹的,統統來做這個先!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "滾筒格格蹲", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深，像「滾筒格格蹲」這類動作可以放在身體很緊時先試。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺時先做一輪，重點是感覺變清楚，不是把動作做大像「滾筒格格蹲」這類動作，可以放在身體很緊時先做。", "movement_name": "滾筒格格蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/9989171454470245/", "content_status": "https://www.facebook.com/reel/9989171454470245/", "raw_hook": "(屁股凹凹的,統統來做這個先!)", "raw_day": "280", "raw_page": "166", "raw_text": "◤一個超級難,但能改善臀凹陷的動作◢\n(屁股凹凹的,統統來做這個先!)\n如果你兩側屁股凹陷,\n練臀完全沒感覺,\n做這個動作,求求了!\n你可能是「臀大肌攣縮」!\n簡單說——肌肉縮太緊,\n再怎麼練,發力都跑腿,\n結果...屁股沒翹、腿卻變壯!\n用膝蓋頂住滾筒,讓臀部重新鬆開,\n警告:會!很!酸!\n但做完你會瞬間懂——\n原來這才是「臀部發力」的感覺"}, {"id": "ex_day_279", "content_type": "單一動作", "source_type": "單一動作", "source_id": "279", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(腰在痛,問題點不一定在腰部!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "SI活動", "difficulty": "新手", "order": "1", "card_reason": "「SI活動」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把活動範圍慢慢打開，讓後面的動作比較不會亂用力像「SI活動」這類動作，可以放在想測感覺時先做。", "movement_name": "SI活動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1291018213027564/", "content_status": "https://www.facebook.com/reel/1291018213027564/", "raw_hook": "(腰在痛,問題點不一定在腰部!)", "raw_day": "279", "raw_page": "163", "raw_text": "◤一個很酸,但能改善長期腰痛的動作◢\n(腰在痛,問題點不一定在腰部!)\n如果你腰痛常發作,\n別去亂整骨,改做這個動作!\n骨盆是髂骨+骶骨組成,\n久坐會讓這邊黏在一起,\n導致腰痛、痠、怎麼按摩都沒用!\n這個動作一次搞定兩件事:\n喚醒腹肌\n打開僵硬的骨盆\n留言跟我說,\n你有沒有感覺骨盆解鎖了!"}, {"id": "ex_day_277", "content_type": "單一動作", "source_type": "單一動作", "source_id": "277", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(清潔系伸展法,你猜到了嗎?)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "趴姿招財貓", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓肩胛的滑動和支撐重新有反應，動作才會比較順。", "detail": "如果你常覺得肩膀放不下來、肩胛也不太聽話，先用「趴姿招財貓」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "趴姿招財貓", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "毛巾", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1421533845658018/", "content_status": "https://www.facebook.com/reel/1421533845658018/", "raw_hook": "(清潔系伸展法,你猜到了嗎?)", "raw_day": "277", "raw_page": "164", "raw_text": "◤一個很難,但能改善肩頸酸痛的動作◢\n(清潔系伸展法,你猜到了嗎?)\n坐在電腦前幾個小時,\n肩頸又酸又硬,\n做這個動作,求求了!\n坐太久不動,肩膀、腰都會叫救命,\n而最大元兇...就是肩胛骨!\n它卡住你上半身的活動力!\n拿出兩塊抹布,\n和一塊髒髒的地板,\n不只肩頸放鬆,連地板都乾淨了!"}, {"id": "ex_day_276", "content_type": "單一動作", "source_type": "單一動作", "source_id": "276", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(一邊滑手機、一邊拉臀肌,你來試試!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "內收大貓", "difficulty": "新手", "order": "1", "card_reason": "「內收大貓」不是要你做到很酸，而是先整理腰背和骨盆的分工，讓腰不用一直自己扛。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人，先做「內收大貓」先把過度緊繃降下來，再回頭測原本不順的地方。", "movement_name": "內收大貓", "movement_code": "", "sets_reps": "2分鐘", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1PZNkMRJji/", "content_status": "https://www.facebook.com/share/r/1PZNkMRJji/", "raw_hook": "(一邊滑手機、一邊拉臀肌,你來試試!)", "raw_day": "276", "raw_page": "167", "raw_text": "◤一個很酸,但能改善腰痠腿麻的動作◢\n(一邊滑手機、一邊拉臀肌,你來試試!)\n如果你腰痠、腿麻、按摩也沒啥用,\n做這個動作,你會感謝我!\n很多人都忽略了——\n肌肉有分淺層和深層,\n你按的,是表面那層,\n真正讓你卡住的,是裡面那層!\n解法來了:雙腳交叉,\n找一個你有拉伸感的位置\n停住+深呼吸2分鐘\n做完你會發現,\n欸腿怎麼變輕了!\n緊繃的感覺...也不見了!"}, {"id": "ex_day_274", "content_type": "單一動作", "source_type": "單一動作", "source_id": "274", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(連O型腿也有效喔!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "青蛙趴", "difficulty": "新手", "order": "1", "card_reason": "遇到臀凹、假胯或屁股線條看起來被拉住時，可以先用「青蛙趴」把髖臀張力和發力順序接回來。", "detail": "它比較像整理開關，先讓臀線比較容易往上整理，再進入伸展或訓練會比較穩像「青蛙趴」這類動作，可以放在睡前先做。", "movement_name": "青蛙趴", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CipiXHNAD/", "content_status": "https://www.facebook.com/share/r/1CipiXHNAD/", "raw_hook": "(連O型腿也有效喔!)", "raw_day": "274", "raw_page": "168", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(連O型腿也有效喔!)\n如果你站著,大腿外側凸一塊,\n或骨盆寬寬的、腿還不直,\n那你很可能就是——假胯寬!\n你可能會說:「我也不知道我是哪種體態啊!」\n沒關係,我教你一招超簡單判斷法\n找我標題寫「假胯寬」的動作,通通試一遍!\n做起來很酸、卡卡的——代表你超需要!\n做起來沒什麼感覺——可以跳過,別留戀~\n體態問題不會靠一招解決,\n但這能幫你判斷:\n這個動作,值不值得你花時間練!"}, {"id": "ex_day_273", "content_type": "單一動作", "source_type": "單一動作", "source_id": "273", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "(落枕、偏頭痛的人也很適合!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "頸部訓練", "difficulty": "進階", "order": "1", "card_reason": "這個動作主打肩頸緊繃，重點是找回該出力的位置，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看肩頸會比較輕，效果會比單純硬拉更清楚。", "movement_name": "頸部訓練", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1L7SwZmSZP/", "content_status": "https://www.facebook.com/share/r/1L7SwZmSZP/", "raw_hook": "(落枕、偏頭痛的人也很適合!)", "raw_day": "273", "raw_page": "169", "raw_text": "◤一個很難,但能改善肩頸痛的動作◢\n(落枕、偏頭痛的人也很適合!)\n如果你是「硬頸派」,肩膀硬梆梆,\n做這個動作,求求了!\n很多人肩頸卡卡、酸痛,\n卻又怕亂動會長骨刺,乾脆放著不管,\n結果呢?痛得更久、連睡覺都影響!\n試著把下巴——\n慢~慢地往左邊碰地、\n再往右邊碰地,\n然後往前伸出去!\n你會發現:\n「欸?緊繃感不見了!」"}, {"id": "ex_day_272", "content_type": "單一動作", "source_type": "單一動作", "source_id": "272", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(幫你把身體「解凍」!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "弓步踢腿", "difficulty": "進階", "order": "1", "card_reason": "想讓外觀看起來更順，先看髖臀張力和發力順序有沒有配合；「弓步踢腿」就是做這件事。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時使用；不用做到很深，先讓髖臀張力和發力順序有反應就好像「弓步踢腿」這類動作，可以放在走路後先做。", "movement_name": "弓步踢腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "球", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1015038640830084/", "content_status": "https://www.facebook.com/reel/1015038640830084/", "raw_hook": "(幫你把身體「解凍」!)", "raw_day": "272", "raw_page": "170", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(幫你把身體「解凍」!)\n我沒看過,超過25歲,\n還能一次做成功!\n你的身體,\n是從什麼時候開始退化的?\n答案可能是——\n從你開始上學的那天開始。\n上班、上課一直坐,\n導致髂腰肌又弱又縮!\n下班去跑步、打羽球,\n就很容易拉傷。\n這個動作練一週,\n你會發現原本沉重的下半身,\n變得輕鬆、更靈活了!"}, {"id": "ex_day_270", "content_type": "單一動作", "source_type": "單一動作", "source_id": "270", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "但這是你在復原的信號!", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "站姿招財貓", "difficulty": "新手", "order": "1", "card_reason": "「站姿招財貓」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當肩膀往前捲、背看起來厚，胸口也打不開，可以先做「站姿招財貓」；重點不是忍到很酸，而是讓胸口和肩胛位置慢慢接回來。", "movement_name": "站姿招財貓", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、牆面", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CLdkgdunJ/", "content_status": "https://www.facebook.com/share/r/1CLdkgdunJ/", "raw_hook": "但這是你在復原的信號!", "raw_day": "270", "raw_page": "172", "raw_text": "◤一個超級酸,但能改善圓肩駝背的動作◢\n(做完肩膀又酸又爽!)\n如果你常被說體態不好,走路像在縮背,\n拜託,一定要試這個動作!\n肩膀有外旋和內旋兩種方向,有圓肩的人\n肩胛骨通常也僵硬,旋轉動作不順,\n肩頸就會開始痠、卡、痛,\n靠牆,讓手臂慢~慢地上下滑動,\n你會感覺肩膀在燃燒,\n但這是你在復原的信號!"}, {"id": "ex_day_269", "content_type": "單一動作", "source_type": "單一動作", "source_id": "269", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(別讓沙發決定你的體態!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "趴駱駝式", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整骨盆和大腿的活動，像「趴駱駝式」這類動作可以放在收操時先試。", "detail": "開髖做很多還是覺得髖轉不順的時候，先別急著加難度，做完再看髖比較能轉開有沒有改善像「趴駱駝式」這類動作，可以放在收操時先做。", "movement_name": "趴駱駝式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊、沙發", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/685168891048406/", "content_status": "https://www.facebook.com/reel/685168891048406/", "raw_hook": "(別讓沙發決定你的體態!)", "raw_day": "269", "raw_page": "171", "raw_text": "◤一個超級酸,但能改善骨盆後傾的動作◢\n(別讓沙發決定你的體態!)\n如果你下班回家,直接攤在沙發,\n做這個動作,求求了!\n骨盆沒有絕對的前傾或後傾,\n但久坐讓身體一直往前縮,\n骨盆也跟著越坐越後傾,\n以後看電視的時候,\n一邊拉開你前側卡住的筋膜,\n不但時間沒浪費,\n身體還會說謝謝你!"}, {"id": "ex_day_268", "content_type": "單一動作", "source_type": "單一動作", "source_id": "268", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "因為你每天坐著打電腦、滑手機,", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "蜥蜴上犬", "difficulty": "進階", "order": "1", "card_reason": "如果背一邊緊、一邊凸，先做「蜥蜴上犬」，會比直接加強更容易找到感覺。", "detail": "適合背一邊緊、一邊凸，轉身也不太順的人放在訓練前，先整理張力，再進入主要動作像「蜥蜴上犬」這類動作，可以放在第一輪先做。", "movement_name": "蜥蜴上犬", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1032591352346940/", "content_status": "https://www.facebook.com/reel/1032591352346940/", "raw_hook": "因為你每天坐著打電腦、滑手機,", "raw_day": "268", "raw_page": "174", "raw_text": "◤一個很難,但能改善圓肩駝背的動作◢\n(哇~身體突然變輕了!上班族必備)\n如果你上班肩頸超緊,怎麼按都按不開,\n做這個動作,求求了!\n為什麼會這樣?\n因為你每天坐著打電腦、滑手機,\n胸肌越來越緊,脊椎幾乎不動!\n按摩雖然舒服,但效果短暫。\n想要根本解決,還得靠『動作』!\n用一招,喚醒你的胸、背,\n還有整條脊椎的力量,\n讓身體重新打通。"}, {"id": "ex_day_267", "content_type": "單一動作", "source_type": "單一動作", "source_id": "267", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(年齡不是數字,是由活動能力決定的!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "盤腿手槍蹲", "difficulty": "進階", "order": "1", "card_reason": "這類「膝蓋不舒服」常不是單一部位的問題，先從髖、膝、腳踝的配合開始整理。", "detail": "如果你常覺得跑跳或蹲跪時膝蓋不安心，先用「盤腿手槍蹲」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "盤腿手槍蹲", "movement_code": "", "sets_reps": "3下", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1469186374245686/", "content_status": "https://www.facebook.com/reel/1469186374245686/", "raw_hook": "(年齡不是數字,是由活動能力決定的!)", "raw_day": "267", "raw_page": "175", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(年齡不是數字,是由活動能力決定的!)\n我沒看過,超過18歲,還能一次做成功!\n我們明明有兩條腿,\n但走路、跑步,都是靠單腳在撐!\n平常感覺不到,一做這個動作,\n就搖搖晃晃、東倒⻄歪。\n從18歲開始,活動能力就在悄悄下滑,\n多做單腿蹲,你會比同齡人更健康!"}, {"id": "ex_day_266", "content_type": "單一動作", "source_type": "單一動作", "source_id": "266", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(腿直不直,是由你的屁股決定!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "伸腿下犬", "difficulty": "進階", "order": "1", "card_reason": "先用「伸腿下犬」把髖臀張力和發力順序叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓髖臀張力和發力順序找到方向，通常比一次做到很深更有用像「伸腿下犬」這類動作，可以放在下次訓練前先做。", "movement_name": "伸腿下犬", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Cbqj5aWz7/", "content_status": "https://www.facebook.com/share/r/1Cbqj5aWz7/", "raw_hook": "(腿直不直,是由你的屁股決定!)", "raw_day": "266", "raw_page": "173", "raw_text": "◤一個超級難,但能讓你腿更直的動作◢\n(腿直不直,是由你的屁股決定!)\n如果你對腿型不滿意,\n做這個動作,求求了!\n因為腿不直,通常臀部也出問題,\n分析女生的體態時,\n像什麼X型腿、假胯寬、臀凹陷,\n常常會一起出現。\n在下犬式的基礎上,加上腿的動作,\n你的臀部就會直接醒過來!"}, {"id": "ex_day_264", "content_type": "單一動作", "source_type": "單一動作", "source_id": "264", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完,屁股又酸又爽!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "抱膝伸展", "difficulty": "新手", "order": "1", "card_reason": "這個方向能幫你讓身體先不要一直繃著；先求控制清楚，不用急著做很深，像「抱膝伸展」這類動作可以放在身體很緊時先試。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "抱膝伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1592464498087126/", "content_status": "https://www.facebook.com/reel/1592464498087126/", "raw_hook": "(做完,屁股又酸又爽!)", "raw_day": "264", "raw_page": "176", "raw_text": "◤一個很酸,但能改善久坐腰痛的動作◢\n(做完,屁股又酸又爽!)\n如果你腰常常不舒服,\n做這個動作,求求了!\n久坐的人,身體會出現兩種變化,\n骨盆往後傾,或是臀大肌攣縮,\n讓你變成——『腰痛星人』。\n所以來!\n抱膝往胸,深層拉伸你的屁屁\n做一次,就知道我沒騙你!"}, {"id": "ex_day_263", "content_type": "單一動作", "source_type": "單一動作", "source_id": "263", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "每天花一點時間,", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "面牆9090轉開", "difficulty": "新手", "order": "1", "card_reason": "「面牆9090轉開」適合放在前面，先讓髖比較能轉開，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看髖比較能轉開，效果會比單純硬拉更清楚。", "movement_name": "面牆9090轉開", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/2351653911899222/", "content_status": "https://www.facebook.com/reel/2351653911899222/", "raw_hook": "每天花一點時間,", "raw_day": "263", "raw_page": "177", "raw_text": "◤一個超級酸,但能快速打開骨盆的動作◢\n(酸歸酸,做完真的超有感!)\n骨盆一旦卡住,很多動作都做不起來,\n如果你也是,拜託,從這招開始練!\n想要打開骨盆,鬆開卡住的地方\n光靠按摩真的不夠,\n骨盆深層的卡點,得靠動作來刺激它!\n每天花一點時間,\n你自己就能把骨盆鬆開、活動力大升級!"}, {"id": "ex_day_261_d119", "content_type": "單一動作", "source_type": "D", "source_id": "261", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(骨盆調對了,整個人都年輕!)", "purpose": "找回發力", "secondary_purpose": "", "title": "半跪扭腰", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓骨盆和大腿的活動重新有反應，動作才會比較順，像「半跪扭腰」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓骨盆和大腿的活動變得比較會配合，身體才不會越練越緊像「半跪扭腰」這類動作，可以放在動作前面先做。", "movement_name": "半跪扭腰", "movement_code": "D119", "sets_reps": "依影片跟練", "equipment": "椅子、軟墊", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CfWwARKQJ/", "content_status": "https://www.facebook.com/share/r/1CfWwARKQJ/", "raw_hook": "(骨盆調對了,整個人都年輕!)", "raw_day": "261", "raw_page": "180", "raw_text": "◤一個很難,但能讓你年輕5歲的動作◢\n(骨盆調對了,整個人都年輕!)\n我沒看過,超過25歲,還能一次做成功!\n因為只要你是久坐族,\n一定會開始翹腳、側躺、半癱,\n只要一個禮拜,骨盆就開始歪掉!\n但你不需要什麼貴椅子、坐墊,\n只要這個簡單的動作,骨盆就能回到年輕狀態!"}, {"id": "ex_day_260", "content_type": "單一動作", "source_type": "單一動作", "source_id": "260", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(最喜歡這種簡單又高效的!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "簡單麻花", "difficulty": "新手", "order": "1", "card_reason": "「簡單麻花」不是要你做到很酸，而是先整理腰背和骨盆的分工，讓腰不用一直自己扛。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人，先做「簡單麻花」先把過度緊繃降下來，再回頭測原本不順的地方。", "movement_name": "簡單麻花", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/705942301921030/", "content_status": "https://www.facebook.com/reel/705942301921030/", "raw_hook": "(最喜歡這種簡單又高效的!)", "raw_day": "260", "raw_page": "179", "raw_text": "◤一個很舒服,又能改善腰痠腿麻的動作◢\n(最喜歡這種簡單又高效的!)\n如果你最近坐久了,腰痠、腿麻,別去亂整骨,改做這個動作!\n其實是神經太敏感、肌肉太緊繃,\n像梨狀肌壓到坐骨神經,就會開始酸、麻、痛。\n尤其是上班族、媽媽族最常遇到。\n睡前做這個動作,把壓力釋放掉,\n隔天醒來,真的輕鬆一整天!"}, {"id": "ex_day_259", "content_type": "單一動作", "source_type": "單一動作", "source_id": "259", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(這個動作一做,按摩費都省了!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "9090側彎", "difficulty": "中階", "order": "1", "card_reason": "遇到背一邊緊、一邊凸時，可以先用「9090側彎」把脊椎和胸廓的旋轉接回來。", "detail": "背一邊緊、一邊凸，轉身也不太順的時候，先別急著加難度，做完再看身體左右更容易平衡有沒有改善像「9090側彎」這類動作，可以放在睡前先做。", "movement_name": "9090側彎", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1244621977341492/", "content_status": "https://www.facebook.com/reel/1244621977341492/", "raw_hook": "(這個動作一做,按摩費都省了!)", "raw_day": "259", "raw_page": "181", "raw_text": "◤一個有點難,但能改善深層腰痛的動作◢\n(這個動作一做,按摩費都省了!)\n有人私訊我,腰靠近骨盆那邊常常痛,該怎麼辦?\n其實腰部本來就很靈活,\n但你一整天久坐,讓它幾乎沒在動,\n久了就會肌肉僵硬、循環變差、腰開始痠痛。\n這個動作,重點是——\n肩膀碰到大腿內側,屁股不能離地,\n慢慢彎下去,把深層肌肉重新喚醒!"}, {"id": "ex_day_257", "content_type": "單一動作", "source_type": "單一動作", "source_id": "257", "body_part": "肩頸", "pain_point": "肩膀卡住", "pain_point_original": "(肩膀喀喀響?做這招打開它!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "揹娃娃", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打肩膀卡住，重點是把活動範圍慢慢打開，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先把活動範圍慢慢打開，讓後面的動作比較不會亂用力像「揹娃娃」這類動作，可以放在久坐後先做。", "movement_name": "揹娃娃", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1049040499885713/", "content_status": "https://www.facebook.com/reel/1049040499885713/", "raw_hook": "(肩膀喀喀響?做這招打開它!)", "raw_day": "257", "raw_page": "182", "raw_text": "◤一個超級酸,但能改善肩膀卡卡的動作◢\n(肩膀喀喀響?做這招打開它!)\n上次那個「手肘夾膝蓋」,\n如果你做不到,那這招一定要試試!\n其實你肩膀會卡、會喀喀響,\n不是老了,是肩膀+肩胛骨活動度一起出問題了!\n尤其慣用手那邊最容易卡,久了連脖子、上背都會跟著緊!\n把手往上拉高,打開肩膀\n整個上半身鬆!爽!不卡卡!"}, {"id": "ex_day_256_d140", "content_type": "單一動作", "source_type": "D", "source_id": "256", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "青蛙趴(原D140)(改善臀凹陷 C戈 骨盆不動 慢速)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "青蛙趴", "difficulty": "新手", "order": "1", "card_reason": "想讓外觀看起來更順，先看髖臀張力和發力順序有沒有配合；「青蛙趴」就是做這件事。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時使用；不用做到很深，先讓髖臀張力和發力順序有反應就好像「青蛙趴」這類動作，可以放在走路後先做。", "movement_name": "青蛙趴", "movement_code": "D140", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1783153259263108/", "content_status": "https://www.facebook.com/reel/1783153259263108/", "raw_hook": "青蛙趴(原D140)(改善臀凹陷C戈 骨盆不動 慢速)", "raw_day": "256", "raw_page": "178", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(有假胯寬、臀凹陷的女生,一定要試!)\n如果你大腿兩側凸起,摸起來硬硬的,\n做這個動作,求求了!\n假胯寬,其實是臀部深層太沒力,\n產後、久坐、沒運動,都很容易中!\n嚴重一點,屁股會變凹、腿型更不好看。\n記住:用大腿帶動小腿抬高,\n骨盆穩住不晃,才會有效!"}, {"id": "ex_day_254", "content_type": "單一動作", "source_type": "單一動作", "source_id": "254", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "(電腦用多了,做這個很有效!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "手指阻力", "difficulty": "新手", "order": "1", "card_reason": "「手指阻力」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓頸側和肩胛周圍張力找到方向，通常比一次做到很深更有用。", "movement_name": "手指阻力", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18ieWf8uHx/", "content_status": "https://www.facebook.com/share/r/18ieWf8uHx/", "raw_hook": "(電腦用多了,做這個很有效!)", "raw_day": "254", "raw_page": "184", "raw_text": "◤一個超級酸,但能改善媽媽手的動作◢\n(電腦用多了,做這個很有效!)\n如果你整天滑手機,還能一次做好,請收下我的膝蓋!\n用3C、切菜、握啞鈴,都會讓大拇指向內用力,內外不平衡,手腕、手指就開始痛。\n從你的慣用手開始做,控制每根手指的方向,一開始會超酸、超卡,但疼痛感反而慢慢減輕了!"}, {"id": "ex_day_253", "content_type": "單一動作", "source_type": "單一動作", "source_id": "253", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(做完脖子空空的,好舒服!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "稍息繞圈", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整肩胛的滑動和支撐。", "detail": "它比較像整理開關，先讓肩膀比較不會往上跑，再進入伸展或訓練會比較穩像「稍息繞圈」這類動作，可以放在收操時先做。", "movement_name": "稍息繞圈", "movement_code": "", "sets_reps": "2分鐘；3分鐘", "equipment": "軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/v/1GykWALgdv/", "content_status": "https://www.facebook.com/share/v/1GykWALgdv/", "raw_hook": "(做完脖子空空的,好舒服!)", "raw_day": "253", "raw_page": "185", "raw_text": "◤一個很難,但能改善肩頸僵硬的動作◢\n(做完脖子空空的,好舒服!)\n如果你脖子緊,常常落枕,做這個動作,你會感謝我!\n多數人按摩肩頸後,很快又變緊。因此,更有效率的做法是,從肩胛骨下手。\n這個動作的魔法,在第2分鐘才開始發威,你會發現,頭一直往前伸,肚子也想挺出去,控制好這兩個點,\n肩頸會突然——鬆開!超有感!"}, {"id": "ex_day_252", "content_type": "單一動作", "source_type": "單一動作", "source_id": "252", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(隨便一個小朋友,都能輕鬆完成!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "淺前流動", "difficulty": "進階", "order": "1", "card_reason": "如果開髖做很多還是覺得髖轉不順，先做「淺前流動」，會比直接加強更容易找到感覺。", "detail": "適合開髖做很多還是覺得髖轉不順的人放在訓練前，先整理張力，再進入主要動作像「淺前流動」這類動作，可以放在第一輪先做。", "movement_name": "淺前流動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/v/1GykWALgdv/", "content_status": "https://www.facebook.com/share/v/1GykWALgdv/", "raw_hook": "(隨便一個小朋友,都能輕鬆完成!)", "raw_day": "252", "raw_page": "186", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(隨便一個小朋友,都能輕鬆完成!)\n我沒看過,超過25歲,還能一次做成功!\n我們身體前後各有一條筋膜線,叫做淺前線,和淺背線。\n只要這兩條線失衡,骨盆就開始前傾、後傾,\n做對這個動作,重新喚醒你的筋膜彈性,讓你一直保持在年輕狀態!"}, {"id": "ex_day_250", "content_type": "單一動作", "source_type": "單一動作", "source_id": "250", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完,痛感立刻少一大半!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "半跪轉髖", "difficulty": "新手", "order": "1", "card_reason": "這類「下背壓力」常不是單一部位的問題，先從腰背和骨盆的分工開始整理，像「半跪轉髖」這類動作可以放在居家練習先試。", "detail": "不要急著追求痠痛感，先讓腰背和骨盆的分工變得比較會配合，身體才不會越練越緊。", "movement_name": "半跪轉髖", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "半跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17RoA9rAeM/", "content_status": "https://www.facebook.com/share/r/17RoA9rAeM/", "raw_hook": "(做完,痛感立刻少一大半!)", "raw_day": "250", "raw_page": "187", "raw_text": "◤一個很酸,但能幫你腰痛舒緩的動作◢\n(做完,痛感立刻少一大半!)\n如果你有腰痛,別再亂整骨,改做這個動作!\n我在問卷裡發現——很多人不只腰在痛,同時肩頸卡、屁股也緊!\n用這個扭轉動作,同時伸展腰、臀、肩,三大痠痛區域,直接一次幫你處理好!"}, {"id": "ex_day_249", "content_type": "單一動作", "source_type": "單一動作", "source_id": "249", "body_part": "肩頸", "pain_point": "肩膀卡住", "pain_point_original": "(做完肩膀又酸又爽!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "手肘夾肩", "difficulty": "新手", "order": "1", "card_reason": "先用「手肘夾肩」把肩關節和肩胛配合叫回來，後面的訓練才不容易跑偏。", "detail": "當手往上或往後時肩膀不順，可以先做「手肘夾肩」；重點不是忍到很酸，而是讓肩關節和肩胛配合慢慢接回來。", "movement_name": "手肘夾肩", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1430910047923673/", "content_status": "https://www.facebook.com/reel/1430910047923673/", "raw_hook": "(做完肩膀又酸又爽!)", "raw_day": "249", "raw_page": "188", "raw_text": "◤一個超級酸,但能改善肩膀卡卡的動作◢\n(做完肩膀又酸又爽!)\n如果你洗澡洗不到背,穿內衣卡半天,做這個動作,求求了!\n抓癢都靠別人幫,其實是肩膀後側的關節囊和小肌肉,整個黏住,害你的手抬不起來!\n這個動作很酸,但不只日常動作變順,連游泳、舉重也會進步!"}, {"id": "ex_day_247_d112", "content_type": "單一動作", "source_type": "D", "source_id": "247", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(孕媽咪們,從「找回核心力」開始調!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "開腿側棒式", "difficulty": "新手", "order": "1", "card_reason": "這個方向能幫你讓力量不要再跑錯地方；先求控制清楚，不用急著做很深，像「開腿側棒式」這類動作可以放在身體很緊時先試。", "detail": "適合開髖做很多還是覺得髖轉不順時先做一輪，重點是感覺變清楚，不是把動作做大像「開腿側棒式」這類動作，可以放在身體很緊時先做。", "movement_name": "開腿側棒式", "movement_code": "D112", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CLiyXYXcm/", "content_status": "https://www.facebook.com/share/r/1CLiyXYXcm/", "raw_hook": "(孕媽咪們,從「找回核心力」開始調!)", "raw_day": "247", "raw_page": "191", "raw_text": "◤一個超級酸,但能改善產後垮肚的動作◢\n(孕媽咪們,從「找回核心力」開始調!)\n懷孕真的很辛苦,產後還得面對身體鬆、肚子垮的問題,做這個動作,你會感謝我!\n產後因為鬆弛素分泌,深層核心變得沒力,\n內臟往下掉,就會出現腹直肌分離、肚子撐出來。\n這個動作會讓你重新找回腹部收緊的力量,\n不是靠手撐,是靠核心撐——從今天開始,把肚子拉回來!"}, {"id": "ex_day_246", "content_type": "單一動作", "source_type": "單一動作", "source_id": "246", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(不是腰壞掉,是動作退化了!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "祈禱扭轉", "difficulty": "新手", "order": "1", "card_reason": "「祈禱扭轉」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力像「祈禱扭轉」這類動作，可以放在想測感覺時先做。", "movement_name": "祈禱扭轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Gvssq6d5V/", "content_status": "https://www.facebook.com/share/r/1Gvssq6d5V/", "raw_hook": "(不是腰壞掉,是動作退化了!)", "raw_day": "246", "raw_page": "189", "raw_text": "◤一個很酸,但能改善慢性腰痛的動作◢\n(不是腰壞掉,是動作退化了!)\n如果你常腰痛,別急著去按摩,改做這個動作!\n因為腰痛,很多時候不是「腰」的問題,\n而是你某個動作功能退化了,像是——蹲不下去!\n結果身體就開始用腰代償,越來越痛!\n這個動作練一練,不只痛感減少,連走路姿勢都會變挺!"}, {"id": "ex_day_245_d137", "content_type": "單一動作", "source_type": "D", "source_id": "245", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(骨盆一鬆,體態直接回到學生時期!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "9090轉開", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖臀張力和發力順序重新有反應，動作才會比較順，像「9090轉開」這類動作可以放在動作前面先試。", "detail": "如果你常覺得臀凹、假胯或屁股線條看起來被拉住，先用「9090轉開」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "9090轉開", "movement_code": "D137", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1402457014282860/", "content_status": "https://www.facebook.com/reel/1402457014282860/", "raw_hook": "(骨盆一鬆,體態直接回到學生時期!)", "raw_day": "245", "raw_page": "194", "raw_text": "◤一個超難,但能讓你年輕5歲的動作◢\n(骨盆一鬆,體態直接回到學生時期!)\n覺得自己開始老了,哪裡都痠痛?做這個動作,求求了!\n因為——骨盆一僵,不只腰會痛,屁股也會開始下垂、凹陷,還變媽媽臀,整個體態崩掉。\n動作要點很簡單:腳跟頂地,別讓屁股往前跑,慢慢地,轉開你的骨盆。\n做完你會發現——欸?怎麼突然回到學生時期的感覺!"}, {"id": "ex_day_243", "content_type": "單一動作", "source_type": "單一動作", "source_id": "243", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(腰變細,比例就會好看很多!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "支撐青蛙", "difficulty": "新手", "order": "1", "card_reason": "「支撐青蛙」不是要你做到很酸，而是先整理骨盆和大腿的活動，讓髖比較能轉開。", "detail": "適合開髖做很多還是覺得髖轉不順的人，先做「支撐青蛙」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "支撐青蛙", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DyDod34xk/", "content_status": "https://www.facebook.com/share/r/1DyDod34xk/", "raw_hook": "(腰變細,比例就會好看很多!)", "raw_day": "243", "raw_page": "192", "raw_text": "◤一個很酸,但能幫你縮小腹的動作◢\n(腰變細,比例就會好看很多!)\n想要平坦小腹、螞蟻腰,別再做棒式,改做這個動作!\n因為腹型,其實跟內收肌、盆底肌超有關!只做仰臥起坐,根本練不到重點!\n記住,不要挺胸也不要挺髖,要用大腿內側發力,做對了,小腹真的會往內縮,你的身材比例也會大改變!"}, {"id": "ex_day_242", "content_type": "單一動作", "source_type": "單一動作", "source_id": "242", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "(提醒:想要直腿,也練好這一招!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "蝴蝶pivot", "difficulty": "進階", "order": "1", "card_reason": "遇到站久腳底塌、足弓撐不住時，可以先用「蝴蝶pivot」把足底支撐和下肢力線接回來。", "detail": "它比較像整理開關，先讓站立會更穩，再進入伸展或訓練會比較穩。", "movement_name": "蝴蝶pivot", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17Erk4mbJk/", "content_status": "https://www.facebook.com/share/r/17Erk4mbJk/", "raw_hook": "(提醒:想要直腿,也練好這一招!)", "raw_day": "242", "raw_page": "193", "raw_text": "◤一個超級難,但能改善足底筋膜炎的動作◢\n(提醒:想要直腿,也練好這一招!)\n我沒看過,超過25歲,還能一次做成功!\n因為我們長時間穿鞋,腳掌幾乎不動,久了就開始痠、腫、甚至發炎,還可能變成扁平足。\n這動作做起來足底會超酸,但結束後走一走,你會驚訝腳有多輕鬆!"}, {"id": "ex_day_240", "content_type": "單一動作", "source_type": "單一動作", "source_id": "240", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(你的屁股不是沒救,是方法用錯!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "髖圓周", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打臀型不好看，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度，像「髖圓周」這類動作可以放在久坐後先試。", "detail": "做完可以回頭測同一個角度，看看臀線比較容易往上整理，效果會比單純硬拉更清楚像「髖圓周」這類動作，可以放在久坐後先做。", "movement_name": "髖圓周", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1EXn8dfKWw/", "content_status": "https://www.facebook.com/share/r/1EXn8dfKWw/", "raw_hook": "(你的屁股不是沒救,是方法用錯!)", "raw_day": "240", "raw_page": "190", "raw_text": "◤一個超酸,但是想要翹臀必做的動作◢\n(你的屁股不是沒救,是方法用錯!)\n最多人私訊我的問題就是:\n「老師~我的屁股怎麼救?」\n女生最常見的臀型困擾有三種:臀凹陷、假胯寬、媽媽臀,只要中一項,整個形狀就不好看。\n所以如果你想要翹臀、腿線條好看:\n第一步——讓骨盆變靈活!\n第二步——來上小纖女,搞懂自己的臀型問題,才能對症下藥。\n現在就從這個動作開始,打好翹臀的底!"}, {"id": "ex_day_239_d098", "content_type": "單一動作", "source_type": "D", "source_id": "239", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(問卷調查冠軍:最多人腰酸屁股麻!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "內收鴿式", "difficulty": "進階", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看腰背和骨盆的分工有沒有配合；「內收鴿式」就是做這件事。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時使用；不用做到很深，先讓腰背和骨盆的分工有反應就好像「內收鴿式」這類動作，可以放在走路後先做。", "movement_name": "內收鴿式", "movement_code": "D098", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1U5BenoLsU/", "content_status": "https://www.facebook.com/share/r/1U5BenoLsU/", "raw_hook": "(問卷調查冠軍:最多人腰酸屁股麻!)", "raw_day": "239", "raw_page": "197", "raw_text": "◤一個很難,但能改善腰酸腿麻的動作◢\n(問卷調查冠軍:最多人腰酸屁股麻!)\n太多人私訊問腰酸怎麼辦,試試這個動作,你會感謝我!\n大腿本來可以向內夾和向外打開,但很多人坐著習慣把腿攤開,想夾也夾不起來,腰、屁股越來越緊。\n把膝蓋擺在身體正前方,你的屁股深層非常有感,酸麻感也減少很多!"}, {"id": "ex_day_238", "content_type": "單一動作", "source_type": "單一動作", "source_id": "238", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(做完屁股又酸又爽!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "盤腿臀推", "difficulty": "新手", "order": "1", "card_reason": "「盤腿臀推」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當臀凹、假胯或屁股線條看起來被拉住，可以先做「盤腿臀推」；重點不是忍到很酸，而是讓髖臀張力和發力順序慢慢接回來。", "movement_name": "盤腿臀推", "movement_code": "", "sets_reps": "5秒", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Bh9ZBSogm/", "content_status": "https://www.facebook.com/share/r/1Bh9ZBSogm/", "raw_hook": "(做完屁股又酸又爽!)", "raw_day": "238", "raw_page": "198", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(做完屁股又酸又爽!)\n如果你有假胯寬,大腿兩側特別凸,做這個動作,求求了!\n體態問題,其實是在告訴你,有些肌肉出問題了。而真正的改變,只能靠正確的動作來修正!\n把膝蓋打開到最開,數5秒,往上推,你的骨盆穩定,胯也縮小了!"}, {"id": "ex_day_236_d129", "content_type": "單一動作", "source_type": "D", "source_id": "236", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "(這招屢試不爽,今天一定要教你!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "頸側伸展", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整頸側和肩胛周圍張力。", "detail": "脖子緊、肩頸沉，放鬆一下又很快緊回來的時候，先別急著加難度，做完再看肩頸會比較輕有沒有改善。", "movement_name": "頸側伸展", "movement_code": "D129", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DVzb4isUg/", "content_status": "https://www.facebook.com/share/r/1DVzb4isUg/", "raw_hook": "(這招屢試不爽,今天一定要教你!)", "raw_day": "236", "raw_page": "199", "raw_text": "◤一個超舒服,又能改善肩頸僵硬的動作◢\n(這招屢試不爽,今天一定要教你!)\n我沒看過,超過25歲,肩膀筋膜不是僵硬的!\n特別是脖子前側緊緊的,這不是上年紀,是筋膜出問題了!用這個動作,馬上自己放鬆筋膜。\n肩膀跟著呼吸自然上下,你的落枕、肩頸痛、呼吸不順,全都消失了!"}, {"id": "ex_day_235_d138", "content_type": "單一動作", "source_type": "D", "source_id": "235", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "(小腿越練越細,是真的!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "交替娘娘蹲", "difficulty": "進階", "order": "1", "card_reason": "如果小腿很硬、腳踝不靈活，先做「交替娘娘蹲」，會比直接加強更容易找到感覺。", "detail": "適合小腿很硬、腳踝不靈活，走路很容易累的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "交替娘娘蹲", "movement_code": "D138", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "半跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1JRUgd9y3u/", "content_status": "https://www.facebook.com/share/r/1JRUgd9y3u/", "raw_hook": "(小腿越練越細,是真的!)", "raw_day": "235", "raw_page": "195", "raw_text": "◤一個超級難,但能讓你小腿變細的動作◢\n(小腿越練越細,是真的!)\n如果你想要小腿細,別去打肉毒,改做這個動作!\n小腿是人的第二心臟,但很多人怕練壯,反而不敢用力,結果小腿越來越浮腫、越來越粗。\n當你能輕鬆完成,你的腳掌力量恢復,腿型也悄悄變直了!"}, {"id": "ex_day_233_d155", "content_type": "單一動作", "source_type": "D", "source_id": "233", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(提醒:別做太多,小心家人認不得你!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "蹲姿轉髖", "difficulty": "新手", "order": "1", "card_reason": "這類「髖卡打不開」常不是單一部位的問題，先從骨盆和大腿的活動開始整理，像「蹲姿轉髖」這類動作可以放在居家練習先試。", "detail": "如果你常覺得開髖做很多還是覺得髖轉不順，先用「蹲姿轉髖」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "蹲姿轉髖", "movement_code": "D155", "sets_reps": "依影片跟練", "equipment": "椅子", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18Q6rUqzP4/", "content_status": "https://www.facebook.com/share/r/18Q6rUqzP4/", "raw_hook": "(提醒:別做太多,小心家人認不得你!)", "raw_day": "233", "raw_page": "196", "raw_text": "◤一個超級酸,但能讓你年輕5歲的動作◢\n(提醒:別做太多,小心家人認不得你!)\n我沒看過,超過25歲,還能一次做好這個動作!\n骨盆分成外旋和內旋兩種方向,但大多數人不是少一種,就是兩種都退化,腳抬不高,腰還容易痛。\n試著把膝蓋碰地,一開始會很酸,但撐過去,你的骨盆就會重新活過來!"}, {"id": "ex_day_232_d147", "content_type": "單一動作", "source_type": "D", "source_id": "232", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(做完身體整個鬆開了!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "滾筒洗衣機", "difficulty": "新手", "order": "1", "card_reason": "先用「滾筒洗衣機」把脊椎和胸廓的旋轉叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓脊椎和胸廓的旋轉找到方向，通常比一次做到很深更有用像「滾筒洗衣機」這類動作，可以放在下次訓練前先做。", "movement_name": "滾筒洗衣機", "movement_code": "D147", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1X5kUUXF4Q/", "content_status": "https://www.facebook.com/share/r/1X5kUUXF4Q/", "raw_hook": "(做完身體整個鬆開了!)", "raw_day": "232", "raw_page": "200", "raw_text": "◤一個喀喀響,但能打開僵硬脊椎的動作◢\n(做完身體整個鬆開了!)\n如果你常肩膀卡,腰酸背痛,做這個動作,你會感謝我!\n脊椎有自己彎曲的弧度,刻意挺胸讓它太直,或是久坐不動,讓弧度消失,肌肉就開始酸、緊。\n靠著滾筒轉一轉,你的身體會再次活過來,氣也順了!"}, {"id": "ex_day_231", "content_type": "單一動作", "source_type": "單一動作", "source_id": "231", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(在辦公椅上也能做,超適合上班族!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "盤腿拉腰", "difficulty": "新手", "order": "1", "card_reason": "這個方向能幫你讓關節動得更順；先求控制清楚，不用急著做很深，像「盤腿拉腰」這類動作可以放在身體很緊時先試。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時先做一輪，重點是感覺變清楚，不是把動作做大像「盤腿拉腰」這類動作，可以放在身體很緊時先做。", "movement_name": "盤腿拉腰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18UHruKtby/", "content_status": "https://www.facebook.com/share/r/18UHruKtby/", "raw_hook": "(在辦公椅上也能做,超適合上班族!)", "raw_day": "231", "raw_page": "201", "raw_text": "◤一個很酸,但能改善你胸悶的動作◢\n(在辦公椅上也能做,超適合上班族!)\n如果你有膏肓痛,覺得呼吸不順,做這個動作,求求了!\n很多人胸悶,其實是肋骨活動度太差!腰背太緊,就像把肋骨綁住一樣,吸氣當然悶。\n手往側邊伸到最遠,你的胸口打開,呼吸也順暢很多!"}, {"id": "ex_day_229", "content_type": "單一動作", "source_type": "單一動作", "source_id": "229", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(真的有用,我自己做完也嚇一跳!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "頂球膝", "difficulty": "新手", "order": "1", "card_reason": "「頂球膝」適合放在前面，先讓膝蓋壓力會比較少，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看膝蓋壓力會比較少，效果會比單純硬拉更清楚。", "movement_name": "頂球膝", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚、球", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18KKkT8JAm/", "content_status": "https://www.facebook.com/share/r/18KKkT8JAm/", "raw_hook": "(真的有用,我自己做完也嚇一跳!)", "raw_day": "229", "raw_page": "202", "raw_text": "◤一個很酸,但能改善膝蓋痛的動作◢\n(真的有用,我自己做完也嚇一跳!)\n如果你膝蓋怪怪的,走路喀喀響,我強烈推薦這個動作!\n膝蓋骨就像「卡在一個凹槽」裡,如果周圍肌肉太緊,它可能會稍微脫位,於是就發出聲音。\n把腳尖順著膝蓋方向,慢慢伸直,你的膝蓋聲竟然消失了!"}, {"id": "ex_day_228", "content_type": "單一動作", "source_type": "單一動作", "source_id": "228", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(練起來,連按摩費都省了!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "9090後仰", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓腰背和骨盆的分工重新有反應，動作才會比較順，像「9090後仰」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓腰背和骨盆的分工變得比較會配合，身體才不會越練越緊像「9090後仰」這類動作，可以放在動作前面先做。", "movement_name": "9090後仰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1KaLnxvczW/", "content_status": "https://www.facebook.com/share/r/1KaLnxvczW/", "raw_hook": "(練起來,連按摩費都省了!)", "raw_day": "228", "raw_page": "203", "raw_text": "◤一個超級難,但能改善久坐腰痛的動作◢\n(練起來,連按摩費都省了!)\n有人私訊問:「我腰容易痛,該怎麼辦?」\n久坐族有個通病,向後彎的功能退化超快,腰臀本來要一起出力,結果現在只剩腰在撐,當然會痛!\n骨盆往前,胸口往上看,一開始卡卡的,但腰痛真的消失了!"}, {"id": "ex_day_226_d107", "content_type": "單一動作", "source_type": "D", "source_id": "226", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(效果強大,卻很少人知道!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "支撐鴿式", "difficulty": "進階", "order": "1", "card_reason": "「支撐鴿式」不是要你做到很酸，而是先整理髖臀張力和發力順序，讓臀線比較容易往上整理。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人，先做「支撐鴿式」找回該出力的位置，再回頭測原本不順的地方。", "movement_name": "支撐鴿式", "movement_code": "D107", "sets_reps": "5秒", "equipment": "椅子", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GrhEuogaN/", "content_status": "https://www.facebook.com/share/r/1GrhEuogaN/", "raw_hook": "(效果強大,卻很少人知道!)", "raw_day": "226", "raw_page": "205", "raw_text": "◤一個很難,但能改善X型腿的動作◢\n(效果強大,卻很少人知道!)\n以前有人說,X型腿是天生的,因為女生骨盆比較寬!\n每個人個體之間有差異,但只要方法對,體態可以後天優化!這就是體態調整的意義:找到屬於你最好的樣子。\n數到5秒,慢慢讓屁股落地,過程中你的腿會被一點一點拉直!"}, {"id": "ex_day_225_d086", "content_type": "單一動作", "source_type": "D", "source_id": "225", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(連假胯寬也一起改善!哇哈哈~)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "側躺內外旋", "difficulty": "新手", "order": "1", "card_reason": "遇到臀凹、假胯或屁股線條看起來被拉住時，可以先用「側躺內外旋」把髖臀張力和發力順序接回來。", "detail": "臀凹、假胯或屁股線條看起來被拉住的時候，先別急著加難度，做完再看臀線比較容易往上整理有沒有改善。", "movement_name": "側躺內外旋", "movement_code": "D086", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17QV8Qs5Uk/", "content_status": "https://www.facebook.com/share/r/17QV8Qs5Uk/", "raw_hook": "(連假胯寬也一起改善!哇哈哈~)", "raw_day": "225", "raw_page": "206", "raw_text": "◤一個超級酸,但能改善XO腿的動作◢\n(連假胯寬也一起改善!哇哈哈~)\n什麼是XO腿?就是膝蓋能碰到一起,像X型腿,但小腿卻不直。\n很多人直覺會想把膝蓋往外撐開,但很抱歉,這樣做只會讓腿型越來越歪。\n最快的方式是從骨盆下手,抬高腳到30度,啟動深層肌肉,你會非常酸,但腿立刻就直了!"}, {"id": "ex_day_224", "content_type": "單一動作", "source_type": "單一動作", "source_id": "224", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "如果你是服務業,每天站好幾小時,做這個動作,求求了!", "purpose": "先鬆開", "secondary_purpose": "", "title": "腿後伸展", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打小腿腳踝緊，重點是先把過度緊繃降下來，不是一直追求更大幅度，像「腿後伸展」這類動作可以放在久坐後先試。", "detail": "這個動作可以放在第一步，先把過度緊繃降下來，讓後面的動作比較不會亂用力像「腿後伸展」這類動作，可以放在久坐後先做。", "movement_name": "腿後伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CjuQomQiX/", "content_status": "https://www.facebook.com/share/r/1CjuQomQiX/", "raw_hook": "如果你是服務業,每天站好幾小時,做這個動作,求求了!", "raw_day": "224", "raw_page": "207", "raw_text": "◤一個超級酸,但能舒緩久站腳麻的動作◢\n(大腿和小腿一起鬆開,超有感!)\n如果你是服務業,每天站好幾小時,做這個動作,求求了!\n為了「省力」站久一點,很多人會把膝蓋鎖死。小腿也變很緊,甚至出現膝超伸。\n腳跟靠牆一點,吐氣把膝蓋伸直,\n雖然酸,但真的很爽!做完整隻腿都會謝謝你!"}, {"id": "ex_day_222_d134", "content_type": "單一動作", "source_type": "D", "source_id": "222", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完整個人都鬆了~)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "擰麻花式", "difficulty": "新手", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看腰背和骨盆的分工有沒有配合；「擰麻花式」就是做這件事。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時使用；不用做到很深，先讓腰背和骨盆的分工有反應就好像「擰麻花式」這類動作，可以放在走路後先做。", "movement_name": "擰麻花式", "movement_code": "D134", "sets_reps": "依影片跟練", "equipment": "椅子", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GhDHT2FWv/", "content_status": "https://www.facebook.com/share/r/1GhDHT2FWv/", "raw_hook": "(做完整個人都鬆了~)", "raw_day": "222", "raw_page": "208", "raw_text": "◤一個超級酸,但能改善慢性腰酸的動作◢\n(做完整個人都鬆了~)\n想要腰不痛,千萬別再亂去整骨,改做這個動作!\n其實,坐超過6小時,不管椅子多高級,胸口、腰、屁股都會縮一起,當然腰會很酸!\n但如果我說,有一個動作可以同時拉開它們三個,你願意試試看嗎?"}, {"id": "ex_day_221", "content_type": "單一動作", "source_type": "單一動作", "source_id": "221", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(不是保護子宮,就是一種體態問題!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "沙發伸展", "difficulty": "新手", "order": "1", "card_reason": "「沙發伸展」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓骨盆和大腿的活動找到方向，通常比一次做到很深更有用像「沙發伸展」這類動作，可以放在暖身時先做。", "movement_name": "沙發伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊、沙發", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1FWohHR4Ja/", "content_status": "https://www.facebook.com/share/r/1FWohHR4Ja/", "raw_hook": "(不是保護子宮,就是一種體態問題!)", "raw_day": "221", "raw_page": "209", "raw_text": "◤一個很酸,但能改善小腹突出的動作◢\n(不是保護子宮,就是一種體態問題!)\n如果你不胖,下腹部卻一直凸凸的,一定要試試這動作!\n女生常見的小腹突出,是因為腹內壓向下,伴隨骨盆前傾,器官往前掉。瘋狂練腹,反而會讓肚子更凸。\n把腳固定在牆上,身體往上延伸,你的肚子瞬間變小了!"}, {"id": "ex_day_219", "content_type": "單一動作", "source_type": "單一動作", "source_id": "219", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(這動作沒效,我把瑜珈墊吃了!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "髖CARs", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「髖CARs」這類動作可以放在收操時先試。", "detail": "它比較像整理開關，先讓腰不用一直自己扛，再進入伸展或訓練會比較穩像「髖CARs」這類動作，可以放在收操時先做。", "movement_name": "髖CARs", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Ad4dkB59d/", "content_status": "https://www.facebook.com/share/r/1Ad4dkB59d/", "raw_hook": "(這動作沒效,我把瑜珈墊吃了!)", "raw_day": "219", "raw_page": "204", "raw_text": "◤一個超級難,但能改善久坐腰痛的動作◢\n(這動作沒效,我把瑜珈墊吃了!)\n如果你超過25歲,還能一次做好,請收下我的膝蓋!\n骨盆的旋轉功能,是退化最快的,而當它變弱,腰和大腿就被迫補位,久了開始腰痠、假胯寬、屁股外擴。\n膝蓋抬高,平行上半身,你的大腿根部會很酸,但腰痛也舒緩很多!"}, {"id": "ex_day_218", "content_type": "單一動作", "source_type": "單一動作", "source_id": "218", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "努力減脂又狂練腹肌,結果肚子還是消不掉,這是順序不對造成的,應該先降低腹壓失衡,再練腹肌。", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "靠牆駱駝式", "difficulty": "新手", "order": "1", "card_reason": "如果開髖做很多還是覺得髖轉不順，先做「靠牆駱駝式」，會比直接加強更容易找到感覺。", "detail": "適合開髖做很多還是覺得髖轉不順的人放在訓練前，先整理張力，再進入主要動作像「靠牆駱駝式」這類動作，可以放在第一輪先做。", "movement_name": "靠牆駱駝式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18b8NSihc5/", "content_status": "https://www.facebook.com/share/r/18b8NSihc5/", "raw_hook": "努力減脂又狂練腹肌,結果肚子還是消不掉,這是順序不對造成的,應該先降低腹壓失衡,再練腹肌。", "raw_day": "218", "raw_page": "210", "raw_text": "◤一個一直抖,但能幫你瘦小腹的動作◢\n(80%的人,都忽略這一點!)\n如果你的肚子很凸,戳下去硬硬的,做這個動作,你會感謝我!\n努力減脂又狂練腹肌,結果肚子還是消不掉,這是順序不對造成的,應該先降低腹壓失衡,再練腹肌。\n吸氣時,腰腹往兩側擴張,不要往前挺肚子,你會超抖、超酸,但頑固小肚真的消失了!"}, {"id": "ex_day_217", "content_type": "單一動作", "source_type": "單一動作", "source_id": "217", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "屁股側面鼓一塊,這是骨盆失穩的徵兆,要從深層的臀中臀小肌下手。", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "大貓內旋", "difficulty": "中階", "order": "1", "card_reason": "這類「臀型不好看」常不是單一部位的問題，先從髖臀張力和發力順序開始整理，像「大貓內旋」這類動作可以放在居家練習先試。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊像「大貓內旋」這類動作，可以放在居家練習先做。", "movement_name": "大貓內旋", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊、球", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B9ULFvfUW/", "content_status": "https://www.facebook.com/share/r/1B9ULFvfUW/", "raw_hook": "屁股側面鼓一塊,這是骨盆失穩的徵兆,要從深層的臀中臀小肌下手。", "raw_day": "217", "raw_page": "183", "raw_text": "◤一個超級酸,但能改善上臀凸起的動作◢\n(這不叫假胯寬,很容易搞錯了!)\n如果你習慣站三七步,或走路掉胯,做這個動作,求求了!\n屁股側面鼓一塊,這是骨盆失穩的徵兆,要從深層的臀中臀小肌下手。\n腳跟打開比膝蓋寬,膝蓋只抬三公分,炸翻你的凸凸肉!\n(長期重心都放在單腳,走路骨盆左右晃)"}, {"id": "ex_day_215", "content_type": "單一動作", "source_type": "單一動作", "source_id": "215", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(孕婦和媽咪們,您們辛苦了!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "扭扭腰", "difficulty": "新手", "order": "1", "card_reason": "先用「扭扭腰」把骨盆和大腿的活動叫回來，後面的訓練才不容易跑偏。", "detail": "當開髖做很多還是覺得髖轉不順，可以先做「扭扭腰」；重點不是忍到很酸，而是讓骨盆和大腿的活動慢慢接回來。", "movement_name": "扭扭腰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Dj5K3xXvg/", "content_status": "https://www.facebook.com/share/r/1Dj5K3xXvg/", "raw_hook": "(孕婦和媽咪們,您們辛苦了!)", "raw_day": "215", "raw_page": "211", "raw_text": "◤一個超級酸,但能改善產後垮肚的動作◢\n(孕婦和媽咪們,您們辛苦了!)\n如果你的肚子垂下來,兩側卻不胖,做這個動作,求求了!\n懷孕,就像把肚子打開一個口,內臟沒支撐,只能往前往下掉,瘋狂收小腹沒用,反而要穩住骨盆才行。\n膝蓋往外推到極限,再慢慢拉回來,這段會很酸,但也是縮肚關鍵!"}, {"id": "ex_day_214", "content_type": "單一動作", "source_type": "單一動作", "source_id": "214", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(終於知道,為什麼越練屁股越凹了!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "側臀伸展", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深，像「側臀伸展」這類動作可以放在身體很緊時先試。", "detail": "適合練臀時腿先酸、屁股卻沒什麼感覺時先做一輪，重點是感覺變清楚，不是把動作做大像「側臀伸展」這類動作，可以放在身體很緊時先做。", "movement_name": "側臀伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B79Za2Ha6/", "content_status": "https://www.facebook.com/share/r/1B79Za2Ha6/", "raw_hook": "(終於知道,為什麼越練屁股越凹了!)", "raw_day": "214", "raw_page": "212", "raw_text": "◤一個超級抖,但能改善臀凹陷的動作◢\n(終於知道,為什麼越練屁股越凹了!)\n很多人問:「我的臀凹陷,要先練屁股嗎?」\n我說,千萬不要!因為會凹,通常不是屁股不夠大,而是臀肌又緊又沒力,直接練只會更慘。\n正確做法是,拉長它,同時把力量找回來。當屁股一直抖,代表你練對了!"}, {"id": "ex_day_212", "content_type": "單一動作", "source_type": "單一動作", "source_id": "212", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(這招價值4~5堂教練課,大概多少錢?)", "purpose": "改善線條", "secondary_purpose": "改善線條", "title": "滾筒髂內轉", "difficulty": "新手", "order": "1", "card_reason": "「滾筒髂內轉」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「滾筒髂內轉」這類動作，可以放在想測感覺時先做。", "movement_name": "滾筒髂內轉", "movement_code": "", "sets_reps": "5次", "equipment": "滾筒", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CRM1KDk4B/", "content_status": "https://www.facebook.com/share/r/1CRM1KDk4B/", "raw_hook": "(這招價值4~5堂教練課,大概多少錢?)", "raw_day": "212", "raw_page": "215", "raw_text": "◤一個超級酸,但能收骨盆上口的動作◢\n(這招價值4~5堂教練課,大概多少錢?)\n如果你屁股兩側凸出,多了兩塊把手,做這個動作,求求了!\n產後跟久坐,最容易出現愛的把手,這不是腰部脂肪,而是一種體態問題。\n膝蓋帶動滾筒往前,大腿根部會很酸,你的骨盆也變窄了!"}, {"id": "ex_day_211", "content_type": "單一動作", "source_type": "單一動作", "source_id": "211", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(幫自己換一付健康的膝蓋!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "下樓梯", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖、膝、腳踝的配合重新有反應，動作才會比較順。", "detail": "如果你常覺得跑跳或蹲跪時膝蓋不安心，先用「下樓梯」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "下樓梯", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1HqmXAEL9P/", "content_status": "https://www.facebook.com/share/r/1HqmXAEL9P/", "raw_hook": "(幫自己換一付健康的膝蓋!)", "raw_day": "211", "raw_page": "216", "raw_text": "◤一個很難,但能改善膝蓋痛的動作◢\n(幫自己換一付健康的膝蓋!)\n如果你是玻璃膝蓋,做這個動作,你會感謝我!\n上下樓梯、走路時,都是靠單腳支撐,如果腿不夠力,膝蓋就會承受過多壓力,久了變得很脆弱。\n膝蓋與腳尖朝前,練到兩塊瑜珈磚,你的膝蓋問題會好很多!"}, {"id": "ex_day_210", "content_type": "單一動作", "source_type": "單一動作", "source_id": "210", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(上班腰不舒服,快來抄作業!)", "purpose": "活動度", "secondary_purpose": "活動度", "title": "弓步側扭轉", "difficulty": "進階", "order": "1", "card_reason": "「弓步側扭轉」不是要你做到很酸，而是先整理腰背和骨盆的分工，讓腰不用一直自己扛。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人，先做「弓步側扭轉」把活動範圍慢慢打開，再回頭測原本不順的地方。", "movement_name": "弓步側扭轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "弓步", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18cDSG5Aem/", "content_status": "https://www.facebook.com/share/r/18cDSG5Aem/", "raw_hook": "(上班腰不舒服,快來抄作業!)", "raw_day": "210", "raw_page": "217", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(上班腰不舒服,快來抄作業!
