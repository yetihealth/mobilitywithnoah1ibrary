)\n我沒看過,超過25歲,還能一次做好這個動作!\n從腰部到大腿兩側,幾乎沒什麼機會活動,也很少被伸展,就像邊緣人被遺忘,身體硬梆梆。\n當你把它們都拉開,你的腰痛會舒緩,身體也變得更年輕了!"}, {"id": "ex_day_208", "content_type": "單一動作", "source_type": "單一動作", "source_id": "208", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "(腳能打開90度,骨盆自然回正!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "側沙發伸展", "difficulty": "新手", "order": "1", "card_reason": "遇到腰總是偏一邊不舒服時，可以先用「側沙發伸展」把骨盆兩側和側腰支撐接回來。", "detail": "它比較像整理開關，先讓單邊拉扯感會比較少，再進入伸展或訓練會比較穩。", "movement_name": "側沙發伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊、沙發", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/14dbanLCSdq/", "content_status": "https://www.facebook.com/share/r/14dbanLCSdq/", "raw_hook": "(腳能打開90度,骨盆自然回正!)", "raw_day": "208", "raw_page": "218", "raw_text": "◤一個很酸,但能改善骨盆歪掉的動作◢\n(腳能打開90度,骨盆自然回正!)\n經常有人留言:「我的骨盆是歪左還是偏右?」\n其實骨盆不會固定歪一邊,關鍵在讓兩邊的肌力均衡,骨盆不正、腰痛自然會消失。\n骨盆擺正朝前面,推到最遠的範圍,越練你的身體會越對稱!"}, {"id": "ex_day_206", "content_type": "單一動作", "source_type": "單一動作", "source_id": "206", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(練到能起身,屁股變飽滿!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "單腿圓周起身", "difficulty": "進階", "order": "1", "card_reason": "這個動作主打練臀沒感覺，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度，像「單腿圓周起身」這類動作可以放在久坐後先試。", "detail": "做完可以回頭測同一個角度，看看屁股比較容易上線，效果會比單純硬拉更清楚像「單腿圓周起身」這類動作，可以放在久坐後先做。", "movement_name": "單腿圓周起身", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BP21WtTCM/", "content_status": "https://www.facebook.com/share/r/1BP21WtTCM/", "raw_hook": "(練到能起身,屁股變飽滿!)", "raw_day": "206", "raw_page": "214", "raw_text": "◤一個超級難,但能改善蝴蝶臀的動作◢\n(練到能起身,屁股變飽滿!)\n如果你臀部兩側凹陷,別去做手術,改做這個動作!\n出現這種體態,你的深層臀肌必定無力,想要徹底改變臀型,必須從肌肉下手。\n練習不扶東⻄,一開始很難,但當你能穩定控制,你的屁股會感謝你!"}, {"id": "ex_day_205", "content_type": "單一動作", "source_type": "單一動作", "source_id": "205", "body_part": "腿型", "pain_point": "腿型不順", "pain_point_original": "(不管X型腿還是O型腿,都來練!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "簡單娘娘蹲", "difficulty": "進階", "order": "1", "card_reason": "想讓外觀看起來更順，先看髖膝踝的排列有沒有配合；「簡單娘娘蹲」就是做這件事。", "detail": "適合腿看起來不直、走路時下肢很容易歪掉時使用；不用做到很深，先讓髖膝踝的排列有反應就好。", "movement_name": "簡單娘娘蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B77Gsww8Z/", "content_status": "https://www.facebook.com/share/r/1B77Gsww8Z/", "raw_hook": "(不管X型腿還是O型腿,都來練!)", "raw_day": "205", "raw_page": "220", "raw_text": "◤一個超級難,但能讓腿立刻變直的動作◢\n(不管X型腿還是O型腿,都來練!)\n想要腿又直又細,別再亂凹咖,改做這個動作!\n95%的腿型問題,都有腳掌功能異常,讓腿部的發力方向錯誤,越走越歪。\n從兩塊瑜珈磚開始練,重建足踝穩定性,當基礎對了,你的腿就直了!"}, {"id": "ex_day_204", "content_type": "單一動作", "source_type": "單一動作", "source_id": "204", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "四足側抬腿改善蝴蝶臀(動作五)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "四足側抬腿", "difficulty": "進階", "order": "1", "card_reason": "「四足側抬腿」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當臀凹、假胯或屁股線條看起來被拉住，可以先做「四足側抬腿」；重點不是忍到很酸，而是讓髖臀張力和發力順序慢慢接回來。", "movement_name": "四足側抬腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1E81MWFcP5/", "content_status": "https://www.facebook.com/share/r/1E81MWFcP5/", "raw_hook": "四足側抬腿改善蝴蝶臀(動作五)", "raw_day": "204", "raw_page": "219", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(我今年18,你們呢?)\n如果你工作超過3年,還能一次做好,請收下我的膝蓋!\n骨盆本該非常靈活,但長時間久坐又缺乏運動,身體會變得像雕像一樣僵硬。\n盡可能把膝蓋往前和往後移動,當你的骨盆不再喀喀響,你也再次年輕了!"}, {"id": "ex_day_203", "content_type": "單一動作", "source_type": "單一動作", "source_id": "203", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "(在家就能做,別再光收藏了!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "靠牆Fig4", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整骨盆兩側的控制。", "detail": "骨盆左右不平均，站姿和走路都怪怪的的時候，先別急著加難度，做完再看左右比較容易回到同一條線有沒有改善。", "movement_name": "靠牆Fig4", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BF7DXfB2e/", "content_status": "https://www.facebook.com/share/r/1BF7DXfB2e/", "raw_hook": "(在家就能做,別再光收藏了!)", "raw_day": "203", "raw_page": "221", "raw_text": "◤一個很酸,但能改善骨盆歪斜的動作◢\n(在家就能做,別再光收藏了!)\n有人私訊我:「撐地手腕會痛,骨盆不正還能有辦法嗎?」\n我說,當然可以!即使趴著不行,躺著也能很有效。\n把緊繃的一側拉開,你的骨盆就會舒服很多!"}, {"id": "ex_day_201", "content_type": "單一動作", "source_type": "單一動作", "source_id": "201", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(提醒:會抽筋的人,請跳過這動作!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "躺椅式", "difficulty": "進階", "order": "1", "card_reason": "如果臀凹、假胯或屁股線條看起來被拉住，先做「躺椅式」，會比直接加強更容易找到感覺。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人放在訓練前，先整理張力，再進入主要動作像「躺椅式」這類動作，可以放在第一輪先做。", "movement_name": "躺椅式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GvMcS738u/", "content_status": "https://www.facebook.com/share/r/1GvMcS738u/", "raw_hook": "(提醒:會抽筋的人,請跳過這動作!)", "raw_day": "201", "raw_page": "222", "raw_text": "◤一個超級難,但能瘦大腿前側的動作◢\n(提醒:會抽筋的人,請跳過這動作!)\n如果你大腿前側突出,顯得腿粗壯,別去打肉毒,改做這個動作!\n超過80%的女性都有這個困擾,養成大腿用力的習慣,讓腿型越來越粗,屁股也扁掉。\n解決的辦法是,先放鬆前側,拉開緊繃的肌肉,再進一步調整你的臀型跟小腹凸出!"}, {"id": "ex_day_200", "content_type": "單一動作", "source_type": "單一動作", "source_id": "200", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(是時候給下臀真正的刺激了!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "開腿橋式", "difficulty": "中階", "order": "1", "card_reason": "這類「臀型不好看」常不是單一部位的問題，先從髖臀張力和發力順序開始整理，像「開腿橋式」這類動作可以放在居家練習先試。", "detail": "如果你常覺得臀凹、假胯或屁股線條看起來被拉住，先用「開腿橋式」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "開腿橋式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18U9WSWoZq/", "content_status": "https://www.facebook.com/share/r/18U9WSWoZq/", "raw_hook": "(是時候給下臀真正的刺激了!)", "raw_day": "200", "raw_page": "223", "raw_text": "◤一個超級酸,但能讓屁股變飽滿的動作◢\n(是時候給下臀真正的刺激了!)\n如果你的臀型扁平,或看起來像方形,做這個動作,求求了!\n臀部其實分為上段和下段,但大多數人的下臀無力,甚至忘記該如何用力。\n腳跟收進來,骨盆往上提,你的下臀跟小腹都會非常酸爽!"}, {"id": "ex_day_199", "content_type": "單一動作", "source_type": "單一動作", "source_id": "199", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "(我不允許還有人不知道這招!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "媽媽手", "difficulty": "新手", "order": "1", "card_reason": "先用「媽媽手」把頸側和肩胛周圍張力叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓頸側和肩胛周圍張力找到方向，通常比一次做到很深更有用像「媽媽手」這類動作，可以放在下次訓練前先做。", "movement_name": "媽媽手", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "球", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CejeynpeU/", "content_status": "https://www.facebook.com/share/r/1CejeynpeU/", "raw_hook": "(我不允許還有人不知道這招!)", "raw_day": "199", "raw_page": "224", "raw_text": "◤一個超級酸,但能改善媽媽手的動作◢\n(我不允許還有人不知道這招!)\n如果你有媽媽手,又一直好不了,聽我的,這個動作必須做!\n很多人直覺會去按摩虎口,但其實手指動作,是由前臂控制的,光是按虎口只是治標不治本。\n大拇指比讚,手腕開始繞圈,你的前臂會非常酸爽,但結束後,真的舒服很多!"}, {"id": "ex_day_197", "content_type": "單一動作", "source_type": "單一動作", "source_id": "197", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(提醒:別做太多,小心路上狂被搭訕!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "格格蹲", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓外觀看起來更順；先求控制清楚，不用急著做很深，像「格格蹲」這類動作可以放在身體很緊時先試。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時先做一輪，重點是感覺變清楚，不是把動作做大像「格格蹲」這類動作，可以放在身體很緊時先做。", "movement_name": "格格蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18WxPjLmBC/", "content_status": "https://www.facebook.com/share/r/18WxPjLmBC/", "raw_hook": "(提醒:別做太多,小心路上狂被搭訕!)", "raw_day": "197", "raw_page": "226", "raw_text": "◤一個超級難,但能改善臀凹陷的動作◢\n(提醒:別做太多,小心路上狂被搭訕!)\n如果你超過 25 歲,還能一次做好,請收下我的膝蓋!\n屁股兩側凹進去,要怎麼填起來?光靠硬舉和臀推,你的形狀只會越來越凹。\n骨盆稍微前傾,撐住這個角度,一秒炸翻你的屁股!"}, {"id": "ex_day_196", "content_type": "單一動作", "source_type": "單一動作", "source_id": "196", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "(多做這動作,腳踝也會變細!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "踮腳暫停", "difficulty": "進階", "order": "1", "card_reason": "「踮腳暫停」適合放在前面，先讓站立會更穩，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看站立會更穩，效果會比單純硬拉更清楚。", "movement_name": "踮腳暫停", "movement_code": "", "sets_reps": "1分鐘；15秒", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BXPMp88E7/", "content_status": "https://www.facebook.com/share/r/1BXPMp88E7/", "raw_hook": "(多做這動作,腳踝也會變細!)", "raw_day": "196", "raw_page": "229", "raw_text": "◤一個超級難,但能讓你瘦小腿的動作◢\n(多做這動作,腳踝也會變細!)\n有人私訊我:「你自己小腿也粗,怎麼還教別人呢?」\n他們不知道的是,以前的我更粗,天生的扁平足,加上小腿基因,從小我的小腿就比別人大一圈。\n當我不停的練習,練到能撐1分鐘後,小腿少了4公分,形狀也更緊實了!"}, {"id": "ex_day_193", "content_type": "單一動作", "source_type": "單一動作", "source_id": "193", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(做完屁股又酸又爽!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "剪刀腳", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖臀張力和發力順序重新有反應，動作才會比較順，像「剪刀腳」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊像「剪刀腳」這類動作，可以放在動作前面先做。", "movement_name": "剪刀腳", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17V1KXBj3A/", "content_status": "https://www.facebook.com/share/r/17V1KXBj3A/", "raw_hook": "(做完屁股又酸又爽!)", "raw_day": "193", "raw_page": "228", "raw_text": "◤一個很難,但能讓屁股更翹的動作◢\n(做完屁股又酸又爽!)\n如果你的臀型不夠飽滿,上段不夠翹,做這個動作,求求了!\n臀部其實分成上中下三段,但是大多數人的問題是,上段緊繃,下段鬆垮,形成「上大下小」的方型臀。\n把膝蓋交疊,你會感覺到臀上段被拉開,一秒充氣,屁股立刻變澎!"}, {"id": "ex_day_192", "content_type": "單一動作", "source_type": "單一動作", "source_id": "192", "body_part": "肩頸", "pain_point": "肩頸緊繃", "pain_point_original": "想要舒緩上背痛、肩痛、脖子酸,這是我看過最有效的動作!", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "蝴蝶扭轉", "difficulty": "新手", "order": "1", "card_reason": "「蝴蝶扭轉」不是要你做到很酸，而是先整理頸側和肩胛周圍張力，讓肩頸會比較輕。", "detail": "適合脖子緊、肩頸沉，放鬆一下又很快緊回來的人，先做「蝴蝶扭轉」先把過度緊繃降下來，再回頭測原本不順的地方。", "movement_name": "蝴蝶扭轉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18iCYgJb91/", "content_status": "https://www.facebook.com/share/r/18iCYgJb91/", "raw_hook": "想要舒緩上背痛、肩痛、脖子酸,這是我看過最有效的動作!", "raw_day": "192", "raw_page": "231", "raw_text": "◤一個很酸,但能改善肩頸僵硬的動作◢\n(做完呼吸也順暢了!)\n想要舒緩上背痛、肩痛、脖子酸,這是我看過最有效的動作!\n95%的上班族長時間駝背,身體往前縮,結果肩頸越來越僵,用這個動作一次把胸椎、上背、脖子,都舒展開來。\n手肘跟臀部,擺好姿勢後不要跑掉,你的肩胛會很舒服!"}, {"id": "ex_day_191", "content_type": "單一動作", "source_type": "單一動作", "source_id": "191", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(我沒有賣工學坐墊,不要再問我了!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "魚擺尾", "difficulty": "新手", "order": "1", "card_reason": "遇到久坐後腰下方很緊、站起來總覺得腰在頂著時，可以先用「魚擺尾」把腰背和骨盆的分工接回來。", "detail": "久坐後腰下方很緊、站起來總覺得腰在頂著的時候，先別急著加難度，做完再看腰不用一直自己扛有沒有改善像「魚擺尾」這類動作，可以放在睡前先做。", "movement_name": "魚擺尾", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ThQXCTCTe/", "content_status": "https://www.facebook.com/share/r/1ThQXCTCTe/", "raw_hook": "(我沒有賣工學坐墊,不要再問我了!)", "raw_day": "191", "raw_page": "232", "raw_text": "◤一個很緊,但能改善久坐腰痛的動作◢\n(我沒有賣工學坐墊,不要再問我了!)\n如果有人告訴你:「要學正確坐姿,或盡量不要久坐」,請把它黑名單!\n這完全不切實際,你不需要害怕坐著,更不用因為話術而焦慮。\n你要做的,是增加更多的運動,因為坐著本身不是問題,缺乏運動才是問題!"}, {"id": "ex_day_190", "content_type": "單一動作", "source_type": "單一動作", "source_id": "190", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(想要拉高上臀線,立刻跟練!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "單腿保蹲", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打臀型不好看，重點是把線條被拉歪的地方整理回來，不是一直追求更大幅度，像「單腿保蹲」這類動作可以放在久坐後先試。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「單腿保蹲」這類動作，可以放在久坐後先做。", "movement_name": "單腿保蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BEVok4qYS/", "content_status": "https://www.facebook.com/share/r/1BEVok4qYS/", "raw_hook": "(想要拉高上臀線,立刻跟練!)", "raw_day": "190", "raw_page": "233", "raw_text": "◤一個超級酸,但能改善臀凹陷的動作◢\n(想要拉高上臀線,立刻跟練!)\n如果你的屁股兩側凹陷,像蝴蝶一樣,聽我的,這個動作必須做!\n好看的臀型,每一塊肌肉都有它的貢獻,但如果其中一塊特別強,那形狀必然跑掉,比如臀凹陷。\n關鍵在,腰稍微往前挺,你的上臀會非常有感,屁股直接廢掉!"}, {"id": "ex_day_189", "content_type": "單一動作", "source_type": "單一動作", "source_id": "189", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "大腿內側鬆垮,腿型當然不會好看,想改善體態,就得找出這些有問題的肌肉。", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "滾筒滑行", "difficulty": "新手", "order": "1", "card_reason": "想讓外觀看起來更順，先看髖臀張力和發力順序有沒有配合；「滾筒滑行」就是做這件事。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住時使用；不用做到很深，先讓髖臀張力和發力順序有反應就好像「滾筒滑行」這類動作，可以放在走路後先做。", "movement_name": "滾筒滑行", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CcazGXkSw/", "content_status": "https://www.facebook.com/share/r/1CcazGXkSw/", "raw_hook": "大腿內側鬆垮,腿型當然不會好看,想改善體態,就得找出這些有問題的肌肉。", "raw_day": "189", "raw_page": "234", "raw_text": "◤一個超級酸,但能讓大腿變細的動作◢\n(又一個骨盆炸裂的動作!)\n不管你是假胯寬,還是大腿粗,做這個動作,兩週後,你會回來感謝我!\n大腿內側鬆垮,腿型當然不會好看,想改善體態,就得找出這些有問題的肌肉。\n試著把身體重量,放在伸直的腿上,等到夏天,你會擁有一雙筷子腿!"}, {"id": "ex_day_188", "content_type": "單一動作", "source_type": "單一動作", "source_id": "188", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "瑜珈磚抬腿", "difficulty": "進階", "order": "1", "card_reason": "「瑜珈磚抬腿」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "先做小範圍就好，讓骨盆和大腿的活動找到方向，通常比一次做到很深更有用像「瑜珈磚抬腿」這類動作，可以放在暖身時先做。", "movement_name": "瑜珈磚抬腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18JE8CQREn/", "content_status": "https://www.facebook.com/share/r/18JE8CQREn/", "raw_hook": "每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」", "raw_day": "188", "raw_page": "235", "raw_text": "◤一個超級難,但能改善骨盆前傾的動作◢\n(提醒:這個動作是抽筋大魔王!)\n每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」\n久坐的人,髖屈肌容易變弱又緊繃,身體為了補償,就會讓骨盆前傾或後傾。\n保持腰不動,盡可能抬高腿,一開始很痛苦,但是身體會感謝你!\n(搭配,效果更佳!)"}, {"id": "ex_day_187", "content_type": "單一動作", "source_type": "單一動作", "source_id": "187", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(Tag你那位喊腰痛的朋友!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "彈力繩青蛙", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「彈力繩青蛙」這類動作可以放在收操時先試。", "detail": "它比較像整理開關，先讓腰不用一直自己扛，再進入伸展或訓練會比較穩像「彈力繩青蛙」這類動作，可以放在收操時先做。", "movement_name": "彈力繩青蛙", "movement_code": "", "sets_reps": "2分鐘", "equipment": "彈力繩、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18fAaNkHVb/", "content_status": "https://www.facebook.com/share/r/18fAaNkHVb/", "raw_hook": "(Tag你那位喊腰痛的朋友!)", "raw_day": "187", "raw_page": "236", "raw_text": "◤一個超級酸,但能緩解下背痛的動作◢\n(Tag你那位喊腰痛的朋友!)\n如果你走路腰會痛,甚至痛到大腿後側,做這個動作,求求了!\n骨盆並不只內旋和外旋,還有許多微小的關節運動,當這些地方也僵硬沾黏,骨盆動不了,那腰就來受過。\n練習只動尾椎那塊,前後動2分鐘,你的腰會舒服很多!"}, {"id": "ex_day_186", "content_type": "單一動作", "source_type": "單一動作", "source_id": "186", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(屁股已離家出走,我謝謝你!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "四足側抬腿", "difficulty": "進階", "order": "1", "card_reason": "如果臀凹、假胯或屁股線條看起來被拉住，先做「四足側抬腿」，會比直接加強更容易找到感覺。", "detail": "適合臀凹、假胯或屁股線條看起來被拉住的人放在訓練前，先整理張力，再進入主要動作像「四足側抬腿」這類動作，可以放在第一輪先做。", "movement_name": "四足側抬腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚、滾筒、牆面、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1K4CgCzRHA/", "content_status": "https://www.facebook.com/share/r/1K4CgCzRHA/", "raw_hook": "(屁股已離家出走,我謝謝你!)", "raw_day": "186", "raw_page": "237", "raw_text": "◤一個超級難,但能消除馬鞍肉的動作◢\n(屁股已離家出走,我謝謝你!)\n有人私訊問:「為什麼有些人不練大重量,屁股卻很翹?」\n女生常見的媽媽臀、臀凹陷、假胯寬,臀部已經無力,這時候如果硬加重量,反而讓臀型更塌更垮。\n用滾筒固定骨盆,找到發力點,一秒炸翻你的屁股!"}, {"id": "ex_day_185", "content_type": "單一動作", "source_type": "單一動作", "source_id": "185", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(做起來劈啪響,但上背真的鬆了!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "前鋸肌伸展", "difficulty": "新手", "order": "1", "card_reason": "這類「肩胛控制差」常不是單一部位的問題，先從肩胛的滑動和支撐開始整理。", "detail": "不要急著追求痠痛感，先讓肩胛的滑動和支撐變得比較會配合，身體才不會越練越緊。", "movement_name": "前鋸肌伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18nPAnBtzk/", "content_status": "https://www.facebook.com/share/r/18nPAnBtzk/", "raw_hook": "(做起來劈啪響,但上背真的鬆了!)", "raw_day": "185", "raw_page": "238", "raw_text": "◤一個很卡,但能改善膏肓痛的動作◢\n(做起來劈啪響,但上背真的鬆了!)\n如果你上班背痛,肩頸僵硬又手麻,做這個動作,你會感謝我!\n最大的問題,是肩胛骨貼不住肋骨,也有人說這叫胸廓問題。\n拱起背部,讓肩胛回到正確軌道,你的上背突然就不痛了!"}, {"id": "ex_day_184", "content_type": "單一動作", "source_type": "單一動作", "source_id": "184", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "如果你每天久坐,超過6小時,不做這個動作,你會後悔的!", "purpose": "先鬆開", "secondary_purpose": "", "title": "久坐族剋星", "difficulty": "新手", "order": "1", "card_reason": "先用「久坐族剋星」把腰背和骨盆的分工叫回來，後面的訓練才不容易跑偏。", "detail": "當久坐後腰下方很緊、站起來總覺得腰在頂著，可以先做「久坐族剋星」；重點不是忍到很酸，而是讓腰背和骨盆的分工慢慢接回來。", "movement_name": "久坐族剋星", "movement_code": "", "sets_reps": "2分鐘", "equipment": "滾筒、門框", "body_position": "躺姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1b71y4K7Ar/", "content_status": "https://www.facebook.com/share/r/1b71y4K7Ar/", "raw_hook": "如果你每天久坐,超過6小時,不做這個動作,你會後悔的!", "raw_day": "184", "raw_page": "225", "raw_text": "◤一個超級酸,但能改善久坐腰痛的動作◢\n(這招如果沒效,我把滾筒吃了!)\n如果你每天久坐,超過6小時,不做這個動作,你會後悔的!\n坐久了,骨盆一定會僵硬,這是腰最喜歡的動作,專門放鬆久坐緊繃的肌肉。\n睡前2分鐘,你會睡得很好,明天上班,腰也乖乖了!"}, {"id": "ex_day_183", "content_type": "單一動作", "source_type": "單一動作", "source_id": "183", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完屁股又酸又爽!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "9090伸直", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓力量不要再跑錯地方；先求控制清楚，不用急著做很深，像「9090伸直」這類動作可以放在身體很緊時先試。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著時先做一輪，重點是感覺變清楚，不是把動作做大像「9090伸直」這類動作，可以放在身體很緊時先做。", "movement_name": "9090伸直", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1EDhqgnXhQ/", "content_status": "https://www.facebook.com/share/r/1EDhqgnXhQ/", "raw_hook": "(做完屁股又酸又爽!)", "raw_day": "183", "raw_page": "239", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(做完屁股又酸又爽!)\n如果你超過 25 歲,還能一次做好,請收下我的膝蓋!\n骨盆的旋轉功能,是退化最快的,而當它變弱,腰部和大腿就得來補償,久了腰痛、X型腿都找上你。\n穩住上半身,一開始會很酸,但是越做,你會越年輕!"}, {"id": "ex_day_182", "content_type": "單一動作", "source_type": "單一動作", "source_id": "182", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "女神蹲後仰", "difficulty": "進階", "order": "1", "card_reason": "「女神蹲後仰」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把活動範圍慢慢打開，讓後面的動作比較不會亂用力像「女神蹲後仰」這類動作，可以放在想測感覺時先做。", "movement_name": "女神蹲後仰", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1G62N5KYNy/", "content_status": "https://www.facebook.com/share/r/1G62N5KYNy/", "raw_hook": "每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」", "raw_day": "182", "raw_page": "241", "raw_text": "◤一個很難,但能改善腰痠下背痛的動作◢\n(做完整個身體鬆開,超舒服!)\n每天都有人問:「我是骨盆前傾還是後傾,該怎麼辦?」\n其實傾斜方向不重要,關鍵是當你有一些肌肉特別弱,骨盆自然會傾斜以平衡。這時再去矯正骨盆,永遠只是頭痛醫頭,無法\n真正改善。\n肚臍往前碰到地板,你的骨盆自然回正,腰痛也消失了!"}, {"id": "ex_day_181", "content_type": "單一動作", "source_type": "單一動作", "source_id": "181", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(99%的人都做錯了!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "單側劈腿", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖臀張力和發力順序重新有反應，動作才會比較順，像「單側劈腿」這類動作可以放在動作前面先試。", "detail": "如果你常覺得臀凹、假胯或屁股線條看起來被拉住，先用「單側劈腿」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "單側劈腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B21thDUCp/", "content_status": "https://www.facebook.com/share/r/1B21thDUCp/", "raw_hook": "(99%的人都做錯了!)", "raw_day": "181", "raw_page": "240", "raw_text": "◤一個超級難,但能一秒變大長腿的動作◢\n(99%的人都做錯了!)\n想要大長腿,千萬別再瘋狂拉筋,改做這個動作!\n有很多人從學生時期就沒運動,大腿內側到核心肌群,沒什麼力量,慢慢出現假胯寬、粗腿、X型腿,這不是天生的。\n把腳打開往外伸,你的骨盆會變窄,腿修長又有力量感!"}, {"id": "ex_day_180", "content_type": "單一動作", "source_type": "單一動作", "source_id": "180", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "側平舉(周紅梅改善肩彈響、翼狀肩胛)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "側平舉", "difficulty": "新手", "order": "1", "card_reason": "「側平舉」不是要你做到很酸，而是先整理肩胛的滑動和支撐，讓肩膀比較不會往上跑。", "detail": "適合肩膀放不下來、肩胛也不太聽話的人，先做「側平舉」找回該出力的位置，再回頭測原本不順的地方。", "movement_name": "側平舉", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、牆面", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ChiPsevnr/", "content_status": "https://www.facebook.com/share/r/1ChiPsevnr/", "raw_hook": "側平舉(周紅梅改善肩彈響、翼狀肩胛)", "raw_day": "180", "raw_page": "242", "raw_text": "◤一個很酸,但能改善肩膀彈響的動作◢\n(簡單又有效,最喜歡這種!)\n10個女生,9個有圓肩、肩膀彈響、翼狀肩胛,有些人三個都中。\n最大關鍵在於肩胛骨,當它無法穩定貼合胸廓,一抬手就會喀喀響。\n胸口墊著滾筒,調整肩胛正確位置,你的彈響聲就消失了!"}, {"id": "ex_day_179", "content_type": "單一動作", "source_type": "單一動作", "source_id": "179", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "這種痛感,會在臀部很深的地方,按不到、拉不開,所以才一直無法改善。", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "趴姿髖內收", "difficulty": "新手", "order": "1", "card_reason": "遇到臀凹、假胯或屁股線條看起來被拉住時，可以先用「趴姿髖內收」把髖臀張力和發力順序接回來。", "detail": "它比較像整理開關，先讓臀線比較容易往上整理，再進入伸展或訓練會比較穩像「趴姿髖內收」這類動作，可以放在睡前先做。", "movement_name": "趴姿髖內收", "movement_code": "", "sets_reps": "20下", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1Dw8b79RT5/", "content_status": "https://www.facebook.com/share/r/1Dw8b79RT5/", "raw_hook": "這種痛感,會在臀部很深的地方,按不到、拉不開,所以才一直無法改善。", "raw_day": "179", "raw_page": "243", "raw_text": "◤一個超酸,但能改善屁股酸麻的動作◢\n(提醒:兩邊都要做,不然會更嚴重!)\n如果你坐久腿會麻、好像被電到,做這個動作,求求了!\n這種痛感,會在臀部很深的地方,按不到、拉不開,所以才一直無法改善。\n每邊做20下,讓深層肌肉動起來,你的腰和腿會舒服很多!"}, {"id": "ex_day_178", "content_type": "單一動作", "source_type": "單一動作", "source_id": "178", "body_part": "足底", "pain_point": "腳底痠脹", "pain_point_original": "(做完腳底又酸又爽,超解壓!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "足底踩球", "difficulty": "中階", "order": "1", "card_reason": "這個動作主打腳底痠脹，重點是先把過度緊繃降下來，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看隔天走路比較不沉，效果會比單純硬拉更清楚。", "movement_name": "足底踩球", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面、軟墊、球", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17RVYEGYQk/", "content_status": "https://www.facebook.com/share/r/17RVYEGYQk/", "raw_hook": "(做完腳底又酸又爽,超解壓!)", "raw_day": "178", "raw_page": "244", "raw_text": "◤一個很痛,但能舒緩足底筋膜的動作◢\n(做完腳底又酸又爽,超解壓!)\n如果你足底痛、筋膜沾黏,做這個動作,求求了!\n腳掌內側有一塊凸起的骨頭,穿鞋久了,這邊的肌肉會僵硬,這招能恢復筋膜彈性,足底就放鬆了。\n拉開大腳趾,其他四指也可以踩,你的腳底會舒服很多!"}, {"id": "ex_day_177", "content_type": "單一動作", "source_type": "單一動作", "source_id": "177", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "(做完胸口超放鬆,好舒服哦!)", "purpose": "先鬆開", "secondary_purpose": "活動度", "title": "二頭肌伸展", "difficulty": "新手", "order": "1", "card_reason": "想讓身體先不要一直繃著，先看胸口和肩胛位置有沒有配合；「二頭肌伸展」就是做這件事。", "detail": "適合肩膀往前捲、背看起來厚，胸口也打不開時使用；不用做到很深，先讓胸口和肩胛位置有反應就好。", "movement_name": "二頭肌伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18ggnxBmFT/", "content_status": "https://www.facebook.com/share/r/18ggnxBmFT/", "raw_hook": "(做完胸口超放鬆,好舒服哦!)", "raw_day": "177", "raw_page": "245", "raw_text": "◤一個很酸,但能改善肩膀彈響的動作◢\n(做完胸口超放鬆,好舒服哦!)\n如果你圓肩駝背、抬手喀喀響,我強烈推薦做這個動作。\n肩膀本該和肩胛骨一起活動,但當它們脫節,一動就會發出聲音。\n隨著深呼吸,感受胸口到手臂的強烈伸展,你的彈響問題也不見了!"}, {"id": "ex_day_176", "content_type": "單一動作", "source_type": "單一動作", "source_id": "176", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(誰都別攔我,我要每天做100下!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "側躺內收", "difficulty": "新手", "order": "1", "card_reason": "「側躺內收」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當臀凹、假胯或屁股線條看起來被拉住，可以先做「側躺內收」；重點不是忍到很酸，而是讓髖臀張力和發力順序慢慢接回來。", "movement_name": "側躺內收", "movement_code": "", "sets_reps": "100下", "equipment": "瑜伽磚", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18HcuN9vwB/", "content_status": "https://www.facebook.com/share/r/18HcuN9vwB/", "raw_hook": "(誰都別攔我,我要每天做100下!)", "raw_day": "176", "raw_page": "246", "raw_text": "◤一個超級累,但能幫你瘦大腿的動作◢\n(誰都別攔我,我要每天做100下!)\n大概8到10個,每天都有人問我:「假胯寬、大腿粗怎麼辦?」\n身體有分淺層和深層肌肉,但是他們的的深層肌沒有力,然後出現各種體態問題。\n跨過去時,穩定膝蓋不動,你的腹部到大腿內側都會酸爆,腿腿瘦起來!"}, {"id": "ex_day_175", "content_type": "單一動作", "source_type": "單一動作", "source_id": "175", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "久坐會讓臀肌變弱,弱到拉不住骨盆,才會不正、腰痠背痛。這動作專門喚醒弱肌肉 ,從根本改善問題。", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "弓步前彎", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整腰背和骨盆的分工，像「弓步前彎」這類動作可以放在收操時先試。", "detail": "久坐後腰下方很緊、站起來總覺得腰在頂著的時候，先別急著加難度，做完再看腰不用一直自己扛有沒有改善像「弓步前彎」這類動作，可以放在收操時先做。", "movement_name": "弓步前彎", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒、軟墊、門框", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1G16yoqNoj/", "content_status": "https://www.facebook.com/share/r/1G16yoqNoj/", "raw_hook": "久坐會讓臀肌變弱,弱到拉不住骨盆,才會不正、腰痠背痛。這動作專門喚醒弱肌肉 ,從根本改善問題。", "raw_day": "175", "raw_page": "247", "raw_text": "◤一個超級酸,但能改善骨盆歪斜的動作◢\n(做起來很吃力,但結束後超輕鬆!)\n坐再好的工學椅,也救不了你的長短腳,但這個動作可以!\n久坐會讓臀肌變弱,弱到拉不住骨盆,才會不正、腰痠背痛。這動作專門喚醒弱肌肉 ,從根本改善問題。\n別讓滾筒掉下來,你的腰痛會減輕,坐著也舒服很多!"}, {"id": "ex_day_174", "content_type": "單一動作", "source_type": "單一動作", "source_id": "174", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完我年輕5歲了,你們呢?)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "上下犬流動", "difficulty": "新手", "order": "1", "card_reason": "如果久坐後腰下方很緊、站起來總覺得腰在頂著，先做「上下犬流動」，會比直接加強更容易找到感覺。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人放在訓練前，先整理張力，再進入主要動作像「上下犬流動」這類動作，可以放在第一輪先做。", "movement_name": "上下犬流動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1UXuizkPrd/", "content_status": "https://www.facebook.com/share/r/1UXuizkPrd/", "raw_hook": "(做完我年輕5歲了,你們呢?)", "raw_day": "174", "raw_page": "248", "raw_text": "◤一個超級累,但能讓你回到過去的動作◢\n(做完我年輕5歲了,你們呢?)\n如果你忙到沒時間運動,體態又很差,那就做這個動作!\n上犬式 x 下犬式流動,喚醒因工作僵硬的大腿、腰部、背部,讓身體重新運轉!\n當你能流暢完成,感覺就像回到學生時期了!"}, {"id": "ex_day_173", "content_type": "單一動作", "source_type": "單一動作", "source_id": "173", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "滾筒夾磚單腿橋(瘦腿直腿)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "單腿橋式", "difficulty": "新手", "order": "1", "card_reason": "這類「練臀沒感覺」常不是單一部位的問題，先從臀肌和髖的連結開始整理。", "detail": "如果你常覺得練臀時腿先酸、屁股卻沒什麼感覺，先用「單腿橋式」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "單腿橋式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "滾筒", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18RScm7dr6/", "content_status": "https://www.facebook.com/share/r/18RScm7dr6/", "raw_hook": "滾筒夾磚單腿橋(瘦腿直腿)", "raw_day": "173", "raw_page": "249", "raw_text": "◤一個超級酸,但能讓你腿變直的動作◢\n(屁屁已經離家出走!)\n想要大直腿,不靠重訓,在家也能做到嗎?\n當然可以。大多數人臀肌、大腿內側都無力,這個動作能快速練到深層肌肉,讓腿型越來越修長。\n記住,抬腳時滾筒不能動,你的屁股會整個燒起來!"}, {"id": "ex_day_172", "content_type": "單一動作", "source_type": "單一動作", "source_id": "172", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(做完真的超舒服!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "梨狀肌伸展", "difficulty": "新手", "order": "1", "card_reason": "先用「梨狀肌伸展」把臀肌和髖的連結叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓臀肌和髖的連結找到方向，通常比一次做到很深更有用。", "movement_name": "梨狀肌伸展", "movement_code": "", "sets_reps": "2分鐘", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1FVk2ive7W/", "content_status": "https://www.facebook.com/share/r/1FVk2ive7W/", "raw_hook": "(做完真的超舒服!)", "raw_day": "172", "raw_page": "230", "raw_text": "◤一個很酸,但能舒緩梨狀肌緊繃的動作◢\n(做完真的超舒服!)\n屁股一邊酸、緊、甚至發麻,做這個動作,求求了!\n我們的深層臀肌,長期下來孱弱又僵硬,壓迫到坐骨神經,就會不舒服。\n睡前每邊做2分鐘,拉開它,第二天走路都順暢!\n(搭配Day164 的臀凹陷動作,效果更好!)"}, {"id": "ex_day_171", "content_type": "單一動作", "source_type": "單一動作", "source_id": "171", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "(這是什麼魔法?真的沒聲音了!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "滾筒跨欄", "difficulty": "進階", "order": "1", "card_reason": "這個方向能幫你讓力量不要再跑錯地方；先求控制清楚，不用急著做很深，像「滾筒跨欄」這類動作可以放在身體很緊時先試。", "detail": "適合骨盆左右不平均，站姿和走路都怪怪的時先做一輪，重點是感覺變清楚，不是把動作做大。", "movement_name": "滾筒跨欄", "movement_code": "", "sets_reps": "每邊20下；每邊20下", "equipment": "滾筒、牆面", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1dGgWdMJwp/", "content_status": "https://www.facebook.com/share/r/1dGgWdMJwp/", "raw_hook": "(這是什麼魔法?真的沒聲音了!)", "raw_day": "171", "raw_page": "250", "raw_text": "◤一個超級難,但能改善骨盆彈響的動作◢\n(這是什麼魔法?真的沒聲音了!)\n如果你骨盆不正、走路喀喀響,這個動作你一定要試!\n按摩跟伸展只能短暫舒緩,真正的關鍵是提升骨盆穩定和活動度。\n每邊20下,你的骨盆又重回健康狀態!"}, {"id": "ex_day_170", "content_type": "單一動作", "source_type": "單一動作", "source_id": "170", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "(練到不晃,小腿就細了!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "閉眼樹式", "difficulty": "進階", "order": "1", "card_reason": "「閉眼樹式」適合放在前面，先讓下肢線條會更順，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看下肢線條會更順，效果會比單純硬拉更清楚。", "movement_name": "閉眼樹式", "movement_code": "", "sets_reps": "1分鐘", "equipment": "徒手", "body_position": "站姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CWnyrZVND/", "content_status": "https://www.facebook.com/share/r/1CWnyrZVND/", "raw_hook": "(練到不晃,小腿就細了!)", "raw_day": "170", "raw_page": "251", "raw_text": "◤一個超級難,但能讓小腿變細的動作◢\n(練到不晃,小腿就細了!)\n上培訓時,連教練的通過率也不到10%!\n女性很在意的肌肉腿、棒棒腿,關鍵是深層肌肉罷工,淺層肌肉過勞,才會越來越粗。\n閉上眼睛,目標撐1分鐘,你的腿會又細又直!"}, {"id": "ex_day_169", "content_type": "單一動作", "source_type": "單一動作", "source_id": "169", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(別做太多,小心同事認不出你!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "半跪姿擦牆", "difficulty": "進階", "order": "1", "card_reason": "它不是單純放鬆，而是讓脊椎和胸廓的旋轉重新有反應，動作才會比較順，像「半跪姿擦牆」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓脊椎和胸廓的旋轉變得比較會配合，身體才不會越練越緊像「半跪姿擦牆」這類動作，可以放在動作前面先做。", "movement_name": "半跪姿擦牆", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "牆面", "body_position": "半跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18utmJuVQY/", "content_status": "https://www.facebook.com/share/r/18utmJuVQY/", "raw_hook": "(別做太多,小心同事認不出你!)", "raw_day": "169", "raw_page": "252", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(別做太多,小心同事認不出你!)\n我沒看過,超過25歲,還能一次做好這個動作!\n女生常見的問題:駝背、翼狀肩胛、脊椎側彎,中一項,體態就不好看。\n手肘沿著牆壁畫圓,一開始很卡,但是越做,你會越年輕!"}, {"id": "ex_day_168", "content_type": "單一動作", "source_type": "單一動作", "source_id": "168", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "(這是什麼魔法?不動也能變瘦!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "忍者跪坐", "difficulty": "新手", "order": "1", "card_reason": "「忍者跪坐」不是要你做到很酸，而是先整理腳踝到小腿的張力，讓下肢線條會更順。", "detail": "適合小腿很硬、腳踝不靈活，走路很容易累的人，先做「忍者跪坐」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "忍者跪坐", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1FX9SgX3VZ/", "content_status": "https://www.facebook.com/share/r/1FX9SgX3VZ/", "raw_hook": "(這是什麼魔法?不動也能變瘦!)", "raw_day": "168", "raw_page": "253", "raw_text": "◤一個很酸,但能讓你瘦小腿的動作◢\n(這是什麼魔法?不動也能變瘦!)\n想要小腿細,千萬別去打肉毒,改做這個動作!\n腳跟往後推到底,調整足踝角度,讓你走路時小腿不再過度用力。\n每天堅持,小腿越走越細。記住——足正,腿就細!"}, {"id": "ex_day_167", "content_type": "單一動作", "source_type": "單一動作", "source_id": "167", "body_part": "骨盆臀型", "pain_point": "練臀沒感覺", "pain_point_original": "(屁屁酸到想離家出走!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "女神蹲", "difficulty": "新手", "order": "1", "card_reason": "遇到練臀時腿先酸、屁股卻沒什麼感覺時，可以先用「女神蹲」把臀肌和髖的連結接回來。", "detail": "練臀時腿先酸、屁股卻沒什麼感覺的時候，先別急著加難度，做完再看屁股比較容易上線有沒有改善像「女神蹲」這類動作，可以放在睡前先做。", "movement_name": "女神蹲", "movement_code": "", "sets_reps": "1分鐘", "equipment": "徒手", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1EFg5YVBaQ/", "content_status": "https://www.facebook.com/share/r/1EFg5YVBaQ/", "raw_hook": "(屁屁酸到想離家出走!)", "raw_day": "167", "raw_page": "254", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(屁屁酸到想離家出走!)\n如果你有假胯寬,大腿前側特別壯,做這個動作,求求了!\n這些體態的根源,是骨盆失穩,這招能精準啟動臀部的深層肌肉,體態越練越好看。\n膝蓋只抬3公分,太高就沒效,1分鐘炸翻你的屁股!"}, {"id": "ex_day_166", "content_type": "單一動作", "source_type": "單一動作", "source_id": "166", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "(提醒:兩邊都要做,不然腰會更酸歪一邊!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "側支撐起身", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打單邊腰痛，重點是把活動範圍慢慢打開，不是一直追求更大幅度。", "detail": "這個動作可以放在第一步，先把活動範圍慢慢打開，讓後面的動作比較不會亂用力像「側支撐起身」這類動作，可以放在久坐後先做。", "movement_name": "側支撐起身", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "側躺", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1DjHNeQe38/", "content_status": "https://www.facebook.com/share/r/1DjHNeQe38/", "raw_hook": "(提醒:兩邊都要做,不然腰會更酸歪一邊!)", "raw_day": "166", "raw_page": "255", "raw_text": "◤一個很酸,但能改善久坐腰痛的動作◢\n(提醒:兩邊都要做,不然腰會更酸歪一邊!)\n工作3年才明白,腰痛其實是坐姿不良造成的!\n不管是盤腿、翹腳、還是側坐,都會讓腰兩側肌肉一長一短。做動作時會發現,有一邊下去很緊很酸。\n用立起的腳撐起身體,你的腰痛減輕,呼吸也更順了!"}, {"id": "ex_day_165", "content_type": "單一動作", "source_type": "單一動作", "source_id": "165", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "對於平日很忙,又想改善體態的人,我強烈推薦做這個動作。", "purpose": "活動度", "secondary_purpose": "活動度", "title": "髖旋轉流動", "difficulty": "進階", "order": "1", "card_reason": "想讓關節動得更順，先看骨盆和大腿的活動有沒有配合；「髖旋轉流動」就是做這件事。", "detail": "適合開髖做很多還是覺得髖轉不順時使用；不用做到很深，先讓骨盆和大腿的活動有反應就好像「髖旋轉流動」這類動作，可以放在走路後先做。", "movement_name": "髖旋轉流動", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1E5XiDxYoq/", "content_status": "https://www.facebook.com/share/r/1E5XiDxYoq/", "raw_hook": "對於平日很忙,又想改善體態的人,我強烈推薦做這個動作。", "raw_day": "165", "raw_page": "257", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(快收藏,偷偷變年輕!)\n對於平日很忙,又想改善體態的人,我強烈推薦做這個動作。\n年紀一大,骨盆很容易筋膜沾黏,上下樓梯、日常活動都會僵硬卡卡,還會發彈響聲。\n學會這一招,你將領先99%的同齡人!"}, {"id": "ex_day_164", "content_type": "單一動作", "source_type": "單一動作", "source_id": "164", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(做完上臀酸到爆炸!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "單腿轉髖", "difficulty": "新手", "order": "1", "card_reason": "「單腿轉髖」可以當成重新校準的一步，幫身體找回比較順的方向，可以放在暖身時先試。", "detail": "先做小範圍就好，讓髖臀張力和發力順序找到方向，通常比一次做到很深更有用像「單腿轉髖」這類動作，可以放在暖身時先做。", "movement_name": "單腿轉髖", "movement_code": "", "sets_reps": "每邊15下；每邊15下", "equipment": "滾筒、牆面", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ES98fjtQJ/", "content_status": "https://www.facebook.com/share/r/1ES98fjtQJ/", "raw_hook": "(做完上臀酸到爆炸!)", "raw_day": "164", "raw_page": "256", "raw_text": "◤一個超級酸,但能改善臀凹陷的動作◢\n(做完上臀酸到爆炸!)\n如果你有媽媽臀、馬鞍肉、或屁股兩側凹陷,一定要試試這動作!\n用滾筒固定大腿,然後骨盆轉向牆,酸的地方剛好是上臀——臀凹陷的關鍵點。\n每邊15下,你的曲線變飽滿,形狀順多了!"}, {"id": "ex_day_163", "content_type": "單一動作", "source_type": "單一動作", "source_id": "163", "body_part": "足底", "pain_point": "腳底痠脹", "pain_point_original": "(做完腳底又酸又爽!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "腳趾步伐", "difficulty": "新手", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整足底和小腿張力。", "detail": "它比較像整理開關，先讓隔天走路比較不沉，再進入伸展或訓練會比較穩。", "movement_name": "腳趾步伐", "movement_code": "", "sets_reps": "2下；1下", "equipment": "徒手", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1AJWZJnGWm/", "content_status": "https://www.facebook.com/share/r/1AJWZJnGWm/", "raw_hook": "(做完腳底又酸又爽!)", "raw_day": "163", "raw_page": "258", "raw_text": "◤一個很酸,但能改善足底筋膜炎的動作◢\n(做完腳底又酸又爽!)\n做完這個動作,90%的個案都舒緩很多,為什麼呢?\n因為長期穿鞋,我們的大腳趾和其他四趾,會變得黏在一起,沒辦法分開活動!\n重新喚醒腳趾,再起來走一走,你會發現,腳底輕鬆很多!"}, {"id": "ex_day_162", "content_type": "單一動作", "source_type": "單一動作", "source_id": "162", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(這是什麼魔法?做完真的不痛了!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "側轉橋式", "difficulty": "新手", "order": "1", "card_reason": "如果久坐後腰下方很緊、站起來總覺得腰在頂著，先做「側轉橋式」，會比直接加強更容易找到感覺。", "detail": "適合久坐後腰下方很緊、站起來總覺得腰在頂著的人放在訓練前，先整理張力，再進入主要動作像「側轉橋式」這類動作，可以放在第一輪先做。", "movement_name": "側轉橋式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1KeBnYFmwG/", "content_status": "https://www.facebook.com/share/r/1KeBnYFmwG/", "raw_hook": "(這是什麼魔法?做完真的不痛了!)", "raw_day": "162", "raw_page": "260", "raw_text": "◤一個很累,但能改善久坐腰痛的動作◢\n(這是什麼魔法?做完真的不痛了!)\n個案問我,腰痛不能用按的,還要做這個動作嗎?\n我說,一定要!不管久坐還是久站,腰兩側的肌肉幾乎沒在動,「缺乏活動」才是真正的元兇。\n左右轉一轉,你的腰痛會好很多!"}, {"id": "ex_day_161", "content_type": "單一動作", "source_type": "單一動作", "source_id": "161", "body_part": "肩頸", "pain_point": "肩胛控制差", "pain_point_original": "(提醒:別在上班時偷做,因為真的太舒服!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "肩胛骨伸展", "difficulty": "新手", "order": "1", "card_reason": "這類「肩胛控制差」常不是單一部位的問題，先從肩胛的滑動和支撐開始整理，像「肩胛骨伸展」這類動作可以放在居家練習先試。", "detail": "不要急著追求痠痛感，先讓肩胛的滑動和支撐變得比較會配合，身體才不會越練越緊像「肩胛骨伸展」這類動作，可以放在居家練習先做。", "movement_name": "肩胛骨伸展", "movement_code": "", "sets_reps": "1分鐘", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1As8zmyVqx/", "content_status": "https://www.facebook.com/share/r/1As8zmyVqx/", "raw_hook": "(提醒:別在上班時偷做,因為真的太舒服!)", "raw_day": "161", "raw_page": "259", "raw_text": "◤一個超酸,但能立即緩解上背痛的動作◢\n(提醒:別在上班時偷做,因為真的太舒服!)\n開工才二週,抱怨背痛的個案,已經有好幾位。\n肩胛骨內側又卡又緊,痛到想罵人。那種酸痛,正是膏肓穴在抗議!\n把手肘往下拉,1分鐘,你的背痛就消失了!"}, {"id": "ex_day_160", "content_type": "單一動作", "source_type": "單一動作", "source_id": "160", "body_part": "骨盆臀型", "pain_point": "骨盆歪斜", "pain_point_original": "(如果能回到10年前,我想......)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "手槍蹲", "difficulty": "進階", "order": "1", "card_reason": "先用「手槍蹲」把骨盆兩側的控制叫回來，後面的訓練才不容易跑偏。", "detail": "當骨盆左右不平均，站姿和走路都怪怪的，可以先做「手槍蹲」；重點不是忍到很酸，而是讓骨盆兩側的控制慢慢接回來。", "movement_name": "手槍蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1AfMw1MN4i/", "content_status": "https://www.facebook.com/share/r/1AfMw1MN4i/", "raw_hook": "(如果能回到10年前,我想......)", "raw_day": "160", "raw_page": "261", "raw_text": "◤一個超級難,但能讓你回到過去的動作◢\n(如果能回到10年前,我想......)\n還不到25歲,骨盆僵硬到不行,最近看到好幾個!\n女性常見的體態問題:骨盆歪斜、腿不直、小腿外翻。都和雙腳不平衡有關。\n當你能用一隻腳蹲下,你的身體,也回到學生時期!"}, {"id": "ex_day_159", "content_type": "單一動作", "source_type": "單一動作", "source_id": "159", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(做完屁屁又酸又爽!)", "purpose": "先鬆開", "secondary_purpose": "", "title": "抱腿伸展", "difficulty": "中階", "order": "1", "card_reason": "這個方向能幫你讓身體先不要一直繃著；先求控制清楚，不用急著做很深，像「抱腿伸展」這類動作可以放在身體很緊時先試。", "detail": "適合背一邊緊、一邊凸，轉身也不太順時先做一輪，重點是感覺變清楚，不是把動作做大像「抱腿伸展」這類動作，可以放在身體很緊時先做。", "movement_name": "抱腿伸展", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1E5VbGm9dk/", "content_status": "https://www.facebook.com/share/r/1E5VbGm9dk/", "raw_hook": "(做完屁屁又酸又爽!)", "raw_day": "159", "raw_page": "262", "raw_text": "◤一個超級酸,但能改善骨盆歪斜的動作◢\n(做完屁屁又酸又爽!)\n我還沒看過,超過28歲,能輕鬆把膝蓋拉到胸口的!\n上班族最常見的:側坐、翹腳、脊椎側彎,只要中一項,腰就容易痛。\n但只要這樣抬高膝蓋、轉一轉,你的骨盆回正,腰也舒服了!"}, {"id": "ex_day_158", "content_type": "單一動作", "source_type": "單一動作", "source_id": "158", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(長短腳、高低肩的朋友,一定要試試!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "Fig4桌式", "difficulty": "進階", "order": "1", "card_reason": "「Fig4桌式」適合放在前面，先讓腰不用一直自己扛，再接後面的動作。", "detail": "這個動作可以放在第一步，先把線條被拉歪的地方整理回來，讓後面的動作比較不會亂用力像「Fig4桌式」這類動作，可以放在想測感覺時先做。", "movement_name": "Fig4桌式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1J3bYKmEz8/", "content_status": "https://www.facebook.com/share/r/1J3bYKmEz8/", "raw_hook": "(長短腳、高低肩的朋友,一定要試試!)", "raw_day": "158", "raw_page": "263", "raw_text": "◤一個超級難,但能改善骨盆不正的動作◢\n(長短腳、高低肩的朋友,一定要試試!)\n我沒看過,超過28歲,還能一次做好這個動作!\n如果你習慣側坐或盤腿,骨盆早就左右失衡,平常站著不明顯,但一做就開始東倒⻄歪。\n控制臀部來完成動作,你的腰痛減輕,呼吸也變順了!"}, {"id": "ex_day_157", "content_type": "單一動作", "source_type": "單一動作", "source_id": "157", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完整個人放鬆,好好睡一覺!)", "purpose": "改善線條", "secondary_purpose": "改善線條", "title": "單腿眼鏡蛇", "difficulty": "中階", "order": "1", "card_reason": "它不是單純放鬆，而是讓腰背和骨盆的分工重新有反應，動作才會比較順，像「單腿眼鏡蛇」這類動作可以放在動作前面先試。", "detail": "如果你常覺得久坐後腰下方很緊、站起來總覺得腰在頂著，先用「單腿眼鏡蛇」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "單腿眼鏡蛇", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "趴姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1BU9KQwniV/", "content_status": "https://www.facebook.com/share/r/1BU9KQwniV/", "raw_hook": "(做完整個人放鬆,好好睡一覺!)", "raw_day": "157", "raw_page": "264", "raw_text": "◤一個超級酸,但能改善假胯寬的動作◢\n(做完整個人放鬆,好好睡一覺!)\n我以前遇過的個案,覺得自己屁股很大,但其實是假胯寬的錯!\n特別是30歲上下的朋友,骨盆僵硬,不只讓下半身顯寬,還容易酸痛。\n盡量把腳抬高,你會發現骨盆、腰部、胸口都舒服了!"}, {"id": "ex_day_156", "content_type": "單一動作", "source_type": "單一動作", "source_id": "156", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "(年過30歲,身體老化有感,馬上跟著練!)", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "海豚式", "difficulty": "新手", "order": "1", "card_reason": "「海豚式」不是要你做到很酸，而是先整理胸口和肩胛位置，讓上半身比較不會縮成一團。", "detail": "適合肩膀往前捲、背看起來厚，胸口也打不開的人，先做「海豚式」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "海豚式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18RRE9wq8r/", "content_status": "https://www.facebook.com/share/r/18RRE9wq8r/", "raw_hook": "(年過30歲,身體老化有感,馬上跟著練!)", "raw_day": "156", "raw_page": "265", "raw_text": "◤一個很累,但能逆轉你的年齡的動作◢\n(年過30歲,身體老化有感,馬上跟著練!)\n對於平日很忙,又很想改變體態的個案,我都強烈推薦他們做這個。\n女性天生上半身力量較弱,更容易出現圓肩、溜肩、翼狀肩胛,讓你比實際更老。\n手指扣住地板,用背部肌肉撐住,你的身體,也開始變年輕了!"}, {"id": "ex_day_155", "content_type": "單一動作", "source_type": "單一動作", "source_id": "155", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?", "purpose": "改善線條", "secondary_purpose": "找回發力", "title": "坐起身轉髖", "difficulty": "進階", "order": "1", "card_reason": "遇到腰總是偏一邊不舒服時，可以先用「坐起身轉髖」把骨盆兩側和側腰支撐接回來。", "detail": "它比較像整理開關，先讓單邊拉扯感會比較少，再進入伸展或訓練會比較穩像「坐起身轉髖」這類動作，可以放在睡前先做。", "movement_name": "坐起身轉髖", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1QC4cN9TKK/", "content_status": "https://www.facebook.com/share/r/1QC4cN9TKK/", "raw_hook": "但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?", "raw_day": "155", "raw_page": "266", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(這個真的好酸喔!)\n還不到25歲,骨盆僵硬到不行,最近遇到好幾個。\n髖有外旋和內旋兩種方向,大多數人兩種都很弱,然後出現假胯寬、長短腳、X型腿...\n但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?"}, {"id": "ex_day_154", "content_type": "單一動作", "source_type": "單一動作", "source_id": "154", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "(膝蓋好緊!膝蓋僵硬!做這個就對了!)", "purpose": "先鬆開", "secondary_purpose": "先鬆開", "title": "四足式勾腿", "difficulty": "新手", "order": "1", "card_reason": "這個動作主打膝蓋不舒服，重點是先把過度緊繃降下來，不是一直追求更大幅度。", "detail": "做完可以回頭測同一個角度，看看膝蓋壓力會比較少，效果會比單純硬拉更清楚像「四足式勾腿」這類動作，可以放在久坐後先做。", "movement_name": "四足式勾腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1GwqFP2sjM/", "content_status": "https://www.facebook.com/share/r/1GwqFP2sjM/", "raw_hook": "(膝蓋好緊!膝蓋僵硬!做這個就對了!)", "raw_day": "154", "raw_page": "267", "raw_text": "◤一個很累,但能讓膝蓋變舒服的動作◢\n(膝蓋好緊!膝蓋僵硬!做這個就對了!)\n個案問我:「膝蓋在痛,該怎麼辦?」\n無論是內側還是外側痛,原因可能很多,但如果你想立刻舒緩,記住這個動作!\n保持身體穩定不歪掉,你的膝蓋會馬上舒服很多!"}, {"id": "ex_day_153", "content_type": "單一動作", "source_type": "單一動作", "source_id": "153", "body_part": "骨盆臀型", "pain_point": "髖卡打不開", "pain_point_original": "(這是什麼魔法?做完骨盆好輕鬆!)", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "弓步側扭轉", "difficulty": "進階", "order": "1", "card_reason": "想讓力量不要再跑錯地方，先看骨盆和大腿的活動有沒有配合；「弓步側扭轉」就是做這件事。", "detail": "適合開髖做很多還是覺得髖轉不順時使用；不用做到很深，先讓骨盆和大腿的活動有反應就好像「弓步側扭轉」這類動作，可以放在走路後先做。", "movement_name": "弓步側扭轉", "movement_code": "", "sets_reps": "10次", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18aHYAiPmc/", "content_status": "https://www.facebook.com/share/r/18aHYAiPmc/", "raw_hook": "(這是什麼魔法?做完骨盆好輕鬆!)", "raw_day": "153", "raw_page": "268", "raw_text": "◤一個超級難,但能讓你回到過去的動作◢\n(這是什麼魔法?做完骨盆好輕鬆!)\n還不到25歲,骨盆僵硬到不行,沒錯就是你!\n來回做10次,會感覺髖部熱熱的——那不是錯覺,是身體在變年輕的訊號!\n你的年齡,不只是數字,而是你的活動能力決定的。"}, {"id": "ex_day_152", "content_type": "單一動作", "source_type": "單一動作", "source_id": "152", "body_part": "肩頸", "pain_point": "圓肩厚背", "pain_point_original": "每天睡前2分鐘,你的肩膀、腰、脖子都舒服了!", "purpose": "先鬆開", "secondary_purpose": "改善線條", "title": "單側胸靠地", "difficulty": "新手", "order": "1", "card_reason": "「單側胸靠地」可以當成重新校準的一步，幫身體找回比較順的方向。", "detail": "當肩膀往前捲、背看起來厚，胸口也打不開，可以先做「單側胸靠地」；重點不是忍到很酸，而是讓胸口和肩胛位置慢慢接回來。", "movement_name": "單側胸靠地", "movement_code": "", "sets_reps": "2分鐘", "equipment": "軟墊", "body_position": "四足跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1B1bkwuAzp/", "content_status": "https://www.facebook.com/share/r/1B1bkwuAzp/", "raw_hook": "每天睡前2分鐘,你的肩膀、腰、脖子都舒服了!", "raw_day": "152", "raw_page": "269", "raw_text": "◤一個超級酸,但能改善圓肩駝背的動作◢\n(做完胸口又酸又爽,超解壓!)\n我沒看過,25歲以上的人,胸口不緊繃的!\n只要坐著,身體就會自然向前縮,胸口悶,腰也跟著酸,這真的沒辦法。\n每天睡前2分鐘,你的肩膀、腰、脖子都舒服了!"}, {"id": "ex_day_151", "content_type": "單一動作", "source_type": "單一動作", "source_id": "151", "body_part": "腿型", "pain_point": "膝蓋不舒服", "pain_point_original": "每天都有不同的人私訊我:「膝蓋痛,能做這個嗎?」", "purpose": "找回發力", "secondary_purpose": "先鬆開", "title": "反向北歐彎", "difficulty": "進階", "order": "1", "card_reason": "比起一直拉最緊的地方，這個動作更像是在重整髖、膝、腳踝的配合。", "detail": "跑跳或蹲跪時膝蓋不安心的時候，先別急著加難度，做完再看膝蓋壓力會比較少有沒有改善。", "movement_name": "反向北歐彎", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "軟墊", "body_position": "跪姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/18qb2pGZLY/", "content_status": "https://www.facebook.com/share/r/18qb2pGZLY/", "raw_hook": "每天都有不同的人私訊我:「膝蓋痛,能做這個嗎?」", "raw_day": "151", "raw_page": "270", "raw_text": "◤一個超級難,但能打造鋼鐵膝蓋的動作◢\n(留言區有我的示範版,來挑戰看看!)\n每天都有不同的人私訊我:「膝蓋痛,能做這個嗎?」\n為什麼膝蓋這麼脆弱?該怎麼強化它?答案就在這個動作。\n想讓膝蓋不再疼痛,最好的方式是訓練它!這其實就是矯正訓練的核心之一!"}, {"id": "ex_day_150", "content_type": "單一動作", "source_type": "單一動作", "source_id": "150", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "(我要直腿!我要鉛筆腿!我全都要!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "娘娘蹲", "difficulty": "進階", "order": "1", "card_reason": "如果站久腳底塌、足弓撐不住，先做「娘娘蹲」，會比直接加強更容易找到感覺。", "detail": "適合站久腳底塌、足弓撐不住的人放在訓練前，先整理張力，再進入主要動作。", "movement_name": "娘娘蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/17KmBvf45x/", "content_status": "https://www.facebook.com/share/r/17KmBvf45x/", "raw_hook": "(我要直腿!我要鉛筆腿!我全都要!)", "raw_day": "150", "raw_page": "271", "raw_text": "◤一個超級難,但能把彎腿拉直的動作◢\n(我要直腿!我要鉛筆腿!我全都要!)\n我沒看過,那些腿很直的人,走路會外八。\n小腿外翻、足弓塌陷、內八外八,只要中一項,腿就不會直。\n試著感受腳掌,當你學會掌控它,就能自信秀出你的腿!"}, {"id": "ex_day_149", "content_type": "單一動作", "source_type": "單一動作", "source_id": "149", "body_part": "足底", "pain_point": "足弓無力", "pain_point_original": "(如果你是玻璃膝蓋,請務必跟著做!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "碰手娘娘蹲", "difficulty": "新手", "order": "1", "card_reason": "這類「足弓無力」常不是單一部位的問題，先從足底支撐和下肢力線開始整理。", "detail": "如果你常覺得站久腳底塌、足弓撐不住，先用「碰手娘娘蹲」確認身體哪裡比較不順，再慢慢加強。", "movement_name": "碰手娘娘蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "蹲姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1HZ8GYMcPV/", "content_status": "https://www.facebook.com/share/r/1HZ8GYMcPV/", "raw_hook": "(如果你是玻璃膝蓋,請務必跟著做!)", "raw_day": "149", "raw_page": "272", "raw_text": "◤一個超爆汗,但能讓膝蓋變健康的動作◢\n(如果你是玻璃膝蓋,請務必跟著做!)\n過去有個案問我:膝蓋常不舒服,還要做這個動作嗎?\n我說,一定要!想要預防膝蓋痛,需要同時從髖、腳踝,還有膝蓋肌肉下手。\n當你能夠輕鬆完成,你的膝蓋痛也不見了!"}, {"id": "ex_day_148", "content_type": "單一動作", "source_type": "單一動作", "source_id": "148", "body_part": "腰背", "pain_point": "下背壓力", "pain_point_original": "(做完這動作,身體至少年輕20歲!)", "purpose": "找回發力", "secondary_purpose": "活動度", "title": "坐鴿式起身", "difficulty": "進階", "order": "1", "card_reason": "先用「坐鴿式起身」把腰背和骨盆的分工叫回來，後面的訓練才不容易跑偏。", "detail": "先做小範圍就好，讓腰背和骨盆的分工找到方向，通常比一次做到很深更有用像「坐鴿式起身」這類動作，可以放在下次訓練前先做。", "movement_name": "坐鴿式起身", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1CwJhAPSFL/", "content_status": "https://www.facebook.com/share/r/1CwJhAPSFL/", "raw_hook": "(做完這動作,身體至少年輕20歲!)", "raw_day": "148", "raw_page": "273", "raw_text": "◤一個超級難,但能改善久坐腰痛的動作◢\n(做完這動作,身體至少年輕20歲!)\n我沒看過,超過28歲,還能一次做好這個動作!\n以前遇過的個案,總覺得自己腰特別緊,但其實是骨盆僵硬,才讓腰容易酸痛。\n把骨盆轉開,回到20年前的狀態,你的腰也會輕鬆許多!"}, {"id": "ex_day_147", "content_type": "單一動作", "source_type": "單一動作", "source_id": "147", "body_part": "腰背", "pain_point": "脊椎不順", "pain_point_original": "(做起來劈啪聲,但是胸口真的打開了!)", "purpose": "活動度", "secondary_purpose": "先鬆開", "title": "滾筒洗衣機", "difficulty": "新手", "order": "1", "card_reason": "這個方向能幫你讓關節動得更順；先求控制清楚，不用急著做很深，像「滾筒洗衣機」這類動作可以放在身體很緊時先試。", "detail": "適合背一邊緊、一邊凸，轉身也不太順時先做一輪，重點是感覺變清楚，不是把動作做大像「滾筒洗衣機」這類動作，可以放在身體很緊時先做。", "movement_name": "滾筒洗衣機", "movement_code": "", "sets_reps": "10圈", "equipment": "滾筒", "body_position": "依影片姿勢", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/1284689269473460/", "content_status": "https://www.facebook.com/reel/1284689269473460/", "raw_hook": "(做起來劈啪聲,但是胸口真的打開了!)", "raw_day": "147", "raw_page": "274", "raw_text": "◤一個很卡,但能改善脊椎側彎的動作◢\n(做起來劈啪聲,但是胸口真的打開了!)\n如果可以,我希望每個人都能至少做一次。\n胸椎是最容易卡住的地方,脊椎側彎、胸悶、長短腳,全都跟它有關!\n左右各轉10圈,你的脊椎、脖子、呼吸都輕鬆了!"}, {"id": "ex_day_146", "content_type": "單一動作", "source_type": "單一動作", "source_id": "146", "body_part": "腿型", "pain_point": "小腿腳踝緊", "pain_point_original": "(提醒:別做太多,不然小腿會太直!)", "purpose": "找回發力", "secondary_purpose": "", "title": "夾磚桌式", "difficulty": "進階", "order": "1", "card_reason": "「夾磚桌式」適合放在前面，先讓下肢線條會更順，再接後面的動作。", "detail": "做完可以回頭測同一個角度，看看下肢線條會更順，效果會比單純硬拉更清楚像「夾磚桌式」這類動作，可以放在想測感覺時先做。", "movement_name": "夾磚桌式", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ApzzdqhY8/", "content_status": "https://www.facebook.com/share/r/1ApzzdqhY8/", "raw_hook": "(提醒:別做太多,不然小腿會太直!)", "raw_day": "146", "raw_page": "275", "raw_text": "◤一個超級難,但能讓你腿變直的動作◢\n(提醒:別做太多,不然小腿會太直!)\n我遇過很多個案,抱怨自己的腿不直,但其實問題在腳踝。\n只要腳掌不會用力,腿型一定會變彎,還會變粗!\n現在開始練,等到夏天就能自信露腿了!"}, {"id": "ex_day_145", "content_type": "單一動作", "source_type": "單一動作", "source_id": "145", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(假胯寬、小腹凸出的朋友,馬上試試!)", "purpose": "改善線條", "secondary_purpose": "先鬆開", "title": "夾磚深蹲", "difficulty": "新手", "order": "1", "card_reason": "它不是單純放鬆，而是讓髖臀張力和發力順序重新有反應，動作才會比較順，像「夾磚深蹲」這類動作可以放在動作前面先試。", "detail": "不要急著追求痠痛感，先讓髖臀張力和發力順序變得比較會配合，身體才不會越練越緊像「夾磚深蹲」這類動作，可以放在動作前面先做。", "movement_name": "夾磚深蹲", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "瑜伽磚", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/1ES14QsHMj/", "content_status": "https://www.facebook.com/share/r/1ES14QsHMj/", "raw_hook": "(假胯寬、小腹凸出的朋友,馬上試試!)", "raw_day": "145", "raw_page": "276", "raw_text": "◤一個超酸,但能把胯縮小的動作◢\n(假胯寬、小腹凸出的朋友,馬上試試!)\n我沒看過,超過25歲的人,骨盆底肌不是鬆弛的!\n在骨盆底下,有近10條深層肌肉,久坐或生產後會變鬆,出現骨盆變寬跟小腹突出。\n腳跟夾著瑜珈磚,堅持做,你的胯會越來越小!"}, {"id": "ex_day_144", "content_type": "單一動作", "source_type": "單一動作", "source_id": "144", "body_part": "腰背", "pain_point": "單邊腰痛", "pain_point_original": "但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "動態盤腿", "difficulty": "進階", "order": "1", "card_reason": "「動態盤腿」不是要你做到很酸，而是先整理骨盆兩側和側腰支撐，讓單邊拉扯感會比較少。", "detail": "適合腰總是偏一邊不舒服，左右感覺差很多的人，先做「動態盤腿」把線條被拉歪的地方整理回來，再回頭測原本不順的地方。", "movement_name": "動態盤腿", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/reel/592433400381323/", "content_status": "https://www.facebook.com/reel/592433400381323/", "raw_hook": "但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?", "raw_day": "144", "raw_page": "277", "raw_text": "◤一個超級難,但能讓你年輕5歲的動作◢\n(做完屁屁又酸又爽!)\n還不到25歲,骨盆僵硬到不行,最近遇到好幾個。\n女生最常見的體態問題:假胯寬、長短腳、X型腿,中一項,體態就不好看!\n但如果有一個動作,能同時改善這三個問題,你願意試試看嗎?"}, {"id": "ex_day_143", "content_type": "單一動作", "source_type": "單一動作", "source_id": "143", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "(提醒:別做太多,小心開工同事認不出你!)", "purpose": "改善線條", "secondary_purpose": "活動度", "title": "單腿蹲起身", "difficulty": "進階", "order": "1", "card_reason": "遇到臀凹、假胯或屁股線條看起來被拉住時，可以先用「單腿蹲起身」把髖臀張力和發力順序接回來。", "detail": "臀凹、假胯或屁股線條看起來被拉住的時候，先別急著加難度，做完再看臀線比較容易往上整理有沒有改善像「單腿蹲起身」這類動作，可以放在睡前先做。", "movement_name": "單腿蹲起身", "movement_code": "", "sets_reps": "依影片跟練", "equipment": "徒手", "body_position": "坐姿", "button_text": "查看動作影片 →", "url": "https://www.facebook.com/share/r/19z7jx6HCo/", "content_status": "https://www.facebook.com/share/r/19z7jx6HCo/", "raw_hook": "(提醒:別做太多,小心開工同事認不出你!)", "raw_day": "143", "raw_page": "278", "raw_text": "◤一個超級難,但能讓你變年輕的動作◢\n(提醒:別做太多,小心開工同事認不出你!)\n對於平日很忙,又很想改變體態的個案,我都強烈推薦他們做這個。\n髖有外旋和內旋兩種方向,大多數人都偏其中一種,然後出現假胯寬、X型腿、O型腿...\n如果有一邊特別難轉,加強它,你的骨盆就回正了!"}, {"id": "ex_day_142", "content_type": "單一動作", "source_type": "單一動作", "source_id": "142", "body_part": "骨盆臀型", "pain_point": "臀型不好看", "pain_point_original": "我的IG,每天都不同人問:「骨盆前傾怎麼         return true;
      }).sort((a,b) => {
        const ao = Number(a.order || 999), bo = Number(b.order || 999);
        if (ao !== bo) return ao - bo;
        return String(b.source_id || '').localeCompare(String(a.source_id || ''), 'zh-Hant');
      });
    }

    function updateHero() {
      $$('.libraryTab').forEach(btn => btn.classList.toggle('active', btn.dataset.library === state.mode));
      document.body.classList.toggle('aiMode', state.mode === 'ai');
      $('#aiAssistant')?.classList.toggle('show', state.mode === 'ai');
    }

    function renderBodyButtons() {
      const counts = countBy(currentData(), 'body_part');
      $('#bodyBtns').innerHTML = BODY_ORDER.map(bp => `
        <button class="bodyBtn ${state.body === bp ? 'active' : ''}" data-body="${safe(bp)}"><span>${safe(bp)}</span><span>${counts.get(bp) || 0} 筆</span></button>
      `).join('');
      $$('.bodyBtn').forEach(btn => btn.addEventListener('click', () => {
        state.body = btn.dataset.body;
        state.pain = '';
        state.activeCardId = '';
        renderAll();
      }));
      $$('.hotspot').forEach(h => h.classList.toggle('active', h.dataset.body === state.body));
    }

    function renderPainChips() {
      const activeBody = state.body || '肩頸';
      const scoped = currentData().filter(x => x.body_part === activeBody);
      const baseCounts = countBy(scoped, 'pain_point');
      const pains = uniq(scoped.map(x => x.pain_point)).sort((a,b) => (baseCounts.get(b)||0) - (baseCounts.get(a)||0));
      $('#painChips').innerHTML = [
        `<button class="chip ${state.pain === '' ? 'active' : ''}" data-pain="">全部</button>`,
        ...pains.map(p => `<button class="chip ${state.pain === p ? 'active' : ''}" data-pain="${safe(p)}">${safe(p)}</button>`)
      ].join('');
      $$('#painChips .chip').forEach(chip => chip.addEventListener('click', () => {
        state.pain = state.pain === chip.dataset.pain ? '' : chip.dataset.pain;
        state.activeCardId = '';
        renderAll();
      }));
    }

    function renderPurposeChips() {
      const availCounts = countBy(filteredForCounts('purpose'), 'purpose');
      const available = uniq(currentData().map(x => x.purpose));
      const purposes = PURPOSE_ORDER.filter(p => available.includes(p));
      $('#purposeChips').innerHTML = [
        `<button class="chip ${state.purpose === '' ? 'active' : ''}" data-purpose="">全部</button>`,
        ...purposes.map(p => `<button class="chip ${state.purpose === p ? 'active' : ''} ${(availCounts.get(p)||0) === 0 ? 'disabled' : ''}" data-purpose="${safe(p)}">${safe(p)}</button>`)
      ].join('');
      $$('#purposeChips .chip').forEach(chip => chip.addEventListener('click', () => {
        state.purpose = state.purpose === chip.dataset.purpose ? '' : chip.dataset.purpose;
        state.activeCardId = '';
        renderAll();
      }));
    }

    function renderInlineDetail(x) {
      const urlOk = isUrl(x.url);
      const title = x.title || x.movement_name || '未命名';
      const grid = `<div class="modalGrid">
             <div class="infoBox"><small>目的</small><b>${safe(x.purpose)}</b></div>
             <div class="infoBox"><small>難度</small><b>${safe(x.difficulty || '新手')}</b></div>
             <div class="infoBox"><small>類型</small><b>${safe(x.content_type || (state.library === 'single' ? '單一動作' : '一套教學'))}</b></div>
           </div>`;

      return `
        <div class="inlineDetail" role="region" aria-label="${safe(title)} 詳細說明">
          <div class="inlineDetailTop">
            ${grid}
            <button class="inlineClose" type="button" data-close-inline="true" aria-label="關閉">×</button>
          </div>
          <div class="inlineDetailBody">
            <div class="sectionTitle">推薦理由</div>
            <p class="modalText">${safe(x.card_reason || '')}</p>
            <div class="sectionTitle">補充說明</div>
            <p class="modalText">${safe(x.detail || '')}</p>
            <div class="modalActions">
              ${urlOk ? `<a class="primaryLink" href="${safe(x.url)}" target="_blank" rel="noopener noreferrer">觀看動作影片 →</a>` : `<span class="disabledLink">尚未補上連結</span>`}
            </div>
          </div>
        </div>
      `;
    }

    function renderResults() {
      const results = getResults();
      const filters = [state.body, state.pain, state.purpose].filter(Boolean);
      if (state.mode === 'ai' && !state.aiHasResult) {
        $('#resultCount').textContent = '等待描述';
        $('#cards').innerHTML = `<div class="empty">先在上方描述你的狀況，AI 助教會幫你縮小範圍，再顯示推薦內容。</div>`;
        return;
      }
      $('#resultCount').textContent = filters.length || state.query ? `${results.length} 筆` : `共 ${results.length} 筆`;
      if (!results.length) {
        state.activeCardId = '';
        $('#cards').innerHTML = `<div class="empty">目前沒有符合條件的內容，可以換一個痛點、目的或關鍵字。</div>`;
        return;
      }
      if (state.activeCardId && !results.some(x => x.id === state.activeCardId)) {
        state.activeCardId = '';
      }
      $('#cards').innerHTML = results.map((x, idx) => {
        const title = x.title || x.movement_name || '未命名';
        const meta = state.library === 'single'
          ? [x.purpose, x.difficulty || '新手']
          : [x.difficulty || '新手', x.pain_point];
        const isActive = state.activeCardId === x.id;
        return `
          <article class="card ${isActive ? 'activeCard' : ''}" data-id="${safe(x.id)}">
            <div class="cardTop">
              <div class="cardTitle"><span class="num">${idx + 1}</span><span>${safe(title)}</span></div>
              <span class="tag">${safe(x.purpose)}</span>
            </div>
            <p class="reason">${safe(x.card_reason || '')}</p>
            <div class="meta">
              ${meta.filter(Boolean).map(m => `<span class="pill">${safe(m)}</span>`).join('')}
            </div>
            ${isActive ? renderInlineDetail(x) : ''}
          </article>
        `;
      }).join('');
      $$('.card').forEach(card => card.addEventListener('click', (event) => {
        if (event.target.closest('a')) return;
        if (event.target.closest('[data-close-inline]')) {
          state.activeCardId = '';
          renderResults();
          return;
        }
        const id = card.dataset.id;
        state.activeCardId = state.activeCardId === id ? '' : id;
        renderResults();
      }));
    }

    function openModal(id) {
      const x = currentData().find(item => item.id === id);
      if (!x) return;
      const title = x.title || x.movement_name || '未命名';
      $('#modalTitle').textContent = title;
      const urlOk = isUrl(x.url);

      const grid = `<div class="modalGrid">
             <div class="infoBox"><small>目的</small><b>${safe(x.purpose)}</b></div>
             <div class="infoBox"><small>難度</small><b>${safe(x.difficulty || '新手')}</b></div>
           </div>`;

      $('#modalBody').innerHTML = `
        ${grid}
        <div class="sectionTitle">推薦理由</div>
        <p class="modalText">${safe(x.card_reason || '')}</p>
        <div class="sectionTitle">補充說明</div>
        <p class="modalText">${safe(x.detail || '')}</p>
        <div class="modalActions">
          ${urlOk ? `<a class="primaryLink" href="${safe(x.url)}" target="_blank" rel="noopener noreferrer">觀看動作影片 →</a>` : `<span class="disabledLink">尚未補上連結</span>`}
        </div>
      `;
      $('#modalBackdrop').classList.add('show');
    }

    function closeModal() { $('#modalBackdrop').classList.remove('show'); }

    function resetFilters() {
      state.body = '肩頸';
      state.pain = '';
      state.purpose = '';
      state.query = '';
      state.activeCardId = '';
      state.aiHasResult = false;
      $('#searchInput').value = '';
      renderAll();
    }

    function switchLibrary(lib) {
      state.mode = lib;
      state.library = lib === 'ai' ? 'combo' : lib;
      state.body = lib === 'ai' ? '' : '肩頸';
      state.pain = '';
      state.purpose = '';
      state.query = '';
      state.activeCardId = '';
      state.aiHasResult = false;
      $('#searchInput').value = '';
      if (lib === 'ai') {
        $('#aiReply').classList.remove('show');
        $('#aiReply').textContent = '';
      }
      renderAll();
    }


    function labelLibrary(lib) {
      return lib === 'single' ? '單一動作' : '組合動作';
    }

    function normalizeAiResult(r) {
      const bodyParts = BODY_ORDER;
      const purposes = PURPOSE_ORDER;
      const lib = r && r.library === 'single' ? 'single' : 'combo';
      const body = bodyParts.includes(r?.body_part) ? r.body_part : '';
      const data = LIBRARIES[lib] || [];
      const painsForBody = uniq(data.filter(x => !body || x.body_part === body).map(x => x.pain_point));
      const pain = painsForBody.includes(r?.pain_point) ? r.pain_point : '';
      const purpose = purposes.includes(r?.purpose) ? r.purpose : '';
      return { ...r, library: lib, body_part: body, pain_point: pain, purpose };
    }

    function applyAiResult(raw) {
      const r = normalizeAiResult(raw || {});
      state.mode = 'ai';
      state.library = r.library;
      state.body = r.body_part;
      state.pain = r.pain_point;
      state.purpose = r.purpose;
      state.query = '';
      state.activeCardId = '';
      state.aiHasResult = true;
      $('#searchInput').value = '';
      renderAll();
      return r;
    }

    function resetAiEnterArmed() {
      aiEnterArmed = false;
      aiJustCommittedComposition = false;

      const input = $('#aiInput');
      if (input) {
        input.placeholder = aiDefaultPlaceholder;
      }
    }

    function armAiEnter() {
      const input = $('#aiInput');
      if (!input || !input.value.trim()) return;

      aiEnterArmed = true;
      input.placeholder = aiArmedPlaceholder;
    }

    function bindAiInputEnterBehavior() {
      const aiInput = $('#aiInput');
      if (!aiInput) return;

      aiInput.addEventListener('compositionstart', function() {
        aiIsComposing = true;
        aiJustCommittedComposition = false;
      });

      aiInput.addEventListener('compositionend', function() {
        aiIsComposing = false;

        // Mac 中文輸入法的 Enter 會先被拿去確認選字。
        // 只要一段中文選字剛完成，就直接視為「第 1 下 Enter」已經發生。
        // 這樣使用者選完字後，再按一次 Enter 就能送出，不會變成要按 3 下。
        if (aiInput.value.trim()) {
          aiJustCommittedComposition = true;
          armAiEnter();

          // 有些瀏覽器會在 compositionend 後才觸發 input。
          // 短暫保護這個狀態，避免剛 armed 又被 input 事件重置。
          setTimeout(function() {
            aiJustCommittedComposition = false;
          }, 80);
        }
      });

      aiInput.addEventListener('input', function() {
        // 中文組字中，不重置
        if (aiIsComposing) return;

        // 剛完成選字時，不要把「第 1 下 Enter」狀態洗掉
        if (aiJustCommittedComposition) return;

        // 使用者繼續打字，就取消「下一次 Enter 送出」狀態
        resetAiEnterArmed();
      });

      aiInput.addEventListener('keydown', function(e) {
        if (e.key !== 'Enter') {
          return;
        }

        // 中文輸入法選字中：Enter 只確認選字，不送出。
        // 第 1 下 Enter 的狀態交給 compositionend 統一處理。
        if (aiIsComposing || e.isComposing || e.keyCode === 229) {
          return;
        }

        e.preventDefault();

        const text = aiInput.value.trim();

        if (!text) {
          return;
        }

        // 第二下 Enter：送出
        if (aiEnterArmed) {
          resetAiEnterArmed();
          askAiClassifier();
          return;
        }

        // 第一下 Enter：只進入待送出狀態，不送出
        armAiEnter();
      });
    }

    async function askAiClassifier() {
      resetAiEnterArmed();

      const input = $('#aiInput');
      const reply = $('#aiReply');
      const btn = $('#aiAskBtn');
      const message = input.value.trim();

      if (!message) {
        reply.textContent = '先簡單描述一下你現在卡在哪裡。';
        reply.classList.add('show');
        return;
      }

      btn.disabled = true;
      btn.textContent = '判斷中...';
      reply.textContent = '我先幫你縮小範圍。';
      reply.classList.add('show');

      try {
        const res = await fetch(AI_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();
        if (!data.ok) throw new Error(data.error || 'AI 判斷失敗');
        const r = applyAiResult(data.result || {});
        const filterLabel = `${labelLibrary(r.library)}｜${r.body_part || '全部部位'}｜${r.pain_point || '全部痛點'}｜${r.purpose || '全部目的'}`;
        reply.textContent = `${r.reply || '我先幫你篩出比較接近的內容。'}\n\n我先幫你篩到：${filterLabel}` + (r.safety_note ? `\n\n提醒：${r.safety_note}` : '');
      } catch (err) {
        console.error(err);
        reply.textContent = '目前 AI 判斷沒有成功，你可以先用「組合動作」或「單一動作」手動篩選。';
      } finally {
        btn.disabled = false;
        btn.textContent = '幫我篩選';
      }
    }

    function renderAll() {
      updateHero();
      renderBodyButtons();
      renderPainChips();
      renderPurposeChips();
      renderResults();
    }

    function init() {
      $$('.libraryTab').forEach(btn => btn.addEventListener('click', () => switchLibrary(btn.dataset.library)));
      $('#aiAskBtn').addEventListener('click', askAiClassifier);
      bindAiInputEnterBehavior();
      $$('.aiExample').forEach(btn => btn.addEventListener('click', () => { $('#aiInput').value = btn.dataset.example || ''; resetAiEnterArmed(); askAiClassifier(); }));
      $('#resetBtn').addEventListener('click', resetFilters);
      $('#closeModal').addEventListener('click', closeModal);
      $('#modalBackdrop').addEventListener('click', e => { if (e.target.id === 'modalBackdrop') closeModal(); });
      document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
      $$('.hotspot').forEach(el => el.addEventListener('click', () => {
        state.body = el.dataset.body;
        state.pain = '';
        state.activeCardId = '';
        renderAll();
      }));
      $('#searchInput').addEventListener('input', e => { state.query = e.target.value || ''; state.activeCardId = ''; renderAll(); });
      renderAll();
    }
    init();
  </script>
</body>
</html>
